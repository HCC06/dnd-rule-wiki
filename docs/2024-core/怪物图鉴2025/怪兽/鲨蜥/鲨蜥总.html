<p><strong>栖息地：</strong> 草原，丘陵，山地；<strong>宝藏：</strong>无</p>
<p>鲨蜥也叫“陆行鲨”，是一种执着的掠食者。它们会掘地潜行、飞跃障碍、冲锋突破来追捕猎物。它们在地底快速钻行，感知到动静就破土而出，以其巨嘴捕食猎物。</p></article><footer class="page-footer"><p>📚 👹 怪物图鉴 2025 · 规则集 2024</p></footer></main></div><script src="/dnd-rule-wiki/assets/search.js"></script><script src="/dnd-rule-wiki/assets/sidebar.js"></script></body></html>
