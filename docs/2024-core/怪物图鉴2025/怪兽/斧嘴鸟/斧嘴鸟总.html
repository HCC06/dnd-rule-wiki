<p>走地猛禽</p>
<div class="HT">

**栖息地：**寒带，草原，丘陵 ；**宝藏：**无

</div>

<p>斧嘴鸟是一种长有斧刃状长喙，不会飞的似禽鸟生物。这些迅捷的掠食者以疾速追猎，其利喙可劈开遮蔽猎物的密丛。其羽色随其多样的生活环境变化——翎羽斑斓者于热带平原上疾驰如风，白羽如雪者于冻土中潜行狩猎。<br />
斧嘴鸟虽难驯服，但自幼豢养便可成可靠坐骑。</p>
<div class="little-paper" style="WIDTH: 537px; MARGIN-LEFT: 24px">

这玩意脸长得像斧头，其他部分瞅着像生气的大公鸡——我当然想骑它！

——巴特利·夏足，冒险者
