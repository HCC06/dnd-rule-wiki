<h1 id="death-knight">死亡骑士 Death Knight</h1>
<p>不死军团的恐怖统帅</p>
<p><strong>栖息地：</strong> 任意；<strong>宝藏：</strong>武备</p>
<p>死亡骑士乃是邪恶的勇士，身披盔甲的骷髅督军。这些同时身负毁灭性的武艺和亵渎魔法的不死暴君率领着亵渎军团对抗生者，或在被诅咒的堡垒中盘踞。每一名死亡骑士都被过去的悲剧和耻辱缠绕，并最终因此犯下更大的罪行。</p></article><footer class="page-footer"><p>📚 👹 怪物图鉴 2025 · 规则集 2024</p></footer></main></div><script src="/dnd-rule-wiki/assets/search.js"></script><script src="/dnd-rule-wiki/assets/sidebar.js"></script></body></html>
