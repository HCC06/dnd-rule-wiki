<p><strong>栖息地：</strong> 任意；<strong>宝藏：</strong>武备</p>
<p>“打手”涵盖了保镖、斗殴者、甚至是力工。这些人使用强健的身体威吓敌人，其身份可能是好斗的罪犯、吵闹的酒客、甚至经验丰富的工人，以及一切使用肌肉来实现目的之人。</p>
<p>一切问题的答案都只有两种：我们的答案，错误的答案。</p>
