<p>羊角羊蹄的狂欢者</p>
<div class="HT">

**栖息地：**森林、异界（妖精荒野） ；**宝藏：**器具

</div>

<p>半羊人象征着荒野之上那无拘无束的快乐。狂欢之热令他们陶醉——他们宴饮，他们歌舞，他们比武，他们嬉戏。</p></article><footer class="page-footer"><p>📚 👹 怪物图鉴 2025 · 规则集 2024</p></footer></main></div><script src="/dnd-rule-wiki/assets/search.js"></script><script src="/dnd-rule-wiki/assets/sidebar.js"></script></body></html>
