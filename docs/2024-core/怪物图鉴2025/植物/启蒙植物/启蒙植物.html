<p>被魔法注入生命的植物</p>
<div class="HT">

**栖息地：**森林；**宝藏：**无

</div>

<p>魔法能够赋予移动能力，智慧，乃至声音。诸如启蒙术、或者其他位面存在的影响都可以给平凡的植物带来生命。当然，一些具有非凡特性的植物可能天生就有这些特质。</p>
<div align="center">

<div class="little-paper" style="WIDTH: 500px">

我们保护森林，并不意味着它自己毫无防备。

——皮克精，溪流闪闪

</div>
