<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>诅咒物品 — D&D Rule Wiki</title><link rel="stylesheet" href="/dnd-rule-wiki/assets/style.css"></head><body><div class="layout"><aside class="sidebar" id="sidebar"><div class="sidebar-head"><a href="/dnd-rule-wiki/" class="home-link">🐉 D&D Rule Wiki</a><input type="text" id="search-input" class="search-box" placeholder="搜索规则、法术、怪物…" autocomplete="off"><div id="search-results" class="search-results"></div></div><nav class="tree" id="tree"></nav></aside><main class="content"><nav class="breadcrumbs"><a href="/dnd-rule-wiki/2024-core/城主指南2024/">📖 城主指南 2024</a> <span class="sep">›</span> <a href="/dnd-rule-wiki/2024-core/城主指南2024/7.宝藏/魔法物品/">魔法物品</a> <span class="sep">›</span> <span class="current">诅咒物品</span></nav><article class="rule-content"><h1>诅咒物品</h1><h2 id="curse-items">诅咒物品 Curse Items</h2>
<p>魔法物品的描述将注明其是否带有诅咒。绝大多数鉴定物品的方法，包括<strong>鉴定术Identify</strong>，都无法发现这种诅咒。<br />
对诅咒物品的同调无法自行结束，除非先打破该诅咒，例如使用法术<strong>移除诅咒Remove Curse</strong> 。</p></article><footer class="page-footer"><p>📚 📖 城主指南 2024 · 规则集 2024</p></footer></main></div><script src="/dnd-rule-wiki/assets/search.js"></script><script src="/dnd-rule-wiki/assets/sidebar.js"></script></body></html>
