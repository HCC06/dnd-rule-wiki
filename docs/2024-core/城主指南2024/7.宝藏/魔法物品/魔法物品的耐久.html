<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>魔法物品的耐久 — D&D Rule Wiki</title><link rel="stylesheet" href="/dnd-rule-wiki/assets/style.css"></head><body><div class="layout"><aside class="sidebar" id="sidebar"><div class="sidebar-head"><a href="/dnd-rule-wiki/" class="home-link">🐉 D&D Rule Wiki</a><input type="text" id="search-input" class="search-box" placeholder="搜索规则、法术、怪物…" autocomplete="off"><div id="search-results" class="search-results"></div></div><nav class="tree" id="tree"></nav></aside><main class="content"><nav class="breadcrumbs"><a href="/dnd-rule-wiki/2024-core/城主指南2024/">📖 城主指南 2024</a> <span class="sep">›</span> <a href="/dnd-rule-wiki/2024-core/城主指南2024/7.宝藏/魔法物品/">魔法物品</a> <span class="sep">›</span> <span class="current">魔法物品的耐久</span></nav><article class="rule-content"><h1>魔法物品的耐久</h1><p><strong>魔法物品的耐久 Magic Items Resilience</strong></p>
<p>一件魔法物品的坚韧程度至少与同种类的非魔法物品的坚韧程度相当。除了药剂与卷轴之外，绝大多数魔法物品都具有所有伤害类型的抗性。<br />
神器只能通过某些特殊手段摧毁。除此之外，它不受任何伤害所影响。若要了解如何摧毁一件神器，则通常需要进行研究或者完成一番探索。</p></article><footer class="page-footer"><p>📚 📖 城主指南 2024 · 规则集 2024</p></footer></main></div><script src="/dnd-rule-wiki/assets/search.js"></script><script src="/dnd-rule-wiki/assets/sidebar.js"></script></body></html>
