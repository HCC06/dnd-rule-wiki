<p>魔法物品往往会具有充能或者可在次日黎明时分或其他一些特定时间点重获充能的词条。如果这样一件物品存在于某个无法发生上述特定事件的世界或存在位面，则由DM决定该物品何时将重获充能。</p></article><footer class="page-footer"><p>📚 📖 城主指南 2024 · 规则集 2024</p></footer></main></div><script src="/assets/search.js"></script><script src="/assets/sidebar.js"></script></body></html>
