<p><em>魔杖，非普通（+1）/珍稀（+2）/极珍稀（+3）（需施法者同调）</em><br />
持握这根魔杖时，你的法术攻击检定获得加值，加值大小取决于魔杖的稀有度。此外，你在进行法术攻击检定时无视半身掩护。</p></article><footer class="page-footer"><p>📚 📖 城主指南 2024 · 规则集 2024</p></footer></main></div><script src="/assets/search.js"></script><script src="/assets/sidebar.js"></script></body></html>
