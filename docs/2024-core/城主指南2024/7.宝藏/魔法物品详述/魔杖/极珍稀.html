<p><em>魔杖，极珍稀（需施法者同调）</em><br />
这根魔杖具有7充能。持握它时，你可以消耗1充能从中施展<strong>变形术Polymorph</strong>（豁免DC15）。<br />
<strong>重获充能Regaining Charges</strong> 。这根魔杖在每日黎明时重获1d6+1已消耗的充能。当充能数耗尽时，骰一次d20。如果骰值为1，魔杖将化作飞灰并被摧毁。</p></article><footer class="page-footer"><p>📚 📖 城主指南 2024 · 规则集 2024</p></footer></main></div><script src="/assets/search.js"></script><script src="/assets/sidebar.js"></script></body></html>
