<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>非普通 — D&D Rule Wiki</title><link rel="stylesheet" href="/dnd-rule-wiki/assets/style.css"></head><body><div class="layout"><aside class="sidebar" id="sidebar"><div class="sidebar-head"><a href="/dnd-rule-wiki/" class="home-link">🐉 D&D Rule Wiki</a><input type="text" id="search-input" class="search-box" placeholder="搜索规则、法术、怪物…" autocomplete="off"><div id="search-results" class="search-results"></div></div><nav class="tree" id="tree"></nav></aside><main class="content"><nav class="breadcrumbs"><a href="/dnd-rule-wiki/2024-core/城主指南2024/">📖 城主指南 2024</a> <span class="sep">›</span> <a href="/dnd-rule-wiki/2024-core/城主指南2024/7.宝藏/魔法物品详述/权杖/">权杖</a> <span class="sep">›</span> <span class="current">非普通</span></nav><article class="rule-content"><h1>非普通</h1><h6 id="immovable-rod">不动权杖 Immovable rod</h6>
<p><em>权杖，非普通</em><br />
这根铁质权杖的一端具有一枚按钮。你可以执行<strong>操作动作</strong>按下按钮，让这根权杖魔法性地固定在原处。直到你或另一生物执行<strong>操作动作</strong>再次按下按钮前，即使违反了重力定律，权杖也不会移动。权杖最多能负载8000磅的重量。更重的负载则会让权杖的效应失效并掉落在地。一个生物可以执行操作动作来进行一次DC30的力量（运动）检定，成功则可以将固定住的权杖移动最多10尺。</p></article><footer class="page-footer"><p>📚 📖 城主指南 2024 · 规则集 2024</p></footer></main></div><script src="/dnd-rule-wiki/assets/search.js"></script><script src="/dnd-rule-wiki/assets/sidebar.js"></script></body></html>
