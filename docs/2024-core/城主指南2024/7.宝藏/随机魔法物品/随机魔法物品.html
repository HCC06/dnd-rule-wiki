<p>你将使用本节中的表格来随机地决定角色在你的冒险中找到的魔法物品。表格首先按宝藏主题（如怪物手册Monster Manual中所述）排序，然后按物品稀有度排序。如果物品与每个主题都不相关，则掷 1d4 来决定要掷哪个表：<br />
掷 1 时，掷奥秘表；<br />
掷 2 时，掷武备；<br />
掷 3 时，掷器具；<br />
掷 4 时，掷圣物。</p></article><footer class="page-footer"><p>📚 📖 城主指南 2024 · 规则集 2024</p></footer></main></div><script src="/assets/search.js"></script><script src="/assets/sidebar.js"></script></body></html>
