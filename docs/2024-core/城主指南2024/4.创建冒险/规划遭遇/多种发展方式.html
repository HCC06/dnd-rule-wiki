<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>多种发展方式 — D&D Rule Wiki</title><link rel="stylesheet" href="/dnd-rule-wiki/assets/style.css"></head><body><div class="layout"><aside class="sidebar" id="sidebar"><div class="sidebar-head"><a href="/dnd-rule-wiki/" class="home-link">🐉 D&D Rule Wiki</a><input type="text" id="search-input" class="search-box" placeholder="搜索规则、法术、怪物…" autocomplete="off"><div id="search-results" class="search-results"></div></div><nav class="tree" id="tree"></nav></aside><main class="content"><nav class="breadcrumbs"><a href="/dnd-rule-wiki/2024-core/城主指南2024/">📖 城主指南 2024</a> <span class="sep">›</span> <a href="/dnd-rule-wiki/2024-core/城主指南2024/4.创建冒险/规划遭遇/">规划遭遇</a> <span class="sep">›</span> <span class="current">多种发展方式</span></nav><article class="rule-content"><h1>多种发展方式</h1><p><strong>多种发展方式 Multiple Ways To Progress</strong></p>
<p>确保角色们在冒险的任一节点都拥有多种能够推动冒险发展的途径，这样即使他们错过了某条途径，他们也仍有其他选择。为冒险设计一些在角色们的行动失败时仍能够推动其向前发展的契机。相对的，只有单一成功路线的挑战应作为角色们获取额外奖励的机会。</p></article><footer class="page-footer"><p>📚 📖 城主指南 2024 · 规则集 2024</p></footer></main></div><script src="/dnd-rule-wiki/assets/search.js"></script><script src="/dnd-rule-wiki/assets/sidebar.js"></script></body></html>
