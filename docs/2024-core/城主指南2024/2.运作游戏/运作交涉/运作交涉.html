<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>运作交涉 — D&D Rule Wiki</title><link rel="stylesheet" href="/dnd-rule-wiki/assets/style.css"></head><body><div class="layout"><aside class="sidebar" id="sidebar"><div class="sidebar-head"><a href="/dnd-rule-wiki/" class="home-link">🐉 D&D Rule Wiki</a><input type="text" id="search-input" class="search-box" placeholder="搜索规则、法术、怪物…" autocomplete="off"><div id="search-results" class="search-results"></div></div><nav class="tree" id="tree"></nav></aside><main class="content"><nav class="breadcrumbs"><a href="/dnd-rule-wiki/2024-core/城主指南2024/">📖 城主指南 2024</a> <span class="sep">›</span> <a href="/dnd-rule-wiki/2024-core/城主指南2024/2.运作游戏/运作交涉/">运作交涉</a> <span class="sep">›</span> <span class="current">运作交涉</span></nav><article class="rule-content"><h1>运作交涉</h1><p><strong>运作交涉 Running social interaction</strong></p>
<p>在交涉中，冒险者们通常都具有一个目的，比如想获取信息、获得援助、赢得他人信任、逃避惩罚、避免战斗、洽谈条约或实现其他目标。成功完成遭遇则意味着达成目的。<br />
有些DM将交涉视为一种形式自由的角色扮演机会，而骰子很少在游戏中发挥作用；另外一些DM也会通过让角色进行一些魅力检定来解决问题。大多数游戏则介于两者之间，于角色扮演和偶尔的属性检定之间找到平衡。</p></article><footer class="page-footer"><p>📚 📖 城主指南 2024 · 规则集 2024</p></footer></main></div><script src="/dnd-rule-wiki/assets/search.js"></script><script src="/dnd-rule-wiki/assets/sidebar.js"></script></body></html>
