<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>调整难度 — D&D Rule Wiki</title><link rel="stylesheet" href="/assets/style.css"></head><body><div class="layout"><aside class="sidebar" id="sidebar"><div class="sidebar-head"><a href="/" class="home-link">🐉 D&D Rule Wiki</a><input type="text" id="search-input" class="search-box" placeholder="搜索规则、法术、怪物…" autocomplete="off"><div id="search-results" class="search-results"></div></div><nav class="tree" id="tree"></nav></aside><main class="content"><nav class="breadcrumbs"><a href="/2024-core/城主指南2024/">📖 城主指南 2024</a> <span class="sep">›</span> <a href="/2024-core/城主指南2024/2.运作游戏/运作战斗/">运作战斗</a> <span class="sep">›</span> <span class="current">调整难度</span></nav><article class="rule-content"><h1>调整难度</h1><p><strong>调整难度 Adjusting Difficulty</strong></p>
<p>当战斗比预期更艰难或更容易，需要进行调整时，许多有助于战斗推进的技巧同样适用。怪物在即将获胜时可能会主动谈判，让实力差距的角色投降或撤退。其中一只怪物可能会（出于高尚或自私的理由）倒戈相向，去帮助角色们击败其同胞。战场的变化可能会为角色提供逃脱的机会，或让实力不够的怪物占尽优势。</p></article><footer class="page-footer"><p>📚 📖 城主指南 2024 · 规则集 2024</p></footer></main></div><script src="/assets/search.js"></script><script src="/assets/sidebar.js"></script></body></html>
