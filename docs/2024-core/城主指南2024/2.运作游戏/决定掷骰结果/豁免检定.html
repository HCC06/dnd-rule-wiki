<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>豁免检定 — D&D Rule Wiki</title><link rel="stylesheet" href="/dnd-rule-wiki/assets/style.css"></head><body><div class="layout"><aside class="sidebar" id="sidebar"><div class="sidebar-head"><a href="/dnd-rule-wiki/" class="home-link">🐉 D&D Rule Wiki</a><input type="text" id="search-input" class="search-box" placeholder="搜索规则、法术、怪物…" autocomplete="off"><div id="search-results" class="search-results"></div></div><nav class="tree" id="tree"></nav></aside><main class="content"><nav class="breadcrumbs"><a href="/dnd-rule-wiki/2024-core/城主指南2024/">📖 城主指南 2024</a> <span class="sep">›</span> <a href="/dnd-rule-wiki/2024-core/城主指南2024/2.运作游戏/决定掷骰结果/">决定掷骰结果</a> <span class="sep">›</span> <span class="current">豁免检定</span></nav><article class="rule-content"><h1>豁免检定</h1><p><strong>豁免检定 Saving Throws</strong></p>
<p>与属性检定相反，豁免检定是对效应的即时反应，且几乎无法自愿进行。一次豁免检定在某些坏事威胁到角色，而角色有机会去避免或抵抗时进行则最为合理。<br />
大多数时间下，豁免检定只会在某种效应(例如法术、怪物能力或陷阱）要求你为其进行豁免时才需要进行，且该效应亦会告知你需进行哪种豁免检定，并提供其DC。<br />
而在其他要求进行豁免检定的情况下，则由你来决定该豁免与哪个属性值相关。属性、属性检定和豁免检定表为你提供了建议。</p></article><footer class="page-footer"><p>📚 📖 城主指南 2024 · 规则集 2024</p></footer></main></div><script src="/dnd-rule-wiki/assets/search.js"></script><script src="/dnd-rule-wiki/assets/sidebar.js"></script></body></html>
