<p>《<strong>龙与地下城</strong>》是你和你的朋友们一起扮演各种角色，共同讲述故事的一个游戏。《<strong>玩家手册</strong>》介绍了如何游玩此游戏，以及如何创建角色，即故事中的英雄；而《<strong>城主指南</strong>》则是为那些主持游戏的玩家而写——教会他们如何确保所有人都玩得尽兴。这名玩家即是地下城主，又称DM。担任地下城主很有趣，也很有主导权力，还能从中获得宝贵的经验，本章将会带你串一遍基础的部分。</p></article><footer class="page-footer"><p>📚 📖 城主指南 2024 · 规则集 2024</p></footer></main></div><script src="/assets/search.js"></script><script src="/assets/sidebar.js"></script></body></html>
