<p>第四章中概述的关于冒险的故事的所有内容，同样也适用于战役中的故事：战役像是一套系列漫画或电视节目，其中的每个冒险（就像一期漫画或一集剧集）都讲述了一个自成一体的故事，同时亦与更大的故事有所联系。战役的故事和冒险一样不是预先定死的——玩家角色的行动将会影响故事的展开。</p></article><footer class="page-footer"><p>📚 📖 城主指南 2024 · 规则集 2024</p></footer></main></div><script src="/dnd-rule-wiki/assets/search.js"></script><script src="/dnd-rule-wiki/assets/sidebar.js"></script></body></html>
