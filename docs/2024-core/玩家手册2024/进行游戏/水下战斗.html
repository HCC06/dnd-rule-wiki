<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>水下战斗 — D&D Rule Wiki</title><link rel="stylesheet" href="/dnd-rule-wiki/assets/style.css"></head><body><div class="layout"><aside class="sidebar" id="sidebar"><div class="sidebar-head"><a href="/dnd-rule-wiki/" class="home-link">🐉 D&D Rule Wiki</a><input type="text" id="search-input" class="search-box" placeholder="搜索规则、法术、怪物…" autocomplete="off"><div id="search-results" class="search-results"></div></div><nav class="tree" id="tree"></nav></aside><main class="content"><nav class="breadcrumbs"><a href="/dnd-rule-wiki/2024-core/玩家手册2024/">📖 玩家手册 2024</a> <span class="sep">›</span> <a href="/dnd-rule-wiki/2024-core/玩家手册2024/进行游戏/">进行游戏</a> <span class="sep">›</span> <span class="current">水下战斗</span></nav><article class="rule-content"><h1>水下战斗</h1><h3 id="underwater-combat">水下战斗 Underwater Combat</h3>
<p>水下战斗遵照以下规则：</p>
<p><strong>武器受阻 Impeded Weapon<br />
</strong>在水下使用武器进行近战攻击检定时，除非该武器造成<strong>穿刺</strong>伤害，否则没有<strong>游泳速度</strong>的生物在该攻击检定上具有<strong>劣势</strong>。<br />
在水下使用武器进行远程攻击检定时，若其目标超过了武器的常规射程则自动失手。而目标在常规射程内时，该攻击检定具有<strong>劣势</strong> 。</p>
<p><strong>火焰抗性 Fire Resistance<br />
</strong>水下所有存在均具有对<strong>火焰</strong>伤害的<strong>抗性</strong>（见“ <strong>伤害与治疗</strong> ”）。</p></article><footer class="page-footer"><p>📚 📖 玩家手册 2024 · 规则集 2024</p></footer></main></div><script src="/dnd-rule-wiki/assets/search.js"></script><script src="/dnd-rule-wiki/assets/sidebar.js"></script></body></html>
