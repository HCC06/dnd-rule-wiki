<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>重击命中 — D&D Rule Wiki</title><link rel="stylesheet" href="/assets/style.css"></head><body><div class="layout"><aside class="sidebar" id="sidebar"><div class="sidebar-head"><a href="/" class="home-link">🐉 D&D Rule Wiki</a><input type="text" id="search-input" class="search-box" placeholder="搜索规则、法术、怪物…" autocomplete="off"><div id="search-results" class="search-results"></div></div><nav class="tree" id="tree"></nav></aside><main class="content"><nav class="breadcrumbs"><a href="/2024-core/玩家手册2024/">📖 玩家手册 2024</a> <span class="sep">›</span> <a href="/2024-core/玩家手册2024/进行游戏/">进行游戏</a> <span class="sep">›</span> <span class="current">重击命中</span></nav><article class="rule-content"><h1>重击命中</h1><h3 id="critical-hits">重击命中 Critical Hits</h3>
<p>当你掷出<strong>重击命中</strong>（简称重击），你会造成更多的伤害。投掷两次该攻击的伤害骰并将其累加，再如常加上有关的调整值。举例来说，如果你用<em>匕首</em>掷出<strong>重击</strong>，投掷伤害时，你掷2d4而非1d4，再加上此次攻击相关的属性调整值。如果这次攻击附带有其他伤害骰，例如来自<strong>游荡者</strong>的<strong>偷袭</strong> 特性的伤害骰，你将那些骰子也掷两次。</p></article><footer class="page-footer"><p>📚 📖 玩家手册 2024 · 规则集 2024</p></footer></main></div><script src="/assets/search.js"></script><script src="/assets/sidebar.js"></script></body></html>
