<p>每种伤害都有自己的伤害类型，比如<strong>火焰</strong>或者<strong>挥砍</strong>。伤害类型列于术语汇编，其本身没有任何规则，但是诸如<strong>抗性</strong>之类的其他规则会基于伤害类型来运作。</p></article><footer class="page-footer"><p>📚 📖 玩家手册 2024 · 规则集 2024</p></footer></main></div><script src="/dnd-rule-wiki/assets/search.js"></script><script src="/dnd-rule-wiki/assets/sidebar.js"></script></body></html>
