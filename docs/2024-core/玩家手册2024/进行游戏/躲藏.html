<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>躲藏 — D&D Rule Wiki</title><link rel="stylesheet" href="/assets/style.css"></head><body><div class="layout"><aside class="sidebar" id="sidebar"><div class="sidebar-head"><a href="/" class="home-link">🐉 D&D Rule Wiki</a><input type="text" id="search-input" class="search-box" placeholder="搜索规则、法术、怪物…" autocomplete="off"><div id="search-results" class="search-results"></div></div><nav class="tree" id="tree"></nav></aside><main class="content"><nav class="breadcrumbs"><a href="/2024-core/玩家手册2024/">📖 玩家手册 2024</a> <span class="sep">›</span> <a href="/2024-core/玩家手册2024/进行游戏/">进行游戏</a> <span class="sep">›</span> <span class="current">躲藏</span></nav><article class="rule-content"><h1>躲藏</h1><h3 id="hiding">躲藏 Hiding</h3>
<p>冒险者和怪物常常会通过藏踪蹑迹的方式来监视他人、绕过守卫或设下伏击。环境是否适合躲藏则由<strong>地下城主</strong>决定。当你尝试躲藏时，你就是在执行<strong>躲藏</strong>动作。</p></article><footer class="page-footer"><p>📚 📖 玩家手册 2024 · 规则集 2024</p></footer></main></div><script src="/assets/search.js"></script><script src="/assets/sidebar.js"></script></body></html>
