<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>士兵 — D&D Rule Wiki</title><link rel="stylesheet" href="/assets/style.css"></head><body><div class="layout"><aside class="sidebar" id="sidebar"><div class="sidebar-head"><a href="/" class="home-link">🐉 D&D Rule Wiki</a><input type="text" id="search-input" class="search-box" placeholder="搜索规则、法术、怪物…" autocomplete="off"><div id="search-results" class="search-results"></div></div><nav class="tree" id="tree"></nav></aside><main class="content"><nav class="breadcrumbs"><a href="/2024-core/玩家手册2024/">📖 玩家手册 2024</a> <span class="sep">›</span> <a href="/2024-core/玩家手册2024/角色起源/背景/">背景</a> <span class="sep">›</span> <span class="current">士兵</span></nav><article class="rule-content"><h1>士兵</h1><h3 id="soldier">士兵 Soldier</h3>
<p><strong>属性值：</strong>力量、敏捷、体质<br />
<strong>专长：</strong>凶蛮打手（见第五章）<br />
<strong>技能熟练：</strong>运动和威吓<br />
<strong>工具熟练：</strong>选择一种赌具（见第六章）<br />
<strong>装备：</strong>选择A或B：(A)矛、短弓、20支箭、赌具（同上所选）、医疗包、箭袋、旅行服装、14GP；或(B)50GP</p>
<p>你从成年开始便接受战阵训练，鲜少有拿起武器之前的生活回忆，战斗已融入你的血液。有时候你会发现自己正在反复操练着最初学会的基本战斗训练。而最终，你会将这些训练运用到战场上，在战争中行使武力，保护你的王国。</p></article><footer class="page-footer"><p>📚 📖 玩家手册 2024 · 规则集 2024</p></footer></main></div><script src="/assets/search.js"></script><script src="/assets/sidebar.js"></script></body></html>
