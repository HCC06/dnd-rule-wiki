<p><strong>属性值：</strong>敏捷、体质、魅力<br />
<strong>专长：</strong>熟习（见第五章）<br />
<strong>技能熟练：</strong>欺瞒和巧手<br />
<strong>工具熟练：</strong>文书伪造工具<br />
<strong>装备：</strong>选择A或B：(A)文书伪造工具，戏服，高档服装，15GP；或(B)50GP</p>
<p>在你长到能买酒的年纪后，你立刻就在家乡方圆十里内的所有酒吧拥有了自己专属的钟意座位。当你在各个酒吧间穿梭时，你学会了如何用善意的谎言去安抚那些需要安慰的可怜人——也许是一剂包治百病的良方或是一份伪造的血统证明。</p></article><footer class="page-footer"><p>📚 📖 玩家手册 2024 · 规则集 2024</p></footer></main></div><script src="/assets/search.js"></script><script src="/assets/sidebar.js"></script></body></html>
