<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>隐士 — D&D Rule Wiki</title><link rel="stylesheet" href="/assets/style.css"></head><body><div class="layout"><aside class="sidebar" id="sidebar"><div class="sidebar-head"><a href="/" class="home-link">🐉 D&D Rule Wiki</a><input type="text" id="search-input" class="search-box" placeholder="搜索规则、法术、怪物…" autocomplete="off"><div id="search-results" class="search-results"></div></div><nav class="tree" id="tree"></nav></aside><main class="content"><nav class="breadcrumbs"><a href="/2024-core/玩家手册2024/">📖 玩家手册 2024</a> <span class="sep">›</span> <a href="/2024-core/玩家手册2024/角色起源/背景/">背景</a> <span class="sep">›</span> <span class="current">隐士</span></nav><article class="rule-content"><h1>隐士</h1><h3 id="hermit">隐士 Hermit</h3>
<p><strong>属性值：</strong>体质、感知、魅力<br />
<strong>专长：</strong>医疗师（见第五章）<br />
<strong>技能熟练：</strong>医药与宗教<br />
<strong>工具熟练：</strong>草药工具<br />
<strong>装备：</strong>选择A或B：(A)长棍、草药工具、铺盖、书籍（哲学）、油灯、燃油（3扁瓶）、旅行服装、16GP；或(B)50GP</p>
<p>你早年住在远离聚集地的、与世隔绝的小屋或是隐修院中。在那些日子里，你唯一的伙伴是森林中的生灵，以及那些偶尔带来给养和外界消息的访客。孤独让你花了很多时间琢磨天道的未解之谜。</p></article><footer class="page-footer"><p>📚 📖 玩家手册 2024 · 规则集 2024</p></footer></main></div><script src="/assets/search.js"></script><script src="/assets/sidebar.js"></script></body></html>
