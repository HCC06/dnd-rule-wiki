<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>贵族 — D&D Rule Wiki</title><link rel="stylesheet" href="/dnd-rule-wiki/assets/style.css"></head><body><div class="layout"><aside class="sidebar" id="sidebar"><div class="sidebar-head"><a href="/dnd-rule-wiki/" class="home-link">🐉 D&D Rule Wiki</a><input type="text" id="search-input" class="search-box" placeholder="搜索规则、法术、怪物…" autocomplete="off"><div id="search-results" class="search-results"></div></div><nav class="tree" id="tree"></nav></aside><main class="content"><nav class="breadcrumbs"><a href="/dnd-rule-wiki/2024-core/玩家手册2024/">📖 玩家手册 2024</a> <span class="sep">›</span> <a href="/dnd-rule-wiki/2024-core/玩家手册2024/角色起源/背景/">背景</a> <span class="sep">›</span> <span class="current">贵族</span></nav><article class="rule-content"><h1>贵族</h1><h3 id="noble">贵族 Noble</h3>
<p><strong>属性值：</strong>力量、智力、魅力<br />
<strong>专长：</strong>熟习（见第五章）<br />
<strong>技能熟练：</strong>历史和游说<br />
<strong>工具熟练：</strong>选择一种赌具（见第六章）<br />
<strong>装备：</strong>选择A或B：(A)赌具（同上所选）、高档服装、香水、29GP，或(B)50GP</p>
<p>权力、财富还有荣耀伴随你在城堡中长大，你那贵不可言的小家族确保你受到了一流的教育，其中有些教导令你感激，而有些则只让你觉得愤慨。在城堡中的时光，尤其是在长久以来耳濡目染于宫廷中的家族往来，也培养了你足以胜任领袖的许多才能。</p></article><footer class="page-footer"><p>📚 📖 玩家手册 2024 · 规则集 2024</p></footer></main></div><script src="/dnd-rule-wiki/assets/search.js"></script><script src="/dnd-rule-wiki/assets/sidebar.js"></script></body></html>
