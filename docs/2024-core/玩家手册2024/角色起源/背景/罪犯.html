<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>罪犯 — D&D Rule Wiki</title><link rel="stylesheet" href="/dnd-rule-wiki/assets/style.css"></head><body><div class="layout"><aside class="sidebar" id="sidebar"><div class="sidebar-head"><a href="/dnd-rule-wiki/" class="home-link">🐉 D&D Rule Wiki</a><input type="text" id="search-input" class="search-box" placeholder="搜索规则、法术、怪物…" autocomplete="off"><div id="search-results" class="search-results"></div></div><nav class="tree" id="tree"></nav></aside><main class="content"><nav class="breadcrumbs"><a href="/dnd-rule-wiki/2024-core/玩家手册2024/">📖 玩家手册 2024</a> <span class="sep">›</span> <a href="/dnd-rule-wiki/2024-core/玩家手册2024/角色起源/背景/">背景</a> <span class="sep">›</span> <span class="current">罪犯</span></nav><article class="rule-content"><h1>罪犯</h1><h3 id="criminal">罪犯 Criminal</h3>
<p><strong>属性值：</strong>敏捷、体质、智力<br />
<strong>专长：</strong>警戒（见第五章）<br />
<strong>技能熟练：</strong>巧手和隐匿<br />
<strong>工具熟练：</strong>盗贼工具<br />
<strong>装备：</strong>选择A或B：(A)2匕首、盗贼工具、撬棍、2小包、旅行服装、16GP；或(B)50GP</p>
<p>你潜藏在阴暗的小巷里，靠着偷鸡摸狗苟且偷生。也许你曾与一帮称兄道弟的法外狂徒患难与共。又或者，你也许是一个孤勇者，自力更生的同时与当地的盗贼公会乃至更可怕的违法者们明争暗斗。</p></article><footer class="page-footer"><p>📚 📖 玩家手册 2024 · 规则集 2024</p></footer></main></div><script src="/dnd-rule-wiki/assets/search.js"></script><script src="/dnd-rule-wiki/assets/sidebar.js"></script></body></html>
