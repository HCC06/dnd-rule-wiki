<p><strong>属性值：</strong>力量、体质、感知<br />
<strong>专长：</strong>健壮（见第五章）<br />
<strong>技能熟练：</strong>驯兽和自然<br />
<strong>工具熟练：</strong>木匠工具<br />
<strong>装备：</strong>选择A或B：(A)镰刀、木匠工具、医疗包、铁锅、铲子、旅行服装、30GP；或(B)50GP</p>
<p>你从小就生在农家地，长在农家地。多年照料动物和耕种土地回报你以耐心和一个倍儿棒的健康身体。你对大自然的甘霖充满感激之情，也对自然之怒抱以敬畏之心。</p></article><footer class="page-footer"><p>📚 📖 玩家手册 2024 · 规则集 2024</p></footer></main></div><script src="/dnd-rule-wiki/assets/search.js"></script><script src="/dnd-rule-wiki/assets/sidebar.js"></script></body></html>
