<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>流浪者 — D&D Rule Wiki</title><link rel="stylesheet" href="/dnd-rule-wiki/assets/style.css"></head><body><div class="layout"><aside class="sidebar" id="sidebar"><div class="sidebar-head"><a href="/dnd-rule-wiki/" class="home-link">🐉 D&D Rule Wiki</a><input type="text" id="search-input" class="search-box" placeholder="搜索规则、法术、怪物…" autocomplete="off"><div id="search-results" class="search-results"></div></div><nav class="tree" id="tree"></nav></aside><main class="content"><nav class="breadcrumbs"><a href="/dnd-rule-wiki/2024-core/玩家手册2024/">📖 玩家手册 2024</a> <span class="sep">›</span> <a href="/dnd-rule-wiki/2024-core/玩家手册2024/角色起源/背景/">背景</a> <span class="sep">›</span> <span class="current">流浪者</span></nav><article class="rule-content"><h1>流浪者</h1><h3 id="wayfarer">流浪者Wayfarer</h3>
<p><strong>属性值：</strong>敏捷、感知、魅力<br />
<strong>专长：</strong>幸运（见第五章）<br />
<strong>技能熟练：</strong>洞悉和隐匿<br />
<strong>工具熟练：</strong>盗贼工具<br />
<strong>装备：</strong>选择A或B：(A)2匕首、盗贼工具、赌具（任意）、铺盖、2小包、旅行服装、16GP；或(B)50GP</p>
<p>你在街头长大，身边都是同样命途多舛的孤儿，有些是朋友有些是对头。你露宿街头，只靠着打零工来换取食物。有些时候你会感到饥饿难耐，但却只能以盗窃维生。尽管如此，你从未抛你的自尊，也从未放弃希望。命运还没有就此关上大门。</p></article><footer class="page-footer"><p>📚 📖 玩家手册 2024 · 规则集 2024</p></footer></main></div><script src="/dnd-rule-wiki/assets/search.js"></script><script src="/dnd-rule-wiki/assets/sidebar.js"></script></body></html>
