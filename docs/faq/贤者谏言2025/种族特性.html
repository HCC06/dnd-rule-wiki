<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>种族特质 — D&D Rule Wiki</title><link rel="stylesheet" href="/assets/style.css"></head><body><div class="layout"><aside class="sidebar" id="sidebar"><div class="sidebar-head"><a href="/" class="home-link">🐉 D&D Rule Wiki</a><input type="text" id="search-input" class="search-box" placeholder="搜索规则、法术、怪物…" autocomplete="off"><div id="search-results" class="search-results"></div></div><nav class="tree" id="tree"></nav></aside><main class="content"><nav class="breadcrumbs"><a href="/faq/贤者谏言2025/">📋 贤者谏言 2025</a> <span class="sep">›</span> <span class="current">种族特质</span></nav><article class="rule-content"><h1>种族特质</h1><p><strong>半身人Halfling 的 天生擅匿Naturally Stealthy 特质能否让其在被他人看见的情况下进行躲藏？</strong><br />
通常情况下，要执行<em>躲藏</em>动作，你需要以下环境因素：</p>
<ul>
<li><div></li>
</ul>
<p>你必须身处<em>重度遮蔽</em>、位于<em>四分之三掩护</em>、或位于<em>全身掩护</em>下。</p>
</div>
<ul>
<li><div></li>
</ul>
<p>你必须处于所有敌人的视线之外。</p>
</div>
<p>半身人的天生擅匿特性可以让你在有体型比你大至少一级的生物遮蔽你的情况下，无视上述这些环境因素。不过，你依旧需要如同正常的执行躲藏动作那般，正常进行敏捷（隐匿）检定，所以你的躲藏并不一定能确保成功。</p></article><footer class="page-footer"><p>📚 📋 贤者谏言 2025 · 规则集 2024</p></footer></main></div><script src="/assets/search.js"></script><script src="/assets/sidebar.js"></script></body></html>
