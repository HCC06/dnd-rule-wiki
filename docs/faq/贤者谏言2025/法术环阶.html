<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>法术环阶 — D&D Rule Wiki</title><link rel="stylesheet" href="/dnd-rule-wiki/assets/style.css"></head><body><div class="layout"><aside class="sidebar" id="sidebar"><div class="sidebar-head"><a href="/dnd-rule-wiki/" class="home-link">🐉 D&D Rule Wiki</a><input type="text" id="search-input" class="search-box" placeholder="搜索规则、法术、怪物…" autocomplete="off"><div id="search-results" class="search-results"></div></div><nav class="tree" id="tree"></nav></aside><main class="content"><nav class="breadcrumbs"><a href="/dnd-rule-wiki/faq/贤者谏言2025/">📋 贤者谏言 2025</a> <span class="sep">›</span> <span class="current">法术环阶</span></nav><article class="rule-content"><h1>法术环阶</h1><p><strong>在不用法术位施展法术时，该法术的环阶是几环？</strong><br />
除非文本另有说明，否则不用法术位施展的法术是均为其理论最低的环阶，也就是出现在法术描述顶部第二行所述的环阶。<br />
关于这“文本另有说明”的例子，你常可以在怪物的数据卡中遭到。有着 <strong>施法Spellcasting</strong>动作的怪物也许会在其后方标注有“（X环版本）”的字样。此文更意味着，即使这个法术的施展不使用法术位，它的效应也依旧等同于该法术在使用特定环阶的法术位施展出来的版本的效应。</p></article><footer class="page-footer"><p>📚 📋 贤者谏言 2025 · 规则集 2024</p></footer></main></div><script src="/dnd-rule-wiki/assets/search.js"></script><script src="/dnd-rule-wiki/assets/sidebar.js"></script></body></html>
