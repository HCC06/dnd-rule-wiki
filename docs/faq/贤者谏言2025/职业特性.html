</strong>额外攻击对于你用来攻击的武器没有限制。你可以在攻击时使用正常武器、临时武器、徒手打击或三者组合使用。不过你仍需要遵循作为<em>攻击</em>动作的一部分拔出和收起武器的规则。</p></article><footer class="page-footer"><p>📚 📋 贤者谏言 2025 · 规则集 2024</p></footer></main></div><script src="/dnd-rule-wiki/assets/search.js"></script><script src="/dnd-rule-wiki/assets/sidebar.js"></script></body></html>
