<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>装备 — D&D Rule Wiki</title><link rel="stylesheet" href="/dnd-rule-wiki/assets/style.css"></head><body><div class="layout"><aside class="sidebar" id="sidebar"><div class="sidebar-head"><a href="/dnd-rule-wiki/" class="home-link">🐉 D&D Rule Wiki</a><input type="text" id="search-input" class="search-box" placeholder="搜索规则、法术、怪物…" autocomplete="off"><div id="search-results" class="search-results"></div></div><nav class="tree" id="tree"></nav></aside><main class="content"><nav class="breadcrumbs"><a href="/dnd-rule-wiki/faq/贤者谏言2025/">📋 贤者谏言 2025</a> <span class="sep">›</span> <span class="current">装备</span></nav><article class="rule-content"><h1>装备</h1><p><strong>重甲Heavy armor 会降低敏捷豁免或是属性检定吗？</strong><br />
只要你熟练重甲，它就不会影响你的豁免检定与属性检定（隐匿除外）。</p>
<p><strong>用盾牌攻击（通常是作为临时武器）时，我是否还能受益于它提供的AC+2的加值？</strong><br />
使用盾牌发动攻击并不会让你失去由它提供的AC加值。</p></article><footer class="page-footer"><p>📚 📋 贤者谏言 2025 · 规则集 2024</p></footer></main></div><script src="/dnd-rule-wiki/assets/search.js"></script><script src="/dnd-rule-wiki/assets/sidebar.js"></script></body></html>
