<p>D&amp;D世界中到处都是魔法，而其最常见的形式就是法术。本章主要介绍各种法术的施法规则。不同职业的角色以不同的方法学习和准备法术，而怪物们也有其独特的法术用法。但各种不同源头的法术都遵循此处所介绍的规则的规则。</p></article><footer class="page-footer"><p>📚 📖 玩家手册 2014 · 规则集 2014</p></footer></main></div><script src="/dnd-rule-wiki/assets/search.js"></script><script src="/dnd-rule-wiki/assets/sidebar.js"></script></body></html>
