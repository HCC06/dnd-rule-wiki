<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>专业实践 — D&D Rule Wiki</title><link rel="stylesheet" href="/dnd-rule-wiki/assets/style.css"></head><body><div class="layout"><aside class="sidebar" id="sidebar"><div class="sidebar-head"><a href="/dnd-rule-wiki/" class="home-link">🐉 D&D Rule Wiki</a><input type="text" id="search-input" class="search-box" placeholder="搜索规则、法术、怪物…" autocomplete="off"><div id="search-results" class="search-results"></div></div><nav class="tree" id="tree"></nav></aside><main class="content"><nav class="breadcrumbs"><a href="/dnd-rule-wiki/legacy-core/玩家手册/">📖 玩家手册 2014</a> <span class="sep">›</span> <a href="/dnd-rule-wiki/legacy-core/玩家手册/冒险/休整期活动/">休整期活动</a> <span class="sep">›</span> <span class="current">专业实践</span></nav><article class="rule-content"><h1>专业实践</h1><p>**专业实践Practicing a Profession **</p>
<p>你可以在冒险以外的时间工作，使你得以维持俭朴的生活而不需要付每日1gp的开销（详见第5章关于生活方式费用开支的相关内容）。只要你保持工作就可以持续获得该益处。 <br />
如果你隶属于可以提供高收入工作的组织，例如神庙或盗贼行会，则你的收入让你改为可以维持舒适的生活方式。<br />
如果你拥有表演技能的熟练项，并在休整时以表演维生，则你的收入让你改为可以维持富裕的生活方式。  </p></article><footer class="page-footer"><p>📚 📖 玩家手册 2014 · 规则集 2014</p></footer></main></div><script src="/dnd-rule-wiki/assets/search.js"></script><script src="/dnd-rule-wiki/assets/sidebar.js"></script></body></html>
