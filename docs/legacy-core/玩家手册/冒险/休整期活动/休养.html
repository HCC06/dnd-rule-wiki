<p>你可用休整的时间治疗遭受的重创、疾病、中毒等状况。<br />
每完成3日的休养活动，你可以进行一次DC 15的体质豁免。豁免成功则你可以选择以下效果之一:</p>
<p>l 终止身上一项妨碍你恢复生命值的效应。</p>
<p>l 随后的24小时内，对抵抗一项正生效的疾病或毒素效应所进行的豁免具有优势。</p></article><footer class="page-footer"><p>📚 📖 玩家手册 2014 · 规则集 2014</p></footer></main></div><script src="/dnd-rule-wiki/assets/search.js"></script><script src="/dnd-rule-wiki/assets/sidebar.js"></script></body></html>
