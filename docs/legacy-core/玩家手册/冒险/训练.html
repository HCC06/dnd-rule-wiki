<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>训练 — D&D Rule Wiki</title><link rel="stylesheet" href="/dnd-rule-wiki/assets/style.css"></head><body><div class="layout"><aside class="sidebar" id="sidebar"><div class="sidebar-head"><a href="/dnd-rule-wiki/" class="home-link">🐉 D&D Rule Wiki</a><input type="text" id="search-input" class="search-box" placeholder="搜索规则、法术、怪物…" autocomplete="off"><div id="search-results" class="search-results"></div></div><nav class="tree" id="tree"></nav></aside><main class="content"><nav class="breadcrumbs"><a href="/dnd-rule-wiki/legacy-core/玩家手册/">📖 玩家手册 2014</a> <span class="sep">›</span> <a href="/dnd-rule-wiki/legacy-core/玩家手册/冒险/">冒险</a> <span class="sep">›</span> <span class="current">训练</span></nav><article class="rule-content"><h1>训练</h1><p>**训练Training **</p>
<p>你可以用休整时间学习使用一门新语言或一套新工具。你的DM也可能允许你进行其他的训练项目。<br />
首先，你必须找到愿意教你的导师。DM决定寻找导师需时多久，以及是否需要进行一次或多次的属性检定。<br />
完成整个训练活动需要花费250日，且每日还要花费1gp。在你付出所需的时间和费用后，就可以习得相应的新语言，或获得新工具的熟练项。</p></article><footer class="page-footer"><p>📚 📖 玩家手册 2014 · 规则集 2014</p></footer></main></div><script src="/dnd-rule-wiki/assets/search.js"></script><script src="/dnd-rule-wiki/assets/sidebar.js"></script></body></html>
