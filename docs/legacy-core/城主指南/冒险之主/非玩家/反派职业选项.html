<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>反派职业选项 — D&D Rule Wiki</title><link rel="stylesheet" href="/dnd-rule-wiki/assets/style.css"></head><body><div class="layout"><aside class="sidebar" id="sidebar"><div class="sidebar-head"><a href="/dnd-rule-wiki/" class="home-link">🐉 D&D Rule Wiki</a><input type="text" id="search-input" class="search-box" placeholder="搜索规则、法术、怪物…" autocomplete="off"><div id="search-results" class="search-results"></div></div><nav class="tree" id="tree"></nav></aside><main class="content"><nav class="breadcrumbs"><a href="/dnd-rule-wiki/legacy-core/城主指南/">📖 城主指南 2014</a> <span class="sep">›</span> <a href="/dnd-rule-wiki/legacy-core/城主指南/冒险之主/非玩家/">非玩家</a> <span class="sep">›</span> <span class="current">反派职业选项</span></nav><article class="rule-content"><h1>反派职业选项</h1><h2 id="villainous-class-options"><strong>反派职业选项Villainous Class Options</strong></h2>
<p>你可以使用<em>《玩家手册》</em>中的规则如同创建玩家角色一样创建带职业和等级的NPC。以下的两个职业选项可以让你创建两个特殊的反派范型：邪恶高阶祭司，以及邪恶骑士或反圣武士。<br />
 死亡领域是邪恶牧师可选的一个额外领域，而破誓者则为那些从天恩陨落的圣武士提供了另一种选择。玩家也可以在你的同意下选用这些选项。</p></article><footer class="page-footer"><p>📚 📖 城主指南 2014 · 规则集 2014</p></footer></main></div><script src="/dnd-rule-wiki/assets/search.js"></script><script src="/dnd-rule-wiki/assets/sidebar.js"></script></body></html>
