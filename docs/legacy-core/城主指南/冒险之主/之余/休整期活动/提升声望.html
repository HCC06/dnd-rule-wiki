<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>提升声望 — D&D Rule Wiki</title><link rel="stylesheet" href="/dnd-rule-wiki/assets/style.css"></head><body><div class="layout"><aside class="sidebar" id="sidebar"><div class="sidebar-head"><a href="/dnd-rule-wiki/" class="home-link">🐉 D&D Rule Wiki</a><input type="text" id="search-input" class="search-box" placeholder="搜索规则、法术、怪物…" autocomplete="off"><div id="search-results" class="search-results"></div></div><nav class="tree" id="tree"></nav></aside><main class="content"><nav class="breadcrumbs"><a href="/dnd-rule-wiki/legacy-core/城主指南/">📖 城主指南 2014</a> <span class="sep">›</span> <a href="/dnd-rule-wiki/legacy-core/城主指南/冒险之主/之余/休整期活动/">休整期活动</a> <span class="sep">›</span> <span class="current">提升声望</span></nav><article class="rule-content"><h1>提升声望</h1><p><strong><span style="FONT-SIZE: 12pt; FONT-FAMILY: 黑体; COLOR: rgb(128,0,0); mso-ascii-font-family: 'Times New Roman'; mso-hansi-font-family: 'Times New Roman'; mso-bidi-font-weight: normal; mso-spacerun: 'yes'; mso-ansi-font-weight: bold">提升声望Gaining Renown</span><span style="FONT-SIZE: 12pt; FONT-FAMILY: 黑体; COLOR: rgb(128,0,0); mso-ascii-font-family: 'Times New Roman'; mso-hansi-font-family: 'Times New Roman'; mso-bidi-font-weight: normal; mso-spacerun: 'yes'; mso-ansi-font-weight: bold"></span></strong></p>
<p><span style="FONT-SIZE: 12pt; FONT-FAMILY: 宋体; mso-spacerun: 'yes'"> 角色可以使用其休整期提升自己在某特定的组织中的声望（见第1章中的“声望”）。角色在冒险之余还可以负责完成该组织的一些次要任务，并与其他成员进行社交互动。从事这项活动的总日数等于该角色当前声望乘与10的数值时，其声望即提升1。</span><span style="FONT-SIZE: 10.5pt; FONT-FAMILY: Calibri; mso-bidi-font-family: 'Times New Roman'; mso-fareast-font-family: 宋体; mso-font-kerning: 1.0000pt; mso-spacerun: 'yes'"></span></p></article><footer class="page-footer"><p>📚 📖 城主指南 2014 · 规则集 2014</p></footer></main></div><script src="/dnd-rule-wiki/assets/search.js"></script><script src="/dnd-rule-wiki/assets/sidebar.js"></script></body></html>
