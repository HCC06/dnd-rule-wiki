<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>创建非玩家角色 — D&D Rule Wiki</title><link rel="stylesheet" href="/dnd-rule-wiki/assets/style.css"></head><body><div class="layout"><aside class="sidebar" id="sidebar"><div class="sidebar-head"><a href="/dnd-rule-wiki/" class="home-link">🐉 D&D Rule Wiki</a><input type="text" id="search-input" class="search-box" placeholder="搜索规则、法术、怪物…" autocomplete="off"><div id="search-results" class="search-results"></div></div><nav class="tree" id="tree"></nav></aside><main class="content"><nav class="breadcrumbs"><a href="/dnd-rule-wiki/legacy-core/城主指南/">📖 城主指南 2014</a> <span class="sep">›</span> <a href="/dnd-rule-wiki/legacy-core/城主指南/冒险之主/">冒险之主</a> <span class="sep">›</span> <span class="current">创建非玩家角色</span></nav><article class="rule-content"><h1>创建非玩家角色</h1><p>非玩家角色是由地下城主控制的角色，简称NPC。NPC可以是敌人也可以是盟友，可以是普通的村民也可以是定名的怪物。他们包括当地旅店的老板，住在城外的塔楼的老法师，前去摧毁王国的死亡骑士，和在深窟老巢里数着金子的巨龙。<br />
 本章介绍如何为游戏填充非玩家角色。而为NPC生成与怪物资料相似的资料板的指引，请参阅第9章“城主工坊”。</p></article><footer class="page-footer"><p>📚 📖 城主指南 2014 · 规则集 2014</p></footer></main></div><script src="/dnd-rule-wiki/assets/search.js"></script><script src="/dnd-rule-wiki/assets/sidebar.js"></script></body></html>
