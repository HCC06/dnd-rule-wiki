<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>魔法物品自愈 — D&D Rule Wiki</title><link rel="stylesheet" href="/assets/style.css"></head><body><div class="layout"><aside class="sidebar" id="sidebar"><div class="sidebar-head"><a href="/" class="home-link">🐉 D&D Rule Wiki</a><input type="text" id="search-input" class="search-box" placeholder="搜索规则、法术、怪物…" autocomplete="off"><div id="search-results" class="search-results"></div></div><nav class="tree" id="tree"></nav></aside><main class="content"><nav class="breadcrumbs"><a href="/legacy-core/城主指南/">📖 城主指南 2014</a> <span class="sep">›</span> <a href="/legacy-core/城主指南/宝藏/">宝藏</a> <span class="sep">›</span> <span class="current">魔法物品自愈</span></nav><article class="rule-content"><h1>魔法物品自愈</h1><p><strong><span style="FONT-SIZE: 12pt; FONT-FAMILY: 黑体; COLOR: rgb(128,0,0); mso-hansi-font-family: 宋体; mso-bidi-font-weight: normal; mso-ansi-font-weight: bold; mso-spacerun: 'yes'">魔法物品自愈</span><span style="FONT-SIZE: 12pt; FONT-FAMILY: 'Times New Roman'; COLOR: rgb(128,0,0); mso-fareast-font-family: 黑体; mso-bidi-font-weight: normal; mso-ansi-font-weight: bold; mso-spacerun: 'yes'">Magic Item Resilience</span><span style="FONT-SIZE: 10.5pt; FONT-FAMILY: 'Times New Roman'; COLOR: rgb(128,0,0); mso-bidi-font-family: 宋体; mso-fareast-font-family: 黑体; mso-font-kerning: 1.0000pt; mso-bidi-font-weight: normal; mso-ansi-font-weight: bold; mso-spacerun: 'yes'"></span></strong></p>
<p><span style="FONT-SIZE: 12pt; FONT-FAMILY: 宋体; mso-spacerun: 'yes'"> </span><span style="FONT-SIZE: 12pt; FONT-FAMILY: 宋体; mso-spacerun: 'yes'">大多数魔法物品都是非凡工艺的作品。精心的制作结合魔法强化，使这些魔法物品的耐用性绝不逊色于相似的非魔法物品。除药水与卷轴外的大多数魔法物品都对所有类型伤害具有抗性。神器则尤其坚不可摧，而只能通过一些极端手段才能破坏。</span></p></article><footer class="page-footer"><p>📚 📖 城主指南 2014 · 规则集 2014</p></footer></main></div><script src="/assets/search.js"></script><script src="/assets/sidebar.js"></script></body></html>
