<p>大多数魔法物品都是非凡工艺的作品。精心的制作结合魔法强化，使这些魔法物品的耐用性绝不逊色于相似的非魔法物品。除药水与卷轴外的大多数魔法物品都对所有类型伤害具有抗性。神器则尤其坚不可摧，而只能通过一些极端手段才能破坏。</p></article><footer class="page-footer"><p>📚 📖 城主指南 2014 · 规则集 2014</p></footer></main></div><script src="/dnd-rule-wiki/assets/search.js"></script><script src="/dnd-rule-wiki/assets/sidebar.js"></script></body></html>
