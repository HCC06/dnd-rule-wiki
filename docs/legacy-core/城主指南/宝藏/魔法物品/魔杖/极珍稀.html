<em>魔杖，极珍稀（需施法者同调）</em><br />
这把魔杖有7发充能，且每天黎明时恢复1d6+1发已消耗的充能。当充能耗尽时，骰一次d20。如果骰值为1，魔杖将化为灰烬而毁灭。<br />
持握此魔杖期间，你可以用一个动作并消耗1发充能以施展法术 <em>变形术polymorph</em>（豁免DC 15）。</p></article><footer class="page-footer"><p>📚 📖 城主指南 2014 · 规则集 2014</p></footer></main></div><script src="/dnd-rule-wiki/assets/search.js"></script><script src="/dnd-rule-wiki/assets/sidebar.js"></script></body></html>
