<em>魔杖，非普通（+1）/珍稀（+2）/极珍稀（+3）（需施法者同调）</em><br />
持握此魔杖期间，你的法术攻击检定获得加值。加值的数值取决于魔杖的稀有度。另外，你在使用法术攻击时忽略半身掩护状态。</p></article><footer class="page-footer"><p>📚 📖 城主指南 2014 · 规则集 2014</p></footer></main></div><script src="/dnd-rule-wiki/assets/search.js"></script><script src="/dnd-rule-wiki/assets/sidebar.js"></script></body></html>
