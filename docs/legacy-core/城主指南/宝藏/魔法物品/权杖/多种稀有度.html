<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>多种稀有度 — D&D Rule Wiki</title><link rel="stylesheet" href="/dnd-rule-wiki/assets/style.css"></head><body><div class="layout"><aside class="sidebar" id="sidebar"><div class="sidebar-head"><a href="/dnd-rule-wiki/" class="home-link">🐉 D&D Rule Wiki</a><input type="text" id="search-input" class="search-box" placeholder="搜索规则、法术、怪物…" autocomplete="off"><div id="search-results" class="search-results"></div></div><nav class="tree" id="tree"></nav></aside><main class="content"><nav class="breadcrumbs"><a href="/dnd-rule-wiki/legacy-core/城主指南/">📖 城主指南 2014</a> <span class="sep">›</span> <a href="/dnd-rule-wiki/legacy-core/城主指南/宝藏/魔法物品/权杖/">权杖</a> <span class="sep">›</span> <span class="current">多种稀有度</span></nav><article class="rule-content"><h1>多种稀有度</h1><p><strong>契约掌控者权杖 Rod of the Pact Keeper，+1、+2、+3</strong><br />
<em>权杖，非普通（+1）/珍稀（+2）/极珍稀（+3）（需魔契师同调）</em><br />
持握这把权杖期间，你施展魔契师法术时法术攻击检定与豁免DC获得由权杖稀有度决定的加值。<br />
此外，持握这把权杖期间，你可以用一个动作恢复1枚魔契师法术位。你必须完成一次长休才能再次使用权杖的这个属性。</p></article><footer class="page-footer"><p>📚 📖 城主指南 2014 · 规则集 2014</p></footer></main></div><script src="/dnd-rule-wiki/assets/search.js"></script><script src="/dnd-rule-wiki/assets/sidebar.js"></script></body></html>
