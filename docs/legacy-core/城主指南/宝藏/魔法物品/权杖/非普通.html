<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>非普通 — D&D Rule Wiki</title><link rel="stylesheet" href="/dnd-rule-wiki/assets/style.css"></head><body><div class="layout"><aside class="sidebar" id="sidebar"><div class="sidebar-head"><a href="/dnd-rule-wiki/" class="home-link">🐉 D&D Rule Wiki</a><input type="text" id="search-input" class="search-box" placeholder="搜索规则、法术、怪物…" autocomplete="off"><div id="search-results" class="search-results"></div></div><nav class="tree" id="tree"></nav></aside><main class="content"><nav class="breadcrumbs"><a href="/dnd-rule-wiki/legacy-core/城主指南/">📖 城主指南 2014</a> <span class="sep">›</span> <a href="/dnd-rule-wiki/legacy-core/城主指南/宝藏/魔法物品/权杖/">权杖</a> <span class="sep">›</span> <span class="current">非普通</span></nav><article class="rule-content"><h1>非普通</h1><p><strong>不动权杖 Immovable Rod</strong><br />
<em>权杖，非普通</em><br />
这根铁制权杖的一端设有一按钮。如果你用一个动作按下按钮，权杖的魔法将把它固定在原地。权杖将保持不动（即使这违反重力）直到你或另一名生物用一个动作再次按下按钮。权杖最多能负载8,000磅的重量，超过则权杖的效应自动关闭并掉落。任一生物可以用一个动作进行一次DC 30的力量检定，成功则可以将权杖移动至多10尺。</p></article><footer class="page-footer"><p>📚 📖 城主指南 2014 · 规则集 2014</p></footer></main></div><script src="/dnd-rule-wiki/assets/search.js"></script><script src="/dnd-rule-wiki/assets/sidebar.js"></script></body></html>
