<p>魔法物品通常从被打败的怪物身上，以及发掘出的失落地窖里搜刮而来。这些物品能够为角色们发挥一些难以替代的作用，又或者以奇异的方式来辅助角色本身的能力。</p></article><footer class="page-footer"><p>📚 📖 城主指南 2014 · 规则集 2014</p></footer></main></div><script src="/dnd-rule-wiki/assets/search.js"></script><script src="/dnd-rule-wiki/assets/sidebar.js"></script></body></html>
