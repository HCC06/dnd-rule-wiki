<em>护甲（轻甲、中甲、或重甲），珍稀（+1）/极珍稀（+2）/传说（+3）</em><br />
着装该护甲期间，你的AC获得加值。加值的数值取决于护甲的稀有度。</p>
<p><strong>盾牌 Shield，+1、+2、或+3</strong><br />
<em>护甲（盾牌），非普通（+1）/珍稀（+2）/极珍稀（+3）<br />
</em>持握此盾牌期间，你的AC获得额外的加值。加值的数值取决于该盾牌的稀有度。<br />
这一AC加值会被算入盾牌正常情况下为你提供的AC值中。</p></article><footer class="page-footer"><p>📚 📖 城主指南 2014 · 规则集 2014</p></footer></main></div><script src="/dnd-rule-wiki/assets/search.js"></script><script src="/dnd-rule-wiki/assets/sidebar.js"></script></body></html>
