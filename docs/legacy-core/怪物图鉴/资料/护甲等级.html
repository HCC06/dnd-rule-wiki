<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>护甲等级 — D&D Rule Wiki</title><link rel="stylesheet" href="/assets/style.css"></head><body><div class="layout"><aside class="sidebar" id="sidebar"><div class="sidebar-head"><a href="/" class="home-link">🐉 D&D Rule Wiki</a><input type="text" id="search-input" class="search-box" placeholder="搜索规则、法术、怪物…" autocomplete="off"><div id="search-results" class="search-results"></div></div><nav class="tree" id="tree"></nav></aside><main class="content"><nav class="breadcrumbs"><a href="/legacy-core/怪物图鉴/">👹 怪物图鉴 2014</a> <span class="sep">›</span> <a href="/legacy-core/怪物图鉴/资料/">资料</a> <span class="sep">›</span> <span class="current">护甲等级</span></nav><article class="rule-content"><h1>护甲等级</h1><p><strong>护甲等级 Armor Class</strong></p>
<p>穿戴护甲或装备盾牌的怪物拥有的护甲等级（AC）等于其护甲、盾牌、以及敏捷属性调整值的总和。如果他们没有这些，怪物的AC将基于其所具有的敏捷调整值与天生护甲（如果有）的总和。</p>
<p>如果一个怪物<strong>具有天生护甲</strong>、<strong>穿戴着护甲</strong>、或<strong>持有着盾牌</strong>，那么其AC后方跟随的括号中将标注上这些内容。</p></article><footer class="page-footer"><p>📚 👹 怪物图鉴 2014 · 规则集 2014</p></footer></main></div><script src="/assets/search.js"></script><script src="/assets/sidebar.js"></script></body></html>
