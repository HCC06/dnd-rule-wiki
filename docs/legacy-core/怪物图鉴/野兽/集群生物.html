<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>集群 — D&D Rule Wiki</title><link rel="stylesheet" href="/dnd-rule-wiki/assets/style.css"></head><body><div class="layout"><aside class="sidebar" id="sidebar"><div class="sidebar-head"><a href="/dnd-rule-wiki/" class="home-link">🐉 D&D Rule Wiki</a><input type="text" id="search-input" class="search-box" placeholder="搜索规则、法术、怪物…" autocomplete="off"><div id="search-results" class="search-results"></div></div><nav class="tree" id="tree"></nav></aside><main class="content"><nav class="breadcrumbs"><a href="/dnd-rule-wiki/legacy-core/怪物图鉴/">👹 怪物图鉴 2014</a> <span class="sep">›</span> <a href="/dnd-rule-wiki/legacy-core/怪物图鉴/野兽/">野兽</a> <span class="sep">›</span> <span class="current">集群</span></nav><article class="rule-content"><h1>集群</h1><p><strong>自然集群The Nature of Swarms</strong></p>
<p>这里展示的并非普通或良性的小生物的集群。这些存在会造成一些恶性或有害的影响。一只吸血鬼可以在夜晚最黑暗的角落里召唤蝙蝠集群和鼠集群，而一只木乃伊本身的存在就可以使圣甲虫从其陵墓深处的沙土中翻涌而出。一个鬼婆可能拥有召唤渡鸦集群攻击其敌人的力量，而一只蛇人却可能会让毒蛇集群跟在自己的身后。德鲁伊无法魅惑这些集群，虽说它们的侵略性本身也很不符合自然的天性。</p></article><footer class="page-footer"><p>📚 👹 怪物图鉴 2014 · 规则集 2014</p></footer></main></div><script src="/dnd-rule-wiki/assets/search.js"></script><script src="/dnd-rule-wiki/assets/sidebar.js"></script></body></html>
