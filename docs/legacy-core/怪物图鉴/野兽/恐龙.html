<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>恐龙 — D&D Rule Wiki</title><link rel="stylesheet" href="/dnd-rule-wiki/assets/style.css"></head><body><div class="layout"><aside class="sidebar" id="sidebar"><div class="sidebar-head"><a href="/dnd-rule-wiki/" class="home-link">🐉 D&D Rule Wiki</a><input type="text" id="search-input" class="search-box" placeholder="搜索规则、法术、怪物…" autocomplete="off"><div id="search-results" class="search-results"></div></div><nav class="tree" id="tree"></nav></aside><main class="content"><nav class="breadcrumbs"><a href="/dnd-rule-wiki/legacy-core/怪物图鉴/">👹 怪物图鉴 2014</a> <span class="sep">›</span> <a href="/dnd-rule-wiki/legacy-core/怪物图鉴/野兽/">野兽</a> <span class="sep">›</span> <span class="current">恐龙</span></nav><article class="rule-content"><h1>恐龙</h1><h1 id="dinosaurs">恐龙Dinosaurs</h1>
<p>恐龙或远古巨兽们behemoths几乎是世上最古老的爬行动物。肉食性恐龙是残忍而又自私的猎人。草食性恐龙没有太多攻击性，不过它们会为了保护幼崽而奋起反击。<br />
 各种恐龙长着各异的体形体态。其中大多体色单调，当然也有少数品种绚丽多彩如鸟类一样。恐龙漫步在崎岖偏远而人迹罕至之地。诸如大山腹地的峡谷，难以接近的高原，热带岛屿或是深远的沼泽地区中。</p></article><footer class="page-footer"><p>📚 👹 怪物图鉴 2014 · 规则集 2014</p></footer></main></div><script src="/dnd-rule-wiki/assets/search.js"></script><script src="/dnd-rule-wiki/assets/sidebar.js"></script></body></html>
