<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>11 月亮 — D&D Rule Wiki</title><link rel="stylesheet" href="/dnd-rule-wiki/assets/style.css"></head><body><div class="layout"><aside class="sidebar" id="sidebar"><div class="sidebar-head"><a href="/dnd-rule-wiki/" class="home-link">🐉 D&D Rule Wiki</a><input type="text" id="search-input" class="search-box" placeholder="搜索规则、法术、怪物…" autocomplete="off"><div id="search-results" class="search-results"></div></div><nav class="tree" id="tree"></nav></aside><main class="content"><nav class="breadcrumbs"><a href="/dnd-rule-wiki/legacy-supplements/万象无常书/">万象无常书</a> <span class="sep">›</span> <a href="/dnd-rule-wiki/legacy-supplements/万象无常书/月亮/">月亮</a> <span class="sep">›</span> <span class="current">11 月亮</span></nav><article class="rule-content"><h1>11 月亮</h1><p>这一章详细描述了月之潜猎者，一个由邪恶兽化人组成的盗贼公会，地下城主可以将其用于任何D&amp;D场景，作为罪犯，敌对的宝藏猎人，或赞助者。从万象无常牌里抽出月亮牌的角色们可能会与月之潜猎者相遇，因为这张牌能实现月之潜猎者想实现的愿望。</p></article><footer class="page-footer"><p>📚 万象无常书 · 规则集 2014</p></footer></main></div><script src="/dnd-rule-wiki/assets/search.js"></script><script src="/dnd-rule-wiki/assets/sidebar.js"></script></body></html>
