<h1 id="key">第二章：钥匙 Key</h1>
<p><strong>万象无常牌Deck of Many Things</strong> 是一件复杂的魔法物品，将其引入游戏中对DM来说很有挑战性。本章讨论了许多</p>
<p>对DM来说很重要的问题：</p>
<ul>
<li>牌组的起源和本质</li>
<li>在不（超出DM控制地）干扰战役的前提下使用牌组</li>
<li>构建一个仅包含特定卡牌的牌组</li>
<li>将牌组的效果融入到战役中</li>
<li>与每张卡关联的新魔法效果</li>
<li>为想要创造专属卡牌的角色提供的冒险原因</li>
</ul></article><footer class="page-footer"><p>📚 万象无常书 · 规则集 2014</p></footer></main></div><script src="/assets/search.js"></script><script src="/assets/sidebar.js"></script></body></html>
