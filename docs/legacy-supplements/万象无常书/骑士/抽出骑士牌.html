<p>本节将为从 <strong>万象无常牌Deck of Many Things</strong> 中抽出骑士卡的角色出发，为这些角色的DM提供相关的建议，以及那些伴这些角色左右之盟友的常规建议。此外，从牌组中召唤的“骑士”，也将可以一名忠诚的构装生物：<strong>牌组守卫Deck Defender</strong>。</p></article><footer class="page-footer"><p>📚 万象无常书 · 规则集 2014</p></footer></main></div><script src="/dnd-rule-wiki/assets/search.js"></script><script src="/dnd-rule-wiki/assets/sidebar.js"></script></body></html>
