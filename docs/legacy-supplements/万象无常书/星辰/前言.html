<p>当伊斯图斯创造第一幅<strong>万象无常牌Deck of Many Things</strong>时,她为每张卡都选取了一个星座。<br />
这一章将要介绍这些被后人称为<strong>万象星天Sky of many Things</strong>的星座；并完善这些包含在一个十二宫中的星座对在其下出生者命运的魔法效果。<br />
这一章的后半部分倾向于为DM设计，包含被称为天文台的天文观察与学习场所，其细节与规则。</p></article><footer class="page-footer"><p>📚 万象无常书 · 规则集 2014</p></footer></main></div><script src="/dnd-rule-wiki/assets/search.js"></script><script src="/dnd-rule-wiki/assets/sidebar.js"></script></body></html>
