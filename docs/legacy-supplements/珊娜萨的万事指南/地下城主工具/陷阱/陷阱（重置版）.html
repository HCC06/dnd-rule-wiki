<p>《城主指南》中的陷阱规则提供了在游戏桌上管理陷阱所需的基本信息。不过这里的材料采用了一种不同的、更精细的方法——从游戏机制的角度来描述陷阱，并指导如何使用这些新规则创建自己的陷阱。</p>
<p>这些规则并没有将陷阱定性为机械陷阱或魔法陷阱，而是将陷阱分为另外两类：简单陷阱和复杂陷阱。</p></article><footer class="page-footer"><p>📚 珊娜萨的万事指南 · 规则集 2014</p></footer></main></div><script src="/dnd-rule-wiki/assets/search.js"></script><script src="/dnd-rule-wiki/assets/sidebar.js"></script></body></html>
