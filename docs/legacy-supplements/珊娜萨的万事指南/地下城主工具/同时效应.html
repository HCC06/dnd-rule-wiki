<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>New Item — D&D Rule Wiki</title><link rel="stylesheet" href="/assets/style.css"></head><body><div class="layout"><aside class="sidebar" id="sidebar"><div class="sidebar-head"><a href="/" class="home-link">🐉 D&D Rule Wiki</a><input type="text" id="search-input" class="search-box" placeholder="搜索规则、法术、怪物…" autocomplete="off"><div id="search-results" class="search-results"></div></div><nav class="tree" id="tree"></nav></aside><main class="content"><nav class="breadcrumbs"><a href="/legacy-supplements/珊娜萨的万事指南/">珊娜萨的万事指南</a> <span class="sep">›</span> <a href="/legacy-supplements/珊娜萨的万事指南/地下城主工具/">地下城主工具</a> <span class="sep">›</span> <span class="current">New Item</span></nav><article class="rule-content"><h1>New Item</h1><p><strong>同时效应 Simultaneous Effects</strong></p>
<p>游戏中的大部分效应都是按照规则或DM安排的顺序依次发生的。在罕见的情况下，尤其是在某个生物的回合开始或结束时，可能会出现同时发生的效应。如果复数事件同时发生在角色或怪物的回合中，那么将由控制该生物的人——玩家或DM——来决定这些事件发生的顺序。例如，在某位玩家角色的回合结束时同时存在两个效应，则该玩家决定两个效应中的哪一个先生效。</p></article><footer class="page-footer"><p>📚 珊娜萨的万事指南 · 规则集 2014</p></footer></main></div><script src="/assets/search.js"></script><script src="/assets/sidebar.js"></script></body></html>
