<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>精金武器 — D&D Rule Wiki</title><link rel="stylesheet" href="/dnd-rule-wiki/assets/style.css"></head><body><div class="layout"><aside class="sidebar" id="sidebar"><div class="sidebar-head"><a href="/dnd-rule-wiki/" class="home-link">🐉 D&D Rule Wiki</a><input type="text" id="search-input" class="search-box" placeholder="搜索规则、法术、怪物…" autocomplete="off"><div id="search-results" class="search-results"></div></div><nav class="tree" id="tree"></nav></aside><main class="content"><nav class="breadcrumbs"><a href="/dnd-rule-wiki/legacy-supplements/珊娜萨的万事指南/">珊娜萨的万事指南</a> <span class="sep">›</span> <a href="/dnd-rule-wiki/legacy-supplements/珊娜萨的万事指南/地下城主工具/">地下城主工具</a> <span class="sep">›</span> <span class="current">精金武器</span></nav><article class="rule-content"><h1>精金武器</h1><p><strong>精金武器 Adamantine Weapons</strong></p>
<p>精金是从陨石和特殊矿脉中发现的超硬金属。除了被用来制作 <em>精金护甲Adamantine armor</em>（详见《城主指南》的“魔法物品”章节），该金属也用于锻造武器。</p>
<p>精金锻造或有精金镀层的近战武器和弹药具有极强的破坏能力。每当一件精金武器或一发精金弹药命中一个物件时，这次攻击会造成重击。</p>
<p>精金制成的近战武器或每十发弹药会比普通货色额外花费500金币，无论该武器或弹药是通体由精金打造还是仅仅镀了一层。</p></article><footer class="page-footer"><p>📚 珊娜萨的万事指南 · 规则集 2014</p></footer></main></div><script src="/dnd-rule-wiki/assets/search.js"></script><script src="/dnd-rule-wiki/assets/sidebar.js"></script></body></html>
