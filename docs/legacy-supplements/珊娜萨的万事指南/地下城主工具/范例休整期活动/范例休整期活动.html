<p>任何角色都可以进行下列活动只要他们足以负担。作为DM，你有权力最终决定角色们可以使用哪些活动。你允许的活动可能取决于角色所在区域的性质。例如，你可能会禁止创造魔法物品，因为角色的所在位置太偏僻而难以购买这些商品。</p></article><footer class="page-footer"><p>📚 珊娜萨的万事指南 · 规则集 2014</p></footer></main></div><script src="/assets/search.js"></script><script src="/assets/sidebar.js"></script></body></html>
