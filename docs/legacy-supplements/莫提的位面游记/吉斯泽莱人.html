<p><span style="DISPLAY: inline !important">吉斯泽莱人与吉斯洋基人有着共同的祖先——一个被夺心魔摧毁并改造的，古老的民族。许多吉斯泽莱人居于混沌海之中，在这混乱的位面中塑造家园，以磨练它们的灵能力量。而此处描述的吉斯泽莱人经常穿越印记城与外域的传送门至其他位面旅行，有关其他吉斯泽莱人的描述见</span><strong>《怪物图鉴》</strong><span style="DISPLAY: inline !important">。</span></p></article><footer class="page-footer"><p>📚 莫提的位面游记 · 规则集 2014</p></footer></main></div><script src="/dnd-rule-wiki/assets/search.js"></script><script src="/dnd-rule-wiki/assets/sidebar.js"></script></body></html>
