<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>魔冢(高阶魔冢) — D&D Rule Wiki</title><link rel="stylesheet" href="/dnd-rule-wiki/assets/style.css"></head><body><div class="layout"><aside class="sidebar" id="sidebar"><div class="sidebar-head"><a href="/dnd-rule-wiki/" class="home-link">🐉 D&D Rule Wiki</a><input type="text" id="search-input" class="search-box" placeholder="搜索规则、法术、怪物…" autocomplete="off"><div id="search-results" class="search-results"></div></div><nav class="tree" id="tree"></nav></aside><main class="content"><nav class="breadcrumbs"><a href="/dnd-rule-wiki/legacy-supplements/莫提的位面游记/">莫提的位面游记</a> <span class="sep">›</span> <span class="current">魔冢(高阶魔冢)</span></nav><article class="rule-content"><h1>魔冢(高阶魔冢)</h1><p><strong>魔冢Modrons</strong></p>
<p><span style="DISPLAY: inline !important"> 魔冢是一种部分由机械组成的生物，它们被铸造于机械境位面，遵从着严格的阶级制度。每一个魔冢都恪尽职守地服从来自直接上级的命令，同时也指挥着直接下级，从而将最高秩序典范的意志层层传递到最低阶的一元冢。大部分魔冢都是低阶的<strong><em>基础魔冢base modrons</em></strong> ......</span><em>一元冢</em><span style="DISPLAY: inline !important">，</span><em>二元冢</em><span style="DISPLAY: inline !important">，</span><em>三元冢</em><span style="DISPLAY: inline !important">，</span><em>四元冢</em><span style="DISPLAY: inline !important">，</span><em>五元冢</em><span style="DISPLAY: inline !important">，而</span><strong><em>高阶魔冢hierarchy modron</em></strong><span style="DISPLAY: inline !important">则作为领导者，维护着机械境与该位面之外的秩序。关于魔冢的更多资料，请查阅</span><strong><em>《怪物图鉴》</em></strong><span style="DISPLAY: inline !important">。</span></p></article><footer class="page-footer"><p>📚 莫提的位面游记 · 规则集 2014</p></footer></main></div><script src="/dnd-rule-wiki/assets/search.js"></script><script src="/dnd-rule-wiki/assets/sidebar.js"></script></body></html>
