<p>就像许多英雄作为神选服侍诸神一样，很多反派也一样服务于他们的意志。每位神灵的章节都提供了关于NPC的热眈而使他们的行为进入了邪恶的方向。它也提供了在冒险中可能协助神祗或服务敌人的怪物种类，如怪物图鉴中的侍僧和祭司以及本书第六章中的先知。</p></article><footer class="page-footer"><p>📚 塞洛斯之神话奥德赛 · 规则集 2014</p></footer></main></div><script src="/dnd-rule-wiki/assets/search.js"></script><script src="/dnd-rule-wiki/assets/sidebar.js"></script></body></html>
