<p>你可以围绕一名神祗的罪恶计划与行为来构建一次战役，将英勇冒险者与那名神祗的仆人与密使的对抗贯穿他们的冒险生涯。每个神祗条目都提供了关于战役可能如何进行的建议。此外，一张神祗谋划表显示了一位神明可能追求的野心或他们可能产生的威胁，来作为一场战役的首要敌手。</p></article><footer class="page-footer"><p>📚 塞洛斯之神话奥德赛 · 规则集 2014</p></footer></main></div><script src="/assets/search.js"></script><script src="/assets/sidebar.js"></script></body></html>
