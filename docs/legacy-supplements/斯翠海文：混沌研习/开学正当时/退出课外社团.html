<p>角色可以随时退出课外社团，并相应地更新其记录表。<br />
当一个学生退出课外社团时，他们即刻失去由该课外社团带来的增益。如果一个角色在冒险中途退出了课外社团，你们或许需要对该场景进行角色扮演，因为课外社团中的 NPC 可能疑惑这个学生为什么要离开。</p></article><footer class="page-footer"><p>📚 斯翠海文：混沌研习 · 规则集 2014</p></footer></main></div><script src="/dnd-rule-wiki/assets/search.js"></script><script src="/dnd-rule-wiki/assets/sidebar.js"></script></body></html>
