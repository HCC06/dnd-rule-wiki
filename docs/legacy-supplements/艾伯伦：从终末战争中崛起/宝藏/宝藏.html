<p>魔法在科瓦雷的日常生活中扮演着非常重要的角色。稀有度为普通的魔法物品俯拾皆是，魔法经济以一种被称为龙晶（dragonshard）的水晶为燃料蓬勃运转，而这种水晶也被用于增幅龙纹（dragonmark）的力量。</p></article><footer class="page-footer"><p>📚 艾伯伦：从终末战争中崛起 · 规则集 2014</p></footer></main></div><script src="/dnd-rule-wiki/assets/search.js"></script><script src="/dnd-rule-wiki/assets/sidebar.js"></script></body></html>
