<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>纽吉怪 — D&D Rule Wiki</title><link rel="stylesheet" href="/assets/style.css"></head><body><div class="layout"><aside class="sidebar" id="sidebar"><div class="sidebar-head"><a href="/" class="home-link">🐉 D&D Rule Wiki</a><input type="text" id="search-input" class="search-box" placeholder="搜索规则、法术、怪物…" autocomplete="off"><div id="search-results" class="search-results"></div></div><nav class="tree" id="tree"></nav></aside><main class="content"><nav class="breadcrumbs"><a href="/legacy-supplements/多元宇宙的怪物/">多元宇宙的怪物</a> <span class="sep">›</span> <a href="/legacy-supplements/多元宇宙的怪物/图鉴/异怪/">异怪</a> <span class="sep">›</span> <span class="current">纽吉怪</span></nav><article class="rule-content"><h1>纽吉怪</h1><p><strong>纽吉怪 Neogi</strong></p>
<p>纽吉怪看上去像是大号的蜘蛛，长着鳗鱼一样的脖子和脑袋。这种生物能够毒害目标的身体和心灵，进而制服比它们更强壮的生物。<br />
纽吉怪通常生活在物质位面的偏远角落，比如星界和以太位面。它们抛弃了它们原来的家园去征服和吞并其他世界的生物。在此期间，纽吉怪首先奴役了掘土巨怪。然后，使用它们作为苦力，纽吉怪建造了蜘蛛般的圆滑船只，令它们能够在多元宇宙中遨游。</p></article><footer class="page-footer"><p>📚 多元宇宙的怪物 · 规则集 2014</p></footer></main></div><script src="/assets/search.js"></script><script src="/assets/sidebar.js"></script></body></html>
