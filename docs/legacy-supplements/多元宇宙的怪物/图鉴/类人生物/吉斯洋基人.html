<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>吉斯洋基人 — D&D Rule Wiki</title><link rel="stylesheet" href="/assets/style.css"></head><body><div class="layout"><aside class="sidebar" id="sidebar"><div class="sidebar-head"><a href="/" class="home-link">🐉 D&D Rule Wiki</a><input type="text" id="search-input" class="search-box" placeholder="搜索规则、法术、怪物…" autocomplete="off"><div id="search-results" class="search-results"></div></div><nav class="tree" id="tree"></nav></aside><main class="content"><nav class="breadcrumbs"><a href="/legacy-supplements/多元宇宙的怪物/">多元宇宙的怪物</a> <span class="sep">›</span> <a href="/legacy-supplements/多元宇宙的怪物/图鉴/类人生物/">类人生物</a> <span class="sep">›</span> <span class="current">吉斯洋基人</span></nav><article class="rule-content"><h1>吉斯洋基人</h1><p><strong>吉斯洋基人 Githyanki</strong></p>
<p>吉斯洋基人是一个古老种族的后裔，他们同时也和吉斯泽莱人有着共同的起源（也在此书中）。这些高挑且瘦削的人们拥有强大的灵能，而且大部分时间都住在星界中。其中最著名的吉斯洋基人便是巫妖女王维拉基斯的好战追随者。他们威胁着星界，袭击诸多位面，掠夺多元宇宙的魔法和财富。</p></article><footer class="page-footer"><p>📚 多元宇宙的怪物 · 规则集 2014</p></footer></main></div><script src="/assets/search.js"></script><script src="/assets/sidebar.js"></script></body></html>
