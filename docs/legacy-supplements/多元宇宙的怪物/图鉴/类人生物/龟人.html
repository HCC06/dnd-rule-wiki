<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>龟人 — D&D Rule Wiki</title><link rel="stylesheet" href="/dnd-rule-wiki/assets/style.css"></head><body><div class="layout"><aside class="sidebar" id="sidebar"><div class="sidebar-head"><a href="/dnd-rule-wiki/" class="home-link">🐉 D&D Rule Wiki</a><input type="text" id="search-input" class="search-box" placeholder="搜索规则、法术、怪物…" autocomplete="off"><div id="search-results" class="search-results"></div></div><nav class="tree" id="tree"></nav></aside><main class="content"><nav class="breadcrumbs"><a href="/dnd-rule-wiki/legacy-supplements/多元宇宙的怪物/">多元宇宙的怪物</a> <span class="sep">›</span> <a href="/dnd-rule-wiki/legacy-supplements/多元宇宙的怪物/图鉴/类人生物/">类人生物</a> <span class="sep">›</span> <span class="current">龟人</span></nav><article class="rule-content"><h1>龟人</h1><p><strong>龟人 Tortles</strong></p>
<p>龟人是杂食性的龟型两足类人生物，龟壳覆盖了他们的大部分身体。由于他们认为龟壳所在即是吾乡，所以龟人对于脚下的土地没有什么眷恋的感情，不会在一地停留很久。<br />
大多数龟人喜欢观察别人是如何生活的。因为把他们现在的伙伴视为家人，一个龟人可能离开故土数十年都不会涌起思乡之情。</p></article><footer class="page-footer"><p>📚 多元宇宙的怪物 · 规则集 2014</p></footer></main></div><script src="/dnd-rule-wiki/assets/search.js"></script><script src="/dnd-rule-wiki/assets/sidebar.js"></script></body></html>
