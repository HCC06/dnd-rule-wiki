<p>食人魔喜欢一头冲进战场，但只要有足够的时间和耐心训练，他们中的少数也可以学会执行战场上的特殊任务。他们依照职能被授予攻城锤、弩炮手、链斗士和轿舆之名。这些工作很简单,但是能有效利用一个食人魔的力量优势。</p></article><footer class="page-footer"><p>📚 多元宇宙的怪物 · 规则集 2014</p></footer></main></div><script src="/dnd-rule-wiki/assets/search.js"></script><script src="/dnd-rule-wiki/assets/sidebar.js"></script></body></html>
