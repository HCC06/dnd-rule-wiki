<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>熔螈 — D&D Rule Wiki</title><link rel="stylesheet" href="/assets/style.css"></head><body><div class="layout"><aside class="sidebar" id="sidebar"><div class="sidebar-head"><a href="/" class="home-link">🐉 D&D Rule Wiki</a><input type="text" id="search-input" class="search-box" placeholder="搜索规则、法术、怪物…" autocomplete="off"><div id="search-results" class="search-results"></div></div><nav class="tree" id="tree"></nav></aside><main class="content"><nav class="breadcrumbs"><a href="/legacy-supplements/多元宇宙的怪物/">多元宇宙的怪物</a> <span class="sep">›</span> <a href="/legacy-supplements/多元宇宙的怪物/图鉴/元素/">元素</a> <span class="sep">›</span> <span class="current">熔螈</span></nav><article class="rule-content"><h1>熔螈</h1><p><strong>熔螈 Firenewts</strong></p>
<p>自火元素位面而来，物质位面的那些温泉与火山地区，往往能找到熔螈的踪迹。这些两栖生物需要栖息于滚烫热水之中，一旦它们远离潮湿与高温的地方一周便会变得无比惫怠。因此，熔螈们会从大地之中探寻热源，并在它们的巢穴之中制造出一条条通道组成的网络，以此让那些滚烫液体流遍整座巢穴。</p></article><footer class="page-footer"><p>📚 多元宇宙的怪物 · 规则集 2014</p></footer></main></div><script src="/assets/search.js"></script><script src="/assets/sidebar.js"></script></body></html>
