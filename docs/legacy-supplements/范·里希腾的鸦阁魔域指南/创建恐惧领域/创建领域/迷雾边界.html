<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>迷雾边界 — D&D Rule Wiki</title><link rel="stylesheet" href="/dnd-rule-wiki/assets/style.css"></head><body><div class="layout"><aside class="sidebar" id="sidebar"><div class="sidebar-head"><a href="/dnd-rule-wiki/" class="home-link">🐉 D&D Rule Wiki</a><input type="text" id="search-input" class="search-box" placeholder="搜索规则、法术、怪物…" autocomplete="off"><div id="search-results" class="search-results"></div></div><nav class="tree" id="tree"></nav></aside><main class="content"><nav class="breadcrumbs"><a href="/dnd-rule-wiki/legacy-supplements/范·里希腾的鸦阁魔域指南/">范·里希腾的鸦阁魔域指南</a> <span class="sep">›</span> <a href="/dnd-rule-wiki/legacy-supplements/范·里希腾的鸦阁魔域指南/创建恐惧领域/创建领域/">创建领域</a> <span class="sep">›</span> <span class="current">迷雾边界</span></nav><article class="rule-content"><h1>迷雾边界</h1><h3 id="misty-borders"><strong><span style="FONT-SIZE: 13.5pt;  FONT-WEIGHT: bold; ;">迷雾边界</span><span style="FONT-SIZE: 13.5pt;  FONT-WEIGHT: bold; ;">Misty Borders</span><span style="FONT-SIZE: 13.5pt;  FONT-WEIGHT: bold; ;"></span></strong></h3>
<p><span style="">用几句话描述一下鸦阁魔域的迷雾是如何在你的领域中运作的。这可能与第三章开头所详述的大致相同，或者它们也可能反映出黑暗领主的本性。请考虑以下问题</span><span style="mso-bidi-font-family: 'Times New Roman'">:</span><span style="mso-bidi-font-family: 'Times New Roman'"></span></p>
<p><span style="mso-bidi-font-family: 'Times New Roman'"></span></p>
<p><span style="mso-bidi-font-family: 'Times New Roman'">- 迷雾中出现了什么形状、声音和气味？</span><span style="mso-bidi-font-family: 'Times New Roman'"></span></p>
<p><span style="mso-bidi-font-family: 'Times New Roman'">- 迷雾是否以某种可预测的方式行事？</span><span style="mso-bidi-font-family: 'Times New Roman'"></span></p>
<p><span style="mso-bidi-font-family: 'Times New Roman'">- 该领域的人给迷雾赋予了什么故事？他们是否为它们赋予了个性？</span><span style="mso-bidi-font-family: 'Times New Roman'"></span></p>
<p><span style="mso-bidi-font-family: 'Times New Roman'">- 除了该领域的边界，迷雾还出现在哪里？</span><span style="mso-bidi-font-family: 'Times New Roman'"></span></p>
<p><span style="mso-bidi-font-family: 'Times New Roman'">- 黑暗领主是如何利用迷雾来关闭他们领地的边界的（详见第三章）？</span><span style="mso-bidi-font-family: 'Times New Roman'"></span></p></article><footer class="page-footer"><p>📚 范·里希腾的鸦阁魔域指南 · 规则集 2014</p></footer></main></div><script src="/dnd-rule-wiki/assets/search.js"></script><script src="/dnd-rule-wiki/assets/sidebar.js"></script></body></html>
