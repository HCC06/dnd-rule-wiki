<p>幽魂、夺心魔、狼人每一个怪物都是一个故事。考虑哪些怪物可以补充或与黑暗领主的故事对比。用几句话描述哪些怪物最能代表黑暗领主的邪恶，哪些怪物可能对黑暗领主的计划不利。例如，邪恶的黑暗领主科学家可能会得到血肉魔像和蠕行之爪的帮助，但他们会受到因黑暗领主的实验而受苦的树精和幽魂的反对。为了获得灵感，请参考 "黑暗领主的阴影 "部分和你对该部分问题的回答，以及本章后面 "恐怖题材 "部分的怪物表。</p></article><footer class="page-footer"><p>📚 范·里希腾的鸦阁魔域指南 · 规则集 2014</p></footer></main></div><script src="/dnd-rule-wiki/assets/search.js"></script><script src="/dnd-rule-wiki/assets/sidebar.js"></script></body></html>
