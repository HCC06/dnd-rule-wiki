<p>创造恐怖场景并不完全是优秀故事叙述的结果。作为全书所强调的，任何规则都可以制造恐怖效果，用黑暗的游戏资源来呈现恐怖或是使用新可选规则制造恐怖都可以。本节进一步提供了能让现有规则更突出恐怖主题的可选项和鼓励独特恐怖经历的表现系统。</p></article><footer class="page-footer"><p>📚 范·里希腾的鸦阁魔域指南 · 规则集 2014</p></footer></main></div><script src="/dnd-rule-wiki/assets/search.js"></script><script src="/dnd-rule-wiki/assets/sidebar.js"></script></body></html>
