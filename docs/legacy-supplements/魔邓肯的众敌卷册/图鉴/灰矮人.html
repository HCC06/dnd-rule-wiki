<p>残暴的灰矮人不仅策划着要击败其他矮人，还准备推翻整个矮人神系，作为将他们抛弃，任由他们被夺心魔奴役的复仇。为了达成这个目标，灰矮人将他们的勇士训练成各种不同的兵种。<br />
