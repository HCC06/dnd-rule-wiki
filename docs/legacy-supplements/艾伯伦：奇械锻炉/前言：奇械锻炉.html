<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>前言：奇械锻炉 — D&D Rule Wiki</title><link rel="stylesheet" href="/dnd-rule-wiki/assets/style.css"></head><body><div class="layout"><aside class="sidebar" id="sidebar"><div class="sidebar-head"><a href="/dnd-rule-wiki/" class="home-link">🐉 D&D Rule Wiki</a><input type="text" id="search-input" class="search-box" placeholder="搜索规则、法术、怪物…" autocomplete="off"><div id="search-results" class="search-results"></div></div><nav class="tree" id="tree"></nav></aside><main class="content"><nav class="breadcrumbs"><a href="/dnd-rule-wiki/legacy-supplements/艾伯伦：奇械锻炉/">艾伯伦：奇械锻炉</a> <span class="sep">›</span> <span class="current">前言：奇械锻炉</span></nav><article class="rule-content"><h1>前言：奇械锻炉</h1><p>铁牛之息，<br />
不凝为石，反孕新生；<br />
烈焰之炽，<br />
不焚万物，而兴造化；<br />
断垣之上，<br />
高塔再峙，直探穹苍。<br />
是时也，<br />
余烬潜燃，<br />
于幽昧之中；<br />
五将出，<br />
龙将陨。</p>
<p><strong>——巨龙预言</strong></p>
<p>本书是《艾伯伦：从终末战争中崛起》的深度补充资料。前书是一部全面介绍艾伯伦世界的指南，而本书则为你的艾伯伦战役增添了全新的角色选项、战役框架和载具规则。你并非必须拥有前书才能使用本书，但这两本书搭配使用效果最佳。你将在本书中频繁地发现对《艾伯伦：从终末战争中崛起》的引用和参考。</p></article><footer class="page-footer"><p>📚 艾伯伦：奇械锻炉 · 规则集 2014</p></footer></main></div><script src="/dnd-rule-wiki/assets/search.js"></script><script src="/dnd-rule-wiki/assets/sidebar.js"></script></body></html>
