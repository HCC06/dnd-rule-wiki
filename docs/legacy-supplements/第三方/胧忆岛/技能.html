<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>技能 — D&D Rule Wiki</title><link rel="stylesheet" href="/dnd-rule-wiki/assets/style.css"></head><body><div class="layout"><aside class="sidebar" id="sidebar"><div class="sidebar-head"><a href="/dnd-rule-wiki/" class="home-link">🐉 D&D Rule Wiki</a><input type="text" id="search-input" class="search-box" placeholder="搜索规则、法术、怪物…" autocomplete="off"><div id="search-results" class="search-results"></div></div><nav class="tree" id="tree"></nav></aside><main class="content"><nav class="breadcrumbs"><a href="/dnd-rule-wiki/legacy-supplements/第三方/">第三方</a> <span class="sep">›</span> <a href="/dnd-rule-wiki/legacy-supplements/第三方/胧忆岛/">胧忆岛</a> <span class="sep">›</span> <span class="current">技能</span></nav><article class="rule-content"><h1>技能</h1><h2 id="skills">技能 Skills</h2>
<p>下文中描述了两项新技能，它们在胧忆岛上专门被工匠和药水酿造师使用。</p>
<h3 id="mechanics">机械 Mechanics</h3>
<p>你的智力（机械）检定用于衡量你理解、操作、制作和修理非魔法机械的能力。</p>
<h3 id="salvage">回收 Salvage</h3>
<p>DM可能会要求你进行智力（回收）检定，以寻找、拆卸或回忆与魔法和非魔法机械或药水相关的机械零件信息。</p></article><footer class="page-footer"><p>📚 第三方 · 规则集 2014</p></footer></main></div><script src="/dnd-rule-wiki/assets/search.js"></script><script src="/dnd-rule-wiki/assets/sidebar.js"></script></body></html>
