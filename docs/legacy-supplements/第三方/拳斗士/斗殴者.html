<p><strong>栖息地：</strong> 任意；<strong>宝藏：</strong>个体</p>
<p>斗殴者喧闹而又莽撞，追求及时行乐或是干上一架，当然最好是两者兼得。他们大多是劳工或匠人，手头宽裕时便尽情畅饮以宣泄过剩的精力，囊中羞涩时则直接拳脚相向。其中技艺尤为精湛的，甚至能以搏斗供人取乐谋生。</p></article><footer class="page-footer"><p>📚 第三方 · 规则集 2014</p></footer></main></div><script src="/dnd-rule-wiki/assets/search.js"></script><script src="/dnd-rule-wiki/assets/sidebar.js"></script></body></html>
