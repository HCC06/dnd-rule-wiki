<p><em>护甲（轻甲），普通<br />
</em> 当你穿着这件护甲期间，你会感觉脚步轻盈灵活。当你在自己的回合中首次进行跳远，且目标是墙壁或类似的非光滑表面时，你可以在移动过程中沿着该表面移动最多等同于跳跃距离的长度。当你在该表面上时，如果你还有剩余移动距离，你可以进行第二次跳跃。</p></article><footer class="page-footer"><p>📚 第三方 · 规则集 2014</p></footer></main></div><script src="/dnd-rule-wiki/assets/search.js"></script><script src="/dnd-rule-wiki/assets/sidebar.js"></script></body></html>
