<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>背景 — D&D Rule Wiki</title><link rel="stylesheet" href="/assets/style.css"></head><body><div class="layout"><aside class="sidebar" id="sidebar"><div class="sidebar-head"><a href="/" class="home-link">🐉 D&D Rule Wiki</a><input type="text" id="search-input" class="search-box" placeholder="搜索规则、法术、怪物…" autocomplete="off"><div id="search-results" class="search-results"></div></div><nav class="tree" id="tree"></nav></aside><main class="content"><nav class="breadcrumbs"><a href="/legacy-supplements/第三方/">第三方</a> <span class="sep">›</span> <a href="/legacy-supplements/第三方/德拉肯海姆/背景/">背景</a> <span class="sep">›</span> <span class="current">背景</span></nav><article class="rule-content"><h1>背景</h1><p><span style="FONT-SIZE: 10.5pt; FONT-FAMILY: 宋体; mso-spacerun: 'yes'; mso-font-kerning: 1.0000pt">许多种类的冒险者涉足德拉肯海姆的废墟，怀抱着揭开失落之事的希望。无论他们为何而来，他们的经历或许都充满了隐患。有些人拥有丰富多彩的过去，使他们对前方的危险有所准备；有些人则想在废墟中掩盖自己的罪行和错误；还有些人与那些为了保护崩溃帝国残留之物而奋斗的人紧密相连。</span></p></article><footer class="page-footer"><p>📚 第三方 · 规则集 2014</p></footer></main></div><script src="/assets/search.js"></script><script src="/assets/sidebar.js"></script></body></html>
