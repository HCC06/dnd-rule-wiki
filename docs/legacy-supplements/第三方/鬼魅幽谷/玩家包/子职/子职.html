<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>子职 — D&D Rule Wiki</title><link rel="stylesheet" href="/dnd-rule-wiki/assets/style.css"></head><body><div class="layout"><aside class="sidebar" id="sidebar"><div class="sidebar-head"><a href="/dnd-rule-wiki/" class="home-link">🐉 D&D Rule Wiki</a><input type="text" id="search-input" class="search-box" placeholder="搜索规则、法术、怪物…" autocomplete="off"><div id="search-results" class="search-results"></div></div><nav class="tree" id="tree"></nav></aside><main class="content"><nav class="breadcrumbs"><a href="/dnd-rule-wiki/legacy-supplements/第三方/">第三方</a> <span class="sep">›</span> <a href="/dnd-rule-wiki/legacy-supplements/第三方/鬼魅幽谷/玩家包/子职/">子职</a> <span class="sep">›</span> <span class="current">子职</span></nav><article class="rule-content"><h1>子职</h1><h1 id="subclasses">子职 Subclasses</h1>
<p>艾弗瑞斯世界中的角色深受黑暗力量甚至恶意力量的影响，这让他们在其他人或许避之不及的领域深造。<br />
这些子职反映了这些英雄所生活和战斗的世界。在神明的指引缺失的情况下，信徒们只得依靠大天使坚定的言语。而战士们为在王国的怪物手下生存，锻炼出暴力的武术技巧。<br />
当你游玩这些子职时，想想你身上的恶意力量如何影响你的角色的心理。还要考虑一般民众与你互动时的反应。你的力量可以激发希望吗？还是让你变得如同普通人所害怕的怪物一样恐怖？</p></article><footer class="page-footer"><p>📚 第三方 · 规则集 2014</p></footer></main></div><script src="/dnd-rule-wiki/assets/search.js"></script><script src="/dnd-rule-wiki/assets/sidebar.js"></script></body></html>
