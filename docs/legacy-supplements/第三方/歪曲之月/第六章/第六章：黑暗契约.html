<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>第六章：黑暗契约 — D&D Rule Wiki</title><link rel="stylesheet" href="/dnd-rule-wiki/assets/style.css"></head><body><div class="layout"><aside class="sidebar" id="sidebar"><div class="sidebar-head"><a href="/dnd-rule-wiki/" class="home-link">🐉 D&D Rule Wiki</a><input type="text" id="search-input" class="search-box" placeholder="搜索规则、法术、怪物…" autocomplete="off"><div id="search-results" class="search-results"></div></div><nav class="tree" id="tree"></nav></aside><main class="content"><nav class="breadcrumbs"><a href="/dnd-rule-wiki/legacy-supplements/第三方/">第三方</a> <span class="sep">›</span> <a href="/dnd-rule-wiki/legacy-supplements/第三方/歪曲之月/第六章/">第六章</a> <span class="sep">›</span> <span class="current">第六章：黑暗契约</span></nav><article class="rule-content"><h1>第六章：黑暗契约</h1><p>黑暗契约将德鲁斯肯瓦尔德的本质编织进那些胆敢签订契约者的身心之中。这些古老的协议不仅束缚着这片土地、它的魔力、它的生灵……也同样束缚着你。契约带来的既有恩赐，也有灾厄。一些阴险之徒往往会直白地提出他们的交易条件，让其中潜伏的诅咒在“合适的时机”自行显现。慎重考虑是否踏入这等邪秽的协约之中。</p></article><footer class="page-footer"><p>📚 第三方 · 规则集 2014</p></footer></main></div><script src="/dnd-rule-wiki/assets/search.js"></script><script src="/dnd-rule-wiki/assets/sidebar.js"></script></body></html>
