<em>武器(巨剑)，非普通<br />
</em>角色们可能从特里斯坦爵士手中得到这把剑，它是由来自一种颠倒世界的未知金属锻造而成。在通常情况下，它是一把+1巨剑。但是当它被用来对付<strong>特萨尔蛇蜥Thessahydra</strong>的时候，它是一把+3巨剑。当在<strong>颠倒世界</strong>时，它是一把+4巨剑。</p></article><footer class="page-footer"><p>📚 模组 · 规则集 2014</p></footer></main></div><script src="/assets/search.js"></script><script src="/assets/sidebar.js"></script></body></html>
