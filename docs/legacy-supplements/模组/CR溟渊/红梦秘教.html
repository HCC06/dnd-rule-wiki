<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>红梦秘教 — D&D Rule Wiki</title><link rel="stylesheet" href="/assets/style.css"></head><body><div class="layout"><aside class="sidebar" id="sidebar"><div class="sidebar-head"><a href="/" class="home-link">🐉 D&D Rule Wiki</a><input type="text" id="search-input" class="search-box" placeholder="搜索规则、法术、怪物…" autocomplete="off"><div id="search-results" class="search-results"></div></div><nav class="tree" id="tree"></nav></aside><main class="content"><nav class="breadcrumbs"><a href="/legacy-supplements/模组/">模组</a> <span class="sep">›</span> <a href="/legacy-supplements/模组/CR溟渊/">CR溟渊</a> <span class="sep">›</span> <span class="current">红梦秘教</span></nav><article class="rule-content"><h1>红梦秘教</h1><p><strong><span style="FONT-SIZE: 12pt; FONT-FAMILY: 宋体; FONT-WEIGHT: bold; mso-bidi-font-family: 'Times New Roman'; mso-ascii-font-family: '等线 Light'; mso-hansi-font-family: '等线 Light'; mso-font-kerning: 1.0000pt; mso-spacerun: 'yes'">红梦秘教Occult of Vermilion Dream</span><span style="FONT-SIZE: 12pt; FONT-FAMILY: '等线 Light'; FONT-WEIGHT: bold; mso-bidi-font-family: 'Times New Roman'; mso-fareast-font-family: 宋体; mso-font-kerning: 1.0000pt; mso-spacerun: 'yes'"></span></strong></p>
<p><span style="FONT-SIZE: 10.5pt; FONT-FAMILY: 宋体; mso-bidi-font-family: 'Times New Roman'; mso-font-kerning: 1.0000pt; mso-spacerun: 'yes'">在外人看来，红梦秘会不过是一个由幽灵猎人、都市传说收集者们组成的小团体，举止神神秘秘，容易受利益驱使，但几乎没造成什么危害。这种说法不完全错误，但秘会的领导层对一些事情尤为着迷：那些关于厄兆之月茹蒂斯的传说，和被其异界影响所诅咒的古代人物们的传说。</span><span style="FONT-SIZE: 10.5pt; FONT-FAMILY: 宋体; mso-bidi-font-family: 'Times New Roman'; mso-font-kerning: 1.0000pt; mso-spacerun: 'yes'"></span></p>
<p><span style="FONT-SIZE: 10.5pt; FONT-FAMILY: 宋体; mso-bidi-font-family: 'Times New Roman'; mso-font-kerning: 1.0000pt; mso-spacerun: 'yes'">在秘会最痴迷的代理人身上，那些最残酷的渴求和偏好都因为接触被月蚀污染的物品而愈发强烈起来。</span><span style="FONT-SIZE: 10.5pt; FONT-FAMILY: 宋体; mso-bidi-font-family: 'Times New Roman'; mso-font-kerning: 1.0000pt; mso-spacerun: 'yes'"></span></p></article><footer class="page-footer"><p>📚 模组 · 规则集 2014</p></footer></main></div><script src="/assets/search.js"></script><script src="/assets/sidebar.js"></script></body></html>
