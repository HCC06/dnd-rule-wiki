<p>二阶段的对手们已经知晓他们的冒险会令他们步入恐怖之地，试炼他们的勇气，但他们会面对这些挑战并向更高处前进。</p>
<p>我从未想过世界上其他地方会与吉高如此不同。我从未见过如安卡'瑞尔一般美丽的城市，也从未到过像巴佐赞一样令我心痛的地方。</p>
<p>——艾优·贾贝</p></article><footer class="page-footer"><p>📚 模组 · 规则集 2014</p></footer></main></div><script src="/dnd-rule-wiki/assets/search.js"></script><script src="/dnd-rule-wiki/assets/sidebar.js"></script></body></html>
