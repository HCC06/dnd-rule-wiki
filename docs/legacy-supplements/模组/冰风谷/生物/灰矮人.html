<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>灰矮人 — D&D Rule Wiki</title><link rel="stylesheet" href="/assets/style.css"></head><body><div class="layout"><aside class="sidebar" id="sidebar"><div class="sidebar-head"><a href="/" class="home-link">🐉 D&D Rule Wiki</a><input type="text" id="search-input" class="search-box" placeholder="搜索规则、法术、怪物…" autocomplete="off"><div id="search-results" class="search-results"></div></div><nav class="tree" id="tree"></nav></aside><main class="content"><nav class="breadcrumbs"><a href="/legacy-supplements/模组/">模组</a> <span class="sep">›</span> <a href="/legacy-supplements/模组/冰风谷/生物/">生物</a> <span class="sep">›</span> <span class="current">灰矮人</span></nav><article class="rule-content"><h1>灰矮人</h1><p><strong>灰矮人Duergar</strong></p>
<p>灰矮人是居住在幽暗地域和其他没有太阳的国度深处的矮人。他们的心灵能力归功于很久以前奴役他们的灵吸怪。灰矮人最终挣脱了灵吸怪主人的魔爪，但却永远被转化了，获得了力量，但同时也获得了悲伤。这种阴郁导致一些灰矮人更显化其阴郁的意面，而另一些则表现出暴力的意面。<br />
<strong>地狱的主人。</strong>阿斯蒙蒂斯，九狱之主，模仿灰矮人之神来培养已经堕落的灰矮人们心中的邪恶。他为他们提供了神圣的指引，并向他们的敌人复仇，同时敦促他们采取残暴的行为，同时一直隐藏自己的身份。</p></article><footer class="page-footer"><p>📚 模组 · 规则集 2014</p></footer></main></div><script src="/assets/search.js"></script><script src="/assets/sidebar.js"></script></body></html>
