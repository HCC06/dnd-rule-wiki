<p>在《怪物图鉴》中有描述的，是通过造具来创造的，造具的过程始于将灵吸蝌蚪植入人形宿主的大脑。在新家住了大约7天后，蝌蚪就把它的主人变成了灵吸怪。这种新的创造通常不会保留生物生前的记忆。</p></article><footer class="page-footer"><p>📚 模组 · 规则集 2014</p></footer></main></div><script src="/assets/search.js"></script><script src="/assets/sidebar.js"></script></body></html>
