<p>北地雪兔是一种温和的食草动物，它们的身影遍布全冰风谷。它们比起其他野兔来耳朵更短，且它们适应寒冷天气。</p>
<p><strong>雪兔Hare<br />
</strong><em>微型野兽 无阵营</em><br />
AC 13<br />
HP 1(1d4-1)<br />
速度20尺，掘穴5尺<br />
力量1(-5) 敏捷17(+3) 体质9(-1)<br />
智力2(-4) 感知11(+0) 魅力4(-3)<br />
技能:察觉+2，隐匿+5<br />
感官:被动察觉12<br />
语言:--<br />
挑战等级:0（0XP）</p>
<p><strong>逃逸Escape。</strong>雪兔在它的回合可以以一个附赠动作执行疾走、撤离或躲藏。</p></article><footer class="page-footer"><p>📚 模组 · 规则集 2014</p></footer></main></div><script src="/dnd-rule-wiki/assets/search.js"></script><script src="/dnd-rule-wiki/assets/sidebar.js"></script></body></html>
