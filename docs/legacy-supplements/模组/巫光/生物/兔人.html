<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>兔人 — D&D Rule Wiki</title><link rel="stylesheet" href="/dnd-rule-wiki/assets/style.css"></head><body><div class="layout"><aside class="sidebar" id="sidebar"><div class="sidebar-head"><a href="/dnd-rule-wiki/" class="home-link">🐉 D&D Rule Wiki</a><input type="text" id="search-input" class="search-box" placeholder="搜索规则、法术、怪物…" autocomplete="off"><div id="search-results" class="search-results"></div></div><nav class="tree" id="tree"></nav></aside><main class="content"><nav class="breadcrumbs"><a href="/dnd-rule-wiki/legacy-supplements/模组/">模组</a> <span class="sep">›</span> <a href="/dnd-rule-wiki/legacy-supplements/模组/巫光/生物/">生物</a> <span class="sep">›</span> <span class="current">兔人</span></nav><article class="rule-content"><h1>兔人</h1><h4 id="harengons"><strong><span style="FONT-SIZE: 18pt; FONT-FAMILY: 宋体; FONT-WEIGHT: bold; mso-spacerun: 'yes'">兔人</span><span style="FONT-SIZE: 18pt; FONT-FAMILY: 宋体; FONT-WEIGHT: bold; mso-spacerun: 'yes'">Harengons</span><span style="FONT-SIZE: 18pt; FONT-FAMILY: 宋体; FONT-WEIGHT: bold; mso-spacerun: 'yes'"></span></strong></h4>
<p><span style="FONT-SIZE: 10.5pt; FONT-FAMILY: 等线; mso-bidi-font-family: 'Times New Roman'; mso-fareast-font-family: 宋体; mso-font-kerning: 1.0000pt; mso-spacerun: 'yes'">兔人们是妖精荒原的本土兔子种族，不过他们经常迁居到主物质位面。他们热爱靠双脚旅行且鲜少在一个地方待上太久。</span><span style="FONT-SIZE: 10.5pt; FONT-FAMILY: 等线; mso-bidi-font-family: 'Times New Roman'; mso-fareast-font-family: 宋体; mso-font-kerning: 1.0000pt; mso-spacerun: 'yes'"></span></p>
<p><span style="FONT-SIZE: 10.5pt; FONT-FAMILY: 等线; mso-bidi-font-family: 'Times New Roman'; mso-fareast-font-family: 宋体; mso-font-kerning: 1.0000pt; mso-spacerun: 'yes'">并非所有兔人都像此处所列的这样气量小。每一个兔人都有自己走过漫漫生命的独特道路，他们的性情在一部分上由他们所处的环境塑造。一个兔人可能会旅行到远方，在一路上结朋交友，醉心于开阔的野地与自由之感，并觅得内心的宁静。还有一些兔人可能会成为怀揣炽热梦想的坚强冒险者。欲了解更多作为玩家种族的兔人的信息，请查看本冒险的介绍部分。</span><span style="FONT-SIZE: 10.5pt; FONT-FAMILY: 等线; mso-bidi-font-family: 'Times New Roman'; mso-fareast-font-family: 宋体; mso-font-kerning: 1.0000pt; mso-spacerun: 'yes'"></span></p></article><footer class="page-footer"><p>📚 模组 · 规则集 2014</p></footer></main></div><script src="/dnd-rule-wiki/assets/search.js"></script><script src="/dnd-rule-wiki/assets/sidebar.js"></script></body></html>
