<p>末日劫掠者是五个胆大妄为的冒险者，他们喜欢打劫巫妖的巢穴（有些人称之为“末日”）。后来，他们放弃冒险，加入了黑暗情报网，并在三年前来到深水城，计划在这里建立散塔林会据点。在此期间，他们一边抵御着竖琴手的密探，一边与不同贵族、各路公会结成同盟，和其他人则多有冲突。</p></article><footer class="page-footer"><p>📚 模组 · 规则集 2014</p></footer></main></div><script src="/dnd-rule-wiki/assets/search.js"></script><script src="/dnd-rule-wiki/assets/sidebar.js"></script></body></html>
