<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>诺思卡·厄格雷 — D&D Rule Wiki</title><link rel="stylesheet" href="/dnd-rule-wiki/assets/style.css"></head><body><div class="layout"><aside class="sidebar" id="sidebar"><div class="sidebar-head"><a href="/dnd-rule-wiki/" class="home-link">🐉 D&D Rule Wiki</a><input type="text" id="search-input" class="search-box" placeholder="搜索规则、法术、怪物…" autocomplete="off"><div id="search-results" class="search-results"></div></div><nav class="tree" id="tree"></nav></aside><main class="content"><nav class="breadcrumbs"><a href="/dnd-rule-wiki/legacy-supplements/模组/">模组</a> <span class="sep">›</span> <a href="/dnd-rule-wiki/legacy-supplements/模组/深水城：龙金劫/">深水城：龙金劫</a> <span class="sep">›</span> <span class="current">诺思卡·厄格雷</span></nav><article class="rule-content"><h1>诺思卡·厄格雷</h1><p><strong><span style="FONT-SIZE: 14pt; FONT-FAMILY: 宋体; FONT-WEIGHT: bold; mso-bidi-font-family: 'Times New Roman'; mso-ascii-font-family: 'Times New Roman'; mso-hansi-font-family: 'Times New Roman'; mso-font-kerning: 1.0000pt; mso-spacerun: 'yes'">诺思卡·厄格雷</span><span style="FONT-SIZE: 9pt; FONT-FAMILY: 'Times New Roman'; FONT-WEIGHT: bold; mso-fareast-font-family: 宋体; mso-font-kerning: 1.0000pt; mso-spacerun: 'yes'">NOSKA UR'GRAY</span><span style="FONT-SIZE: 14pt; FONT-FAMILY: 'Times New Roman'; FONT-WEIGHT: bold; mso-fareast-font-family: 宋体; mso-font-kerning: 1.0000pt; mso-spacerun: 'yes'"></span></strong></p>
<p><span style="FONT-SIZE: 10.5pt; FONT-FAMILY: 宋体; mso-bidi-font-family: 'Times New Roman'; mso-font-kerning: 1.0000pt; mso-spacerun: 'yes'"></span></p>
<p><span style="FONT-SIZE: 10.5pt; FONT-FAMILY: 宋体; mso-bidi-font-family: 'Times New Roman'; mso-font-kerning: 1.0000pt; mso-spacerun: 'yes'">诺思卡是珊娜萨公会的执行者，十分残忍。山下区的一只绿色软泥怪溶解了他的左手和左侧小臂，取而代之的是一把接在残肢上的重弩。</span><span style="FONT-SIZE: 10.5pt; FONT-FAMILY: 宋体; mso-bidi-font-family: 'Times New Roman'; mso-font-kerning: 1.0000pt; mso-spacerun: 'yes'"></span></p>
<p><span style="FONT-SIZE: 10.5pt; FONT-FAMILY: 宋体; mso-bidi-font-family: 'Times New Roman'; mso-font-kerning: 1.0000pt; mso-spacerun: 'yes'"></span></p>
<p><strong><span style="FONT-SIZE: 10.5pt; FONT-FAMILY: 宋体; mso-bidi-font-family: 'Times New Roman'; mso-font-kerning: 1.0000pt; mso-ansi-font-weight: bold; mso-spacerun: 'yes'">游戏数据</span><span style="FONT-SIZE: 10.5pt; FONT-FAMILY: 宋体; mso-bidi-font-family: 'Times New Roman'; mso-font-kerning: 1.0000pt; mso-ansi-font-weight: bold; mso-spacerun: 'yes'"></span></strong></p>
<p><span style="FONT-SIZE: 10.5pt; FONT-FAMILY: 宋体; mso-bidi-font-family: 'Times New Roman'; mso-font-kerning: 1.0000pt; mso-spacerun: 'yes'">诺思卡·厄格雷是一名盾矮人</span><strong><span style="FONT-SIZE: 10.5pt; FONT-FAMILY: 黑体; FONT-WEIGHT: bold; mso-bidi-font-family: 'Times New Roman'; mso-ascii-font-family: 'Times New Roman'; mso-hansi-font-family: 'Times New Roman'; mso-font-kerning: 1.0000pt; mso-spacerun: 'yes'">暴徒thug</span></strong><span style="FONT-SIZE: 10.5pt; FONT-FAMILY: 宋体; mso-bidi-font-family: 'Times New Roman'; mso-font-kerning: 1.0000pt; mso-spacerun: 'yes'">，但有如下变化：</span><span style="FONT-SIZE: 10.5pt; FONT-FAMILY: 宋体; mso-bidi-font-family: 'Times New Roman'; mso-font-kerning: 1.0000pt; mso-spacerun: 'yes'"></span></p>
<p><span style="FONT-SIZE: 10.5pt; FONT-FAMILY: Wingdings; mso-bidi-font-family: 宋体; mso-fareast-font-family: 宋体;"><span style="mso-list: Ignore"> </span></span><span style="FONT-SIZE: 10.5pt; FONT-FAMILY: 宋体; mso-spacerun: 'yes'">诺思卡属于中立邪恶阵营。</span><span style="FONT-SIZE: 10.5pt; FONT-FAMILY: 宋体; mso-spacerun: 'yes'"></span></p>
<p><span style="FONT-SIZE: 10.5pt; FONT-FAMILY: Wingdings; mso-bidi-font-family: 宋体; mso-fareast-font-family: 宋体;"><span style="mso-list: Ignore"> </span></span><span style="FONT-SIZE: 10.5pt; FONT-FAMILY: 宋体; mso-spacerun: 'yes'">他拥有如下种族特质：他的基础步行速度为</span><span style="FONT-SIZE: 10.5pt; FONT-FAMILY: 'Times New Roman'; mso-fareast-font-family: 宋体; mso-spacerun: 'yes'">25尺。他在对抗毒素的豁免检定上具有优势，并对毒素伤害拥有抗性。他拥有60尺黑暗视觉。他使用通用语和矮人语。</span><span style="FONT-SIZE: 10.5pt; FONT-FAMILY: 宋体; mso-spacerun: 'yes'"></span></p>
<p><span style="FONT-SIZE: 10.5pt; FONT-FAMILY: Wingdings; mso-bidi-font-family: 宋体; mso-fareast-font-family: 宋体;"><span style="mso-list: Ignore"> </span></span><span style="FONT-SIZE: 10.5pt; FONT-FAMILY: 宋体; mso-spacerun: 'yes'">因为残疾，他在攀爬的力量检定上具有劣势。</span><span style="FONT-SIZE: 10.5pt; FONT-FAMILY: 宋体; mso-spacerun: 'yes'"></span></p></article><footer class="page-footer"><p>📚 模组 · 规则集 2014</p></footer></main></div><script src="/dnd-rule-wiki/assets/search.js"></script><script src="/dnd-rule-wiki/assets/sidebar.js"></script></body></html>
