<p>诺思卡是珊娜萨公会的执行者，十分残忍。山下区的一只绿色软泥怪溶解了他的左手和左侧小臂，取而代之的是一把接在残肢上的重弩。</p>
<p><strong>游戏数据</strong></p>
<p>诺思卡·厄格雷是一名盾矮人<strong>暴徒thug</strong>，但有如下变化：</p>
<p>诺思卡属于中立邪恶阵营。</p>
<p>他拥有如下种族特质：他的基础步行速度为25尺。他在对抗毒素的豁免检定上具有优势，并对毒素伤害拥有抗性。他拥有60尺黑暗视觉。他使用通用语和矮人语。</p>
<p>因为残疾，他在攀爬的力量检定上具有劣势。</p></article><footer class="page-footer"><p>📚 模组 · 规则集 2014</p></footer></main></div><script src="/dnd-rule-wiki/assets/search.js"></script><script src="/dnd-rule-wiki/assets/sidebar.js"></script></body></html>
