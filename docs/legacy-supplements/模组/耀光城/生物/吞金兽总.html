<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>吞金兽 — D&D Rule Wiki</title><link rel="stylesheet" href="/assets/style.css"></head><body><div class="layout"><aside class="sidebar" id="sidebar"><div class="sidebar-head"><a href="/" class="home-link">🐉 D&D Rule Wiki</a><input type="text" id="search-input" class="search-box" placeholder="搜索规则、法术、怪物…" autocomplete="off"><div id="search-results" class="search-results"></div></div><nav class="tree" id="tree"></nav></aside><main class="content"><nav class="breadcrumbs"><a href="/legacy-supplements/模组/">模组</a> <span class="sep">›</span> <a href="/legacy-supplements/模组/耀光城/生物/">生物</a> <span class="sep">›</span> <span class="current">吞金兽</span></nav><article class="rule-content"><h1>吞金兽</h1><h1 id="aurumvoraxes">吞金兽 Aurumvoraxes</h1>
<p>吞金兽是一种八条腿的，像獾一样的猎手。这些具有攻击性的杂食动物会攻击它们认为最厉害的猎物，甚至伏击体型是它们两倍的动物。它们用金属来补充饮食，无论是加工过的还是原生矿石，它们对黄金有特殊的喜好。这种饮食习惯使吞金兽的毛皮呈现出金色的光泽。<br />
吞金兽单独或成群地深入地下寻找贵金属。这样的探索往往会导致它们与地下定居点发生冲突。由于这些社区的防御者们通常穿着金属盔甲，吞金兽会优先攻击有盔甲的敌人——不管这些敌人的盔甲是不是金属的。</p></article><footer class="page-footer"><p>📚 模组 · 规则集 2014</p></footer></main></div><script src="/assets/search.js"></script><script src="/assets/sidebar.js"></script></body></html>
