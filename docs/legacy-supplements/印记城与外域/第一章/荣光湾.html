<p>当你为发生在印记城或外域的冒险创建角色时，你可以选择D&amp;D游戏规则提供的任何选项（包括本章所述的选项）。和往常一样，在创建角色之前，请务必先与你的DM 确认，以确保你想采用的选项是可用的。</p></article><footer class="page-footer"><p>📚 印记城与外域 · 规则集 2014</p></footer></main></div><script src="/dnd-rule-wiki/assets/search.js"></script><script src="/dnd-rule-wiki/assets/sidebar.js"></script></body></html>
