<p>本节为你呈现了两个1级角色的背景选项：<strong>门镇守卫Gate Warden</strong>与<strong>位面哲学家Planar Philosopher</strong>，这些背景选项或与印记城相关，或与外域相关，或与两者皆相关。<br />
如果你选择上述的这些背景，你将获得背景中记述的对应奖励专长。如果你选择的背景并没有给予你专长，你则可以从下述列表中选择并获取一个奖励专长。（这些是出现在《<strong>玩家手册</strong>》中的专长）</p>
<ul>
<li><strong>熟习Skilled</strong></li>
<li><strong>健壮Tough</strong></li>
