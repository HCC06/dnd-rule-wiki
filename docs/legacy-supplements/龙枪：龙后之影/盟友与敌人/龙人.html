</strong>龙人是一种生自金属龙蛋的二足站立怪物。这些龙蛋被扭曲的炼金术与龙后的污秽魔法所腐蚀。巨龙军团严密地保护着龙人来源的秘密，让克莱恩的金属龙以为自己的龙蛋仍然被其留作人质，使得金属龙不能反对龙后的征服。</p></article><footer class="page-footer"><p>📚 龙枪：龙后之影 · 规则集 2014</p></footer></main></div><script src="/dnd-rule-wiki/assets/search.js"></script><script src="/dnd-rule-wiki/assets/sidebar.js"></script></body></html>
