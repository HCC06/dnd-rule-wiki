<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>扮演龙类 — D&D Rule Wiki</title><link rel="stylesheet" href="/assets/style.css"></head><body><div class="layout"><aside class="sidebar" id="sidebar"><div class="sidebar-head"><a href="/" class="home-link">🐉 D&D Rule Wiki</a><input type="text" id="search-input" class="search-box" placeholder="搜索规则、法术、怪物…" autocomplete="off"><div id="search-results" class="search-results"></div></div><nav class="tree" id="tree"></nav></aside><main class="content"><nav class="breadcrumbs"><a href="/legacy-supplements/费资本的巨龙宝库/">费资本的巨龙宝库</a> <span class="sep">›</span> <a href="/legacy-supplements/费资本的巨龙宝库/游戏中龙/">游戏中龙</a> <span class="sep">›</span> <span class="current">扮演龙类</span></nav><article class="rule-content"><h1>扮演龙类</h1><p><strong><span style=" FONT-FAMILY: 等线; FONT-WEIGHT: bold; COLOR: rgb(192,0,0); mso-bidi-font-family: 'Times New Roman'; mso-spacerun: 'yes'">扮演龙类Roleplaying Dragons</span></strong></p>
<p><em><span style=" FONT-FAMILY: 等线; FONT-STYLE: italic; mso-bidi-font-family: 'Times New Roman'; mso-spacerun: 'yes'"></span></em></p>
<p><em><span style=" FONT-FAMILY: 等线; FONT-STYLE: italic; mso-bidi-font-family: 'Times New Roman'; mso-spacerun: 'yes'">要想好好扮演人类，关键在于体现出贪欲、自私和警觉。要想好好扮演龙类，那关键就在于保持放松。</span><span style=" FONT-FAMILY: 等线; FONT-STYLE: italic; mso-bidi-font-family: 'Times New Roman'; mso-spacerun: 'yes'"></span></em></p>
<p><em><span style=" FONT-FAMILY: 等线; FONT-STYLE: italic; mso-bidi-font-family: 'Times New Roman'; mso-spacerun: 'yes'">——费资本</span><span style=" FONT-FAMILY: 等线; FONT-STYLE: italic; mso-bidi-font-family: 'Times New Roman'; mso-spacerun: 'yes'"></span></em></p>
<p><span style=" FONT-FAMILY: 等线; mso-bidi-font-family: 'Times New Roman'; mso-spacerun: 'yes'"></span></p>
<p><span style=" FONT-FAMILY: 等线; mso-bidi-font-family: 'Times New Roman'; mso-spacerun: 'yes'">龙是一种复杂的生物，具有不同的个性、目标、倾向和举止。在这种层面上，它们与凡人类似——但龙也会受其龙类特征所塑造，包括极为漫长的寿命、魔法生命的本质及其毁灭性的力量。</span><span style=" FONT-FAMILY: 等线; mso-bidi-font-family: 'Times New Roman'; mso-spacerun: 'yes'"></span></p></article><footer class="page-footer"><p>📚 费资本的巨龙宝库 · 规则集 2014</p></footer></main></div><script src="/assets/search.js"></script><script src="/assets/sidebar.js"></script></body></html>
