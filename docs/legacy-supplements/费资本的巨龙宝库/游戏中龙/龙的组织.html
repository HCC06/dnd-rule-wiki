<p>**</p>
<p><em>唯一比让一条龙参与进来更好的事情......是让五条龙参与进来!</em></p>
<p><em>——费资本</em></p>
<p>大多数龙都是孤独的，独自生活或只与一个龙类伴侣及自己的家庭在一起。但偶尔，龙也会为了共同的目的与其他龙结成联盟。这种联盟在守序的龙中更为常见，并且其影响与最终目的可能远远比单个龙的领地或目标更为庞大。本章节讨论了几个组织，它们的情节可以在一片小一些的区域、整个世界甚至多个位面展开。</p></article><footer class="page-footer"><p>📚 费资本的巨龙宝库 · 规则集 2014</p></footer></main></div><script src="/dnd-rule-wiki/assets/search.js"></script><script src="/dnd-rule-wiki/assets/sidebar.js"></script></body></html>
