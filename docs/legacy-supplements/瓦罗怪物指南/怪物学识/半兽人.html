<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title> — D&D Rule Wiki</title><link rel="stylesheet" href="/dnd-rule-wiki/assets/style.css"></head><body><div class="layout"><aside class="sidebar" id="sidebar"><div class="sidebar-head"><a href="/dnd-rule-wiki/" class="home-link">🐉 D&D Rule Wiki</a><input type="text" id="search-input" class="search-box" placeholder="搜索规则、法术、怪物…" autocomplete="off"><div id="search-results" class="search-results"></div></div><nav class="tree" id="tree"></nav></aside><main class="content"><nav class="breadcrumbs"><a href="/dnd-rule-wiki/legacy-supplements/瓦罗怪物指南/">瓦罗怪物指南</a> <span class="sep">›</span> <a href="/dnd-rule-wiki/legacy-supplements/瓦罗怪物指南/怪物学识/">怪物学识</a> <span class="sep">›</span> <span class="current"></span></nav><article class="rule-content"><h1></h1><p>**半兽人HALF-ORCS **</p>
<hr />
<p>人类的传说把兽人描绘为贪婪的邪魔，试图与其他类人生物交配来更广泛地传播他们的种子。事实上，兽人只有在他们认为这样的搭配会增强部族的力量时才会与非兽人结合。当兽人们遇到与他们的力量和凶残相匹敌的人类时，他们有时会结成以混合两个群体的血脉成立的同盟。  </p>
<p>兽人部落中的半兽人与纯血的兽人一样强壮，同时也表现出相当的狡猾。因此，半兽人能够比他们的同伴们更快地在部族中取得地位，而半兽人作为领袖的部族也并不罕见。</p></article><footer class="page-footer"><p>📚 瓦罗怪物指南 · 规则集 2014</p></footer></main></div><script src="/dnd-rule-wiki/assets/search.js"></script><script src="/dnd-rule-wiki/assets/sidebar.js"></script></body></html>
