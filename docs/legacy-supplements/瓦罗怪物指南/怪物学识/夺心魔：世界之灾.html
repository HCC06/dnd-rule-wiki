<p>夺心魔，也被称为灵吸怪 illithids ，它们是潜伏在幽暗地域深处的可怖异域人型生物。作为灵能大师，他们利用自己的这一精神力量来控制其他生物。那些受害者中的幸运儿则被杀死，他们的大脑被吞食。而不幸的那些，他们的心灵会被扭曲，他们会成为没有心智的奴隶，他们获救的希望渺茫。</p></article><footer class="page-footer"><p>📚 瓦罗怪物指南 · 规则集 2014</p></footer></main></div><script src="/dnd-rule-wiki/assets/search.js"></script><script src="/dnd-rule-wiki/assets/sidebar.js"></script></body></html>
