<p>在这个世界中，普通魔法物品非常普遍，而奥术魔法在五国中起着至关重要的作用。魔法经济的运行依赖一种被称为“龙晶”的水晶，这种材料也被用于制造增强龙纹力量的法器。</p></article><footer class="page-footer"><p>📚 艾伯伦寻路者指南 · 规则集 2014</p></footer></main></div><script src="/dnd-rule-wiki/assets/search.js"></script><script src="/dnd-rule-wiki/assets/sidebar.js"></script></body></html>
