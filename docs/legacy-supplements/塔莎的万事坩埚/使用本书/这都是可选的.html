<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>这都是可选的 — D&D Rule Wiki</title><link rel="stylesheet" href="/assets/style.css"></head><body><div class="layout"><aside class="sidebar" id="sidebar"><div class="sidebar-head"><a href="/" class="home-link">🐉 D&D Rule Wiki</a><input type="text" id="search-input" class="search-box" placeholder="搜索规则、法术、怪物…" autocomplete="off"><div id="search-results" class="search-results"></div></div><nav class="tree" id="tree"></nav></aside><main class="content"><nav class="breadcrumbs"><a href="/legacy-supplements/塔莎的万事坩埚/">塔莎的万事坩埚</a> <span class="sep">›</span> <a href="/legacy-supplements/塔莎的万事坩埚/使用本书/">使用本书</a> <span class="sep">›</span> <span class="current">这都是可选的</span></nav><article class="rule-content"><h1>这都是可选的</h1><p><strong>这都是可选的 It's All Optional</strong></p>
<p>本书内提及的任何东西都是可选的。任何团队都应该由DM来决定本次战役中是否使用、使用哪些选项。你可以使用一部分、全部、或完全不使用本书的内容。我们鼓励您去选择哪些最适合战役故事与小组游戏风格的内容。</p>
<p>无论使用哪种哪些选项，本书的内容均基于《玩家手册》、《怪物图鉴》与《城主指南》中的规则，且它可以与《珊娜萨的万事指南》或其他D&amp;D书籍中的选项搭配使用。</p></article><footer class="page-footer"><p>📚 塔莎的万事坩埚 · 规则集 2014</p></footer></main></div><script src="/assets/search.js"></script><script src="/assets/sidebar.js"></script></body></html>
