<p>当你童年最早的记忆是在妖精荒野长大的时候，像定时卷起的蘑菇、摄人心智的果实和巨大的花猫这样的玩意儿对你就远没有那么稀奇，更多时候我则是在抱怨，“为了我能有更加寻常一些的童年，我们能搬去物质位面吗？”</p>
<p>——塔莎</p>
<p>本节中将探讨如何在任何地点加入奇幻的挑战，并进一步让冒险设定更加鲜活。<br />
