<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>埃格林采石场 — D&D Rule Wiki</title><link rel="stylesheet" href="/dnd-rule-wiki/assets/style.css"></head><body><div class="layout"><aside class="sidebar" id="sidebar"><div class="sidebar-head"><a href="/dnd-rule-wiki/" class="home-link">🐉 D&D Rule Wiki</a><input type="text" id="search-input" class="search-box" placeholder="搜索规则、法术、怪物…" autocomplete="off"><div id="search-results" class="search-results"></div></div><nav class="tree" id="tree"></nav></aside><main class="content"><nav class="breadcrumbs"><a href="/dnd-rule-wiki/legacy-supplements/荒洲探险家指南/">荒洲探险家指南</a> <span class="sep">›</span> <a href="/dnd-rule-wiki/legacy-supplements/荒洲探险家指南/荒洲地理志/骨髓谷/">骨髓谷</a> <span class="sep">›</span> <span class="current">埃格林采石场</span></nav><article class="rule-content"><h1>埃格林采石场</h1><h2 id="egelin-quarry">埃格林采石场 Egelin Quarry</h2>
<p>这座拥有数百年历史的露天矿场曾是朱乐斯领建造扎达什时所用石材的主要来源，但在东南方发现了富含铂金的赫雷希斯矿山后，这里基本上被废弃了。如今，仅有一小群矿工仍在这片巨大的裂谷工作，他们收集散落的石料以出售给石匠。在自封为采石场工头的侏儒探矿者拉森·德·维勒的监督下，有许多碎石工人仍在矿场中劳作，他们希望能发现一些隐藏的宝石或贵金属矿石。</p></article><footer class="page-footer"><p>📚 荒洲探险家指南 · 规则集 2014</p></footer></main></div><script src="/dnd-rule-wiki/assets/search.js"></script><script src="/dnd-rule-wiki/assets/sidebar.js"></script></body></html>
