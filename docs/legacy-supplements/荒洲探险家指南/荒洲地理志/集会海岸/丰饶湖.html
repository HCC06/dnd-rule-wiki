<p>在图索阿以北，波光粼粼的丰饶湖坐落在1000英尺高的西里奥斯山脉的丰饶森林之中。这个湖被视为圣池，基瑙的战士和祭司会登临此地，净化自己免受噩梦和恶灵的困扰。因此，联邦禁止了任何非仪式性的捕鱼或潜水活动。然而，由于湖泊位置偏僻且仅有零星的泽里佐铁卫驻守，这片区域成了走私货物的首选投放点，途径的走私者甚至会通过偷捕湖中特有的圣鱼来赚取额外收入。</p></article><footer class="page-footer"><p>📚 荒洲探险家指南 · 规则集 2014</p></footer></main></div><script src="/dnd-rule-wiki/assets/search.js"></script><script src="/dnd-rule-wiki/assets/sidebar.js"></script></body></html>
