<p>这三个岛屿由陡峭的火山山峰和陡峭的悬崖组成，上面有许多洞穴，里面住着血鹰、鸟妖，传言说甚至有一只大得不可思议的<strong>鹏鸟 roc</strong>。岛上只有零星的树和丛林，因此资源稀缺，很少有船只有正当理由在此停靠。然而，这并不能阻止狂欢众在该地区进行储存、伏击和进行达克托外的会面。</p></article><footer class="page-footer"><p>📚 荒洲探险家指南 · 规则集 2014</p></footer></main></div><script src="/assets/search.js"></script><script src="/assets/sidebar.js"></script></body></html>
