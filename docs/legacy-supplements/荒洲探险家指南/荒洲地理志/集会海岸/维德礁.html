<p>维德礁岛被险恶的沿岸岩石和波涛汹涌的海水完全包围，因此大多数船只都会避开这里。岛屿地形以一系列崎岖的大山丘为主，环绕着一个小山谷，在这片山谷中，一个小型妖精社会生活在迷人的热带森林中。试图利用该岛的狂欢众船长们抱怨说，岛上有一个守护者——据说是一位仙灵女巫。她通过扰乱那些试图掠夺或奴役森林居民的人的心智，守护着整座岛屿。</p></article><footer class="page-footer"><p>📚 荒洲探险家指南 · 规则集 2014</p></footer></main></div><script src="/assets/search.js"></script><script src="/assets/sidebar.js"></script></body></html>
