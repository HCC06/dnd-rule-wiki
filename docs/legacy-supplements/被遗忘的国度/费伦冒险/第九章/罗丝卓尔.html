<p><strong>栖息地：</strong> 幽暗地域；<strong>宝藏：</strong> 任意</p>
<p>广袤无垠的幽暗地域中，在诸如魔索布莱这样的城市里，众多卓尔精灵信奉着蛛后罗丝。这些自千年前就从地表被放逐的卓尔们如今已然在将幽暗地域视为她们真正的家园。她们阴毒计划包括袭击地表，算计彼此，以及准备最终圣战。</p></article><footer class="page-footer"><p>📚 被遗忘的国度 · 规则集 2014</p></footer></main></div><script src="/dnd-rule-wiki/assets/search.js"></script><script src="/dnd-rule-wiki/assets/sidebar.js"></script></body></html>
