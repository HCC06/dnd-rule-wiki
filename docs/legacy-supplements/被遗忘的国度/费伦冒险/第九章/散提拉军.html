<div class="HT">

**栖息地：** 任意；**宝藏：** 武备

</div>

<p>散提拉军是散塔林会的军事分支。散提拉军势力捍卫着散塔林会的要塞，诸如散提尔堡与黑暗堡。如果说散塔林会是一支大家庭，那么散提拉军便是家中捍卫亲人的长兄长姐。<br />
除了捍卫据点，散提拉军也负责组织上的某些重要事务，例如保护一件强大的魔法物品，或是护送散塔林会高层。</p></article><footer class="page-footer"><p>📚 被遗忘的国度 · 规则集 2014</p></footer></main></div><script src="/dnd-rule-wiki/assets/search.js"></script><script src="/dnd-rule-wiki/assets/sidebar.js"></script></body></html>
