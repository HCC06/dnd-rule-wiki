<p>本节中的背景适用于那些过往经历与吸血鬼紧密相连，或是与吸血鬼惯常结交的对象有关的人物。本章后续的专长部分会详细描述所提及的每一项专长。更多关于背景的说明请参阅玩家手册。</p>
<p>夜晚的街道上熙熙攘攘，形形色色的人应有尽有：误入歧途者、浑然不觉者、堕落腐化者。此外，还有那些醉醺醺的酒徒、厌世的恋人，以及疲惫不堪的幸存者。我乐于将他们每个人都视作独一无二的佳酿。</p>
<p>——夜之品酒师阿斯代伦</p></article><footer class="page-footer"><p>📚 被遗忘的国度 · 规则集 2014</p></footer></main></div><script src="/dnd-rule-wiki/assets/search.js"></script><script src="/dnd-rule-wiki/assets/sidebar.js"></script></body></html>
