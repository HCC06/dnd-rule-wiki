<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>费林魔葵 — D&D Rule Wiki</title><link rel="stylesheet" href="/dnd-rule-wiki/assets/style.css"></head><body><div class="layout"><aside class="sidebar" id="sidebar"><div class="sidebar-head"><a href="/dnd-rule-wiki/" class="home-link">🐉 D&D Rule Wiki</a><input type="text" id="search-input" class="search-box" placeholder="搜索规则、法术、怪物…" autocomplete="off"><div id="search-results" class="search-results"></div></div><nav class="tree" id="tree"></nav></aside><main class="content"><nav class="breadcrumbs"><a href="/dnd-rule-wiki/legacy-supplements/被遗忘的国度/">被遗忘的国度</a> <span class="sep">›</span> <a href="/dnd-rule-wiki/legacy-supplements/被遗忘的国度/耐瑟瑞尔/耐瑟怪物/">耐瑟怪物</a> <span class="sep">›</span> <span class="current">费林魔葵</span></nav><article class="rule-content"><h1>费林魔葵</h1><p>痴迷于魔法的异形操纵者</p>
<p><strong>栖息地：</strong> 幽暗地域，城市；<strong>宝藏：</strong>奥秘，器具</p>
<p>费林魔葵是试图统治其他智慧物种的邪恶异形，它的锥形身躯于空中波动，拖着一张硕大的扁平嘴巴，嘴巴周围环绕着四条纤细的附肢。费林魔葵嘴后部的身体不断收缩，末端是一根毒刺。只有在魔法手段不起作用时，费林魔葵才会使用这根毒刺。<br />
远古时期的费林魔葵曾将旧日强盛的耐瑟瑞尔帝国摧毁殆尽。这些费林魔葵被囚禁在广袤的埃诺奥克沙漠之下，如今正密谋重返昔日领地。</p></article><footer class="page-footer"><p>📚 被遗忘的国度 · 规则集 2014</p></footer></main></div><script src="/dnd-rule-wiki/assets/search.js"></script><script src="/dnd-rule-wiki/assets/sidebar.js"></script></body></html>
