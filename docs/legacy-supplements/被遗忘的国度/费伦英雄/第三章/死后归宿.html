<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>死后归宿 — D&D Rule Wiki</title><link rel="stylesheet" href="/assets/style.css"></head><body><div class="layout"><aside class="sidebar" id="sidebar"><div class="sidebar-head"><a href="/" class="home-link">🐉 D&D Rule Wiki</a><input type="text" id="search-input" class="search-box" placeholder="搜索规则、法术、怪物…" autocomplete="off"><div id="search-results" class="search-results"></div></div><nav class="tree" id="tree"></nav></aside><main class="content"><nav class="breadcrumbs"><a href="/legacy-supplements/被遗忘的国度/">被遗忘的国度</a> <span class="sep">›</span> <a href="/legacy-supplements/被遗忘的国度/费伦英雄/第三章/">第三章</a> <span class="sep">›</span> <span class="current">死后归宿</span></nav><article class="rule-content"><h1>死后归宿</h1><h2 id="the-afterlife">死后归宿 The Afterlife</h2>
<p>新近亡者的灵魂会前往朦胧之域，那是位于星界海中的一个半位面。在那里，他们徘徊于广阔的审判之城中，且往往尚未察觉自己已经死亡。诸神的仆从会前来收取这些灵魂，若灵魂被认定为有价值，他们便会被带往对应神祇领域中获得所期盼的死后归宿。偶尔，也有虔诚的灵魂被送回现世，去完成他们未竟的使命。<br />
那些未被神祇仆从接引的灵魂则由凯兰沃审判，由他决定每个灵魂的命运。有些灵魂会成为引导迷途亡魂的向导，而另一些则被变作扭动的幼虫魔，投入尘土。</p></article><footer class="page-footer"><p>📚 被遗忘的国度 · 规则集 2014</p></footer></main></div><script src="/assets/search.js"></script><script src="/assets/sidebar.js"></script></body></html>
