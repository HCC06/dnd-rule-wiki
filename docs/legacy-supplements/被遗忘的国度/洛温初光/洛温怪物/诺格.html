<p><strong>栖息地：</strong> 异界（妖精荒野）；<strong>宝藏：</strong>个体</p>
<p>诺格是双足行走的驴形妖精，以盗窃和捣乱为乐。他们并非出于生存需求而盗窃，而是天性如此。这种天性可以用一个木族语中的常见表达来粗略概括："那是我哒！"<br />
诺格仅被发现于暗影荒原，他们在那里游荡并且制造混乱。</p></article><footer class="page-footer"><p>📚 被遗忘的国度 · 规则集 2014</p></footer></main></div><script src="/dnd-rule-wiki/assets/search.js"></script><script src="/dnd-rule-wiki/assets/sidebar.js"></script></body></html>
