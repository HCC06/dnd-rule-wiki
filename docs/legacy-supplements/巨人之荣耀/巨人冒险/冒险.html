<p>巨人经常出现在与巨人无关的冒险中，作为冒险者的强大敌人或盟友。如果你想让巨人或他们居住的领域成为冒险的中心元素，这一节提供了灵感。本章主要分为两个部分。</p>
<p><strong>“冒险模型”</strong>描述了五种冒险，以供你考虑你希望巨人扮演的角色</p>
<p><strong>“巨人赞助者”</strong>探索了一个巨人作为一个冒险团队的赞助者可能会扮演的各种角色，以及这个巨人可能会分配的任务。</p></article><footer class="page-footer"><p>📚 巨人之荣耀 · 规则集 2014</p></footer></main></div><script src="/dnd-rule-wiki/assets/search.js"></script><script src="/dnd-rule-wiki/assets/sidebar.js"></script></body></html>
