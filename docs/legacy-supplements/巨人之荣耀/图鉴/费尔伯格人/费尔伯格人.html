<p>身为巨人的远亲，最初的费尔伯格人在多元宇宙中的原始森林中漫步。那些森林的魔法与费尔伯格人的灵魂交织相融，直至今日。<br />
费尔伯格人经常追随或效仿迪安卡斯特拉Diancastra和西亚缇Hiatea费尔伯格人天生擅与遮蔽与诡术的魔法会与迪安卡斯特拉狡猾才智产生共鸣，而对重视社区与和睦的传统则许多费尔伯格人立誓为西亚缇服务。</p></article><footer class="page-footer"><p>📚 巨人之荣耀 · 规则集 2014</p></footer></main></div><script src="/dnd-rule-wiki/assets/search.js"></script><script src="/dnd-rule-wiki/assets/sidebar.js"></script></body></html>
