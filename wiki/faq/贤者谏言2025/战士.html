<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>战士 — D&D Rule Wiki</title><link rel="stylesheet" href="/assets/style.css"></head><body><div class="layout"><aside class="sidebar" id="sidebar"><div class="sidebar-head"><a href="/" class="home-link">🐉 D&D Rule Wiki</a><input type="text" id="search-input" class="search-box" placeholder="搜索规则、法术、怪物…" autocomplete="off"><div id="search-results" class="search-results"></div></div><nav class="tree" id="tree"></nav></aside><main class="content"><nav class="breadcrumbs"><a href="/faq/贤者谏言2025/">📋 贤者谏言 2025</a> <span class="sep">›</span> <span class="current">战士</span></nav><article class="rule-content"><h1>战士</h1><p><strong>我的战斗大师Battle Master 战士Fighter 引发了敌人的 借机攻击Opportunity Attack，若该敌人的攻击失手，可以使用 反击Riposte 战技吗？</strong><br />
可以。只要你还可以执行反应，你就可以在<em>借机攻击</em>没有命中你时使用反击战技。</p>
<p><strong>缴械击Disarming Attack 可以解除生物装备的盾牌吗?<br />
</strong>不。缴械击迫使一个生物掉落其持握的物体。而装着的盾牌不仅仅是握在手上而已。</p></article><footer class="page-footer"><p>📚 📋 贤者谏言 2025 · 规则集 2024</p></footer></main></div><script src="/assets/search.js"></script><script src="/assets/sidebar.js"></script></body></html>
