<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>参与神圣仪式 — D&D Rule Wiki</title><link rel="stylesheet" href="/assets/style.css"></head><body><div class="layout"><aside class="sidebar" id="sidebar"><div class="sidebar-head"><a href="/" class="home-link">🐉 D&D Rule Wiki</a><input type="text" id="search-input" class="search-box" placeholder="搜索规则、法术、怪物…" autocomplete="off"><div id="search-results" class="search-results"></div></div><nav class="tree" id="tree"></nav></aside><main class="content"><nav class="breadcrumbs"><a href="/legacy-core/城主指南/">📖 城主指南 2014</a> <span class="sep">›</span> <a href="/legacy-core/城主指南/冒险之主/之余/休整期活动/">休整期活动</a> <span class="sep">›</span> <span class="current">参与神圣仪式</span></nav><article class="rule-content"><h1>参与神圣仪式</h1><p><strong><span style="FONT-SIZE: 12pt; FONT-FAMILY: 黑体; COLOR: rgb(128,0,0); mso-ascii-font-family: 'Times New Roman'; mso-hansi-font-family: 'Times New Roman'; mso-bidi-font-weight: normal; mso-spacerun: 'yes'; mso-ansi-font-weight: bold">参与神圣仪式Performing Sacred Rites</span><span style="FONT-SIZE: 12pt; FONT-FAMILY: 黑体; COLOR: rgb(128,0,0); mso-ascii-font-family: 'Times New Roman'; mso-hansi-font-family: 'Times New Roman'; mso-bidi-font-weight: normal; mso-spacerun: 'yes'; mso-ansi-font-weight: bold"></span></strong></p>
<p><span style="FONT-SIZE: 12pt; FONT-FAMILY: 宋体; mso-spacerun: 'yes'"> 侍神的角色可以在冒险之余在自己守护神的神庙中参与神圣仪式。各种仪式之余，该角色还会花时间进行冥想和祈祷。</span><span style="FONT-SIZE: 12pt; FONT-FAMILY: 宋体; mso-spacerun: 'yes'"><br />
</span><span style="FONT-SIZE: 12pt; FONT-FAMILY: 宋体; mso-spacerun: 'yes'"> 身为神庙祭司的角色可以主持这些仪式，其中包括婚礼、葬礼和授职仪式。俗家人士则可以在神庙里献祭，也可以协助祭司举行仪式。</span><span style="FONT-SIZE: 12pt; FONT-FAMILY: 宋体; mso-spacerun: 'yes'"><br />
</span><span style="FONT-SIZE: 12pt; FONT-FAMILY: 宋体; mso-spacerun: 'yes'"> 角色花费10日参与这些神圣仪式后可以获取激励（</span><em><span style="FONT-SIZE: 12pt; FONT-FAMILY: 宋体; mso-bidi-font-style: normal; mso-spacerun: 'yes'; mso-ansi-font-style: italic">《玩家手册》</span></em><span style="FONT-SIZE: 12pt; FONT-FAMILY: 宋体; mso-spacerun: 'yes'">第4章中有详细描述）。该角色在随后2d6日里的每日开始时获得该激励。</span><span style="FONT-SIZE: 10.5pt; FONT-FAMILY: Calibri; mso-bidi-font-family: 'Times New Roman'; mso-fareast-font-family: 宋体; mso-font-kerning: 1.0000pt; mso-spacerun: 'yes'"></span></p></article><footer class="page-footer"><p>📚 📖 城主指南 2014 · 规则集 2014</p></footer></main></div><script src="/assets/search.js"></script><script src="/assets/sidebar.js"></script></body></html>
