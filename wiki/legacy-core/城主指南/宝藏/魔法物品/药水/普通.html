<em>药水，普通</em><br />
饮用此药水后，你获得等同于你步行速度的攀爬速度，持续1小时。在此期间，你为攀爬所做的力量（运动）检定具有优势。药水分离成类似于岩层的褐色、银色、和灰色三层，即使摇晃也无法让三种颜色混合到一起。</p></article><footer class="page-footer"><p>📚 📖 城主指南 2014 · 规则集 2014</p></footer></main></div><script src="/assets/search.js"></script><script src="/assets/sidebar.js"></script></body></html>
