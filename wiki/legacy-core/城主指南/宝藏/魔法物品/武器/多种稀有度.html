<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>多种稀有度 — D&D Rule Wiki</title><link rel="stylesheet" href="/assets/style.css"></head><body><div class="layout"><aside class="sidebar" id="sidebar"><div class="sidebar-head"><a href="/" class="home-link">🐉 D&D Rule Wiki</a><input type="text" id="search-input" class="search-box" placeholder="搜索规则、法术、怪物…" autocomplete="off"><div id="search-results" class="search-results"></div></div><nav class="tree" id="tree"></nav></aside><main class="content"><nav class="breadcrumbs"><a href="/legacy-core/城主指南/">📖 城主指南 2014</a> <span class="sep">›</span> <a href="/legacy-core/城主指南/宝藏/魔法物品/武器/">武器</a> <span class="sep">›</span> <span class="current">多种稀有度</span></nav><article class="rule-content"><h1>多种稀有度</h1><p><strong>弹药 Ammunition，+1、+2、+3</strong><br />
<em>武器（任何弹药），非普通（+1）/珍稀（+2）/极珍稀（+3）</em><br />
你使用此魔法弹药发动攻击检定和伤害掷骰时获得加值。加值的数值取决于弹药的稀有度。此弹药一旦击中目标即不再具有魔法效果。</p>
<p><strong>武器 Weapon，+1、+2、+3</strong><br />
<em>武器（任意），非普通（+1）/珍稀（+2）/极珍稀（+3）</em><br />
你在用此魔法武器发动的攻击检定和伤害掷骰获得加值。加值的数值取决于武器的稀有度。</p></article><footer class="page-footer"><p>📚 📖 城主指南 2014 · 规则集 2014</p></footer></main></div><script src="/assets/search.js"></script><script src="/assets/sidebar.js"></script></body></html>
