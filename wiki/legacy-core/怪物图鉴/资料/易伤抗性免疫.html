<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>易伤_抗性_免疫 — D&D Rule Wiki</title><link rel="stylesheet" href="/assets/style.css"></head><body><div class="layout"><aside class="sidebar" id="sidebar"><div class="sidebar-head"><a href="/" class="home-link">🐉 D&D Rule Wiki</a><input type="text" id="search-input" class="search-box" placeholder="搜索规则、法术、怪物…" autocomplete="off"><div id="search-results" class="search-results"></div></div><nav class="tree" id="tree"></nav></aside><main class="content"><nav class="breadcrumbs"><a href="/legacy-core/怪物图鉴/">👹 怪物图鉴 2014</a> <span class="sep">›</span> <a href="/legacy-core/怪物图鉴/资料/">资料</a> <span class="sep">›</span> <span class="current">易伤_抗性_免疫</span></nav><article class="rule-content"><h1>易伤_抗性_免疫</h1><p><strong>易伤、抗性与免疫 Vulnerabilities, Resistances, and Immunities</strong></p>
<p>某些生物对特定的伤害类型具有易伤、抗性或者免疫。特定的生物甚至还可以对非魔法攻击造成的伤害具有抗性或免疫（魔法攻击是由法术、魔法物品或其他魔法来源发动的攻击）。此外，一些生物还免疫特定的状态。</p></article><footer class="page-footer"><p>📚 👹 怪物图鉴 2014 · 规则集 2014</p></footer></main></div><script src="/assets/search.js"></script><script src="/assets/sidebar.js"></script></body></html>
