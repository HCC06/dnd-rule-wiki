<p><span style="FONT-SIZE: 11pt; FONT-FAMILY: 宋体; mso-ascii-font-family: Cambria; mso-hansi-font-family: Cambria; mso-spacerun: 'yes'">你可以在冒险以外的时间工作，使你得以维持俭朴的生活而不需要付每日</span><span style="FONT-SIZE: 11pt; FONT-FAMILY: Cambria; mso-spacerun: 'yes'">1gp</span><span style="FONT-SIZE: 11pt; FONT-FAMILY: 宋体; mso-ascii-font-family: Cambria; mso-hansi-font-family: Cambria; mso-spacerun: 'yes'">的开销（详见第</span><span style="FONT-SIZE: 11pt; FONT-FAMILY: Cambria; mso-spacerun: 'yes'">5</span><span style="FONT-SIZE: 11pt; FONT-FAMILY: 宋体; mso-ascii-font-family: Cambria; mso-hansi-font-family: Cambria; mso-spacerun: 'yes'">章关于生活方式费用开支的相关内容）。只要你保持工作就可以持续获得该益处。</span><span style="FONT-SIZE: 11pt; FONT-FAMILY: Cambria; mso-spacerun: 'yes'"> </span><span style="FONT-SIZE: 11pt; FONT-FAMILY: Cambria; mso-spacerun: 'yes'"><br />
</span><span style="FONT-SIZE: 11pt; FONT-FAMILY: 宋体; mso-ascii-font-family: Cambria; mso-hansi-font-family: Cambria; mso-spacerun: 'yes'">如果你隶属于可以提供高收入工作的组织，例如神庙或盗贼行会，则你的收入让你改为可以维持舒适的生活方式。</span><span style="FONT-SIZE: 16pt; FONT-FAMILY: 宋体; mso-spacerun: 'yes'"><br />
</span><span style="FONT-SIZE: 11pt; FONT-FAMILY: 宋体; mso-ascii-font-family: Cambria; mso-hansi-font-family: Cambria; mso-spacerun: 'yes'">如果你拥有表演技能的熟练项，并在休整时以表演维生，则你的收入让你改为可以维持富裕的生活方式。</span><span style="FONT-SIZE: 16pt; FONT-FAMILY: 宋体; mso-spacerun: 'yes'"><br />
