<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>休养 — D&D Rule Wiki</title><link rel="stylesheet" href="/assets/style.css"></head><body><div class="layout"><aside class="sidebar" id="sidebar"><div class="sidebar-head"><a href="/" class="home-link">🐉 D&D Rule Wiki</a><input type="text" id="search-input" class="search-box" placeholder="搜索规则、法术、怪物…" autocomplete="off"><div id="search-results" class="search-results"></div></div><nav class="tree" id="tree"></nav></aside><main class="content"><nav class="breadcrumbs"><a href="/legacy-core/玩家手册/">📖 玩家手册 2014</a> <span class="sep">›</span> <a href="/legacy-core/玩家手册/冒险/休整期活动/">休整期活动</a> <span class="sep">›</span> <span class="current">休养</span></nav><article class="rule-content"><h1>休养</h1><p><strong><span style="FONT-SIZE: 12pt; FONT-FAMILY: 黑体; COLOR: rgb(128,0,0); mso-hansi-font-family: 宋体; mso-bidi-font-weight: normal; mso-spacerun: 'yes'; mso-ansi-font-weight: bold">休养Recuperating</span><span style="FONT-SIZE: 12pt; FONT-FAMILY: 黑体; COLOR: rgb(128,0,0); mso-hansi-font-family: 宋体; mso-bidi-font-weight: normal; mso-spacerun: 'yes'; mso-ansi-font-weight: bold"></span></strong></p>
<p><span style="FONT-SIZE: 11pt; FONT-FAMILY: 宋体; mso-ascii-font-family: Cambria; mso-hansi-font-family: Cambria; mso-spacerun: 'yes'">你可用休整的时间治疗遭受的重创、疾病、中毒等状况。</span><span style="FONT-SIZE: 16pt; FONT-FAMILY: 宋体; mso-spacerun: 'yes'"><br />
</span><span style="FONT-SIZE: 11pt; FONT-FAMILY: 宋体; mso-ascii-font-family: Cambria; mso-hansi-font-family: Cambria; mso-spacerun: 'yes'">每完成</span><span style="FONT-SIZE: 11pt; FONT-FAMILY: Cambria; mso-spacerun: 'yes'">3</span><span style="FONT-SIZE: 11pt; FONT-FAMILY: 宋体; mso-ascii-font-family: Cambria; mso-hansi-font-family: Cambria; mso-spacerun: 'yes'">日的休养活动，你可以进行一次</span><span style="FONT-SIZE: 11pt; FONT-FAMILY: Cambria; mso-spacerun: 'yes'">DC 15</span><span style="FONT-SIZE: 11pt; FONT-FAMILY: 宋体; mso-ascii-font-family: Cambria; mso-hansi-font-family: Cambria; mso-spacerun: 'yes'">的体质豁免。豁免成功则你可以选择以下效果之一</span><span style="FONT-SIZE: 11pt; FONT-FAMILY: Cambria; mso-spacerun: 'yes'">:</span><span style="FONT-SIZE: 10.5pt; FONT-FAMILY: Calibri; mso-bidi-font-family: 'Times New Roman'; mso-fareast-font-family: 宋体; mso-font-kerning: 1.0000pt; mso-spacerun: 'yes'"></span></p>
<p><span style="FONT-SIZE: 7.5pt; FONT-FAMILY: Wingdings; mso-spacerun: 'yes'">l</span><span style="FONT-SIZE: 8pt; FONT-FAMILY: 'Times New Roman'; mso-fareast-font-family: Wingdings; mso-spacerun: 'yes'"> </span><span style="FONT-SIZE: 11pt; FONT-FAMILY: 宋体; mso-ascii-font-family: Cambria; mso-hansi-font-family: Cambria; mso-spacerun: 'yes'">终止身上一项妨碍你恢复生命值的效应。</span></p>
<p><span style="FONT-SIZE: 11pt; FONT-FAMILY: 宋体; mso-ascii-font-family: Cambria; mso-hansi-font-family: Cambria; mso-spacerun: 'yes'"></span><span style="FONT-SIZE: 7.5pt; FONT-FAMILY: Wingdings; mso-spacerun: 'yes'">l</span><span style="FONT-SIZE: 8pt; FONT-FAMILY: 'Times New Roman'; mso-fareast-font-family: Wingdings; mso-spacerun: 'yes'"> </span><span style="FONT-SIZE: 11pt; FONT-FAMILY: 宋体; mso-ascii-font-family: Cambria; mso-hansi-font-family: Cambria; mso-spacerun: 'yes'">随后的</span><span style="FONT-SIZE: 11pt; FONT-FAMILY: Cambria; mso-spacerun: 'yes'">24</span><span style="FONT-SIZE: 11pt; FONT-FAMILY: 宋体; mso-ascii-font-family: Cambria; mso-hansi-font-family: Cambria; mso-spacerun: 'yes'">小时内，对抵抗一项正生效的疾病或毒素效应所进行的豁免具有优势。</span></p></article><footer class="page-footer"><p>📚 📖 玩家手册 2014 · 规则集 2014</p></footer></main></div><script src="/assets/search.js"></script><script src="/assets/sidebar.js"></script></body></html>
