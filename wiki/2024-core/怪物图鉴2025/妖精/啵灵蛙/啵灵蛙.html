<p>沼泽与滩涂中的两栖蛙灵</p>
<div class="HT">

**栖息地：**沼泽 ；**宝藏：**器具，个体

</div>

<p>啵灵蛙是沼泽地的妖精化身。它们守护着朦胧的野外沼地——并认为自己担任的这一角色广受欢迎。啵灵蛙大小与人类相仿，但却长着蛙类和蟾蜍的形貌；这些蛙人和沼泽地中栖息的生物们同样关系密切。</p></article><footer class="page-footer"><p>📚 👹 怪物图鉴 2025 · 规则集 2024</p></footer></main></div><script src="/assets/search.js"></script><script src="/assets/sidebar.js"></script></body></html>
