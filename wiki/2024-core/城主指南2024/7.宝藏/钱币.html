<p>最经典的宝藏类型便是金钱了，它们包括铜币（CP）、银币（SP）、金银币（EP）、金币（GP）以及铂金币（PP）。见《玩家手册》以了解它们的相对价值，每五十枚任意类型的钱币合一磅重。</p></article><footer class="page-footer"><p>📚 📖 城主指南 2024 · 规则集 2024</p></footer></main></div><script src="/assets/search.js"></script><script src="/assets/sidebar.js"></script></body></html>
