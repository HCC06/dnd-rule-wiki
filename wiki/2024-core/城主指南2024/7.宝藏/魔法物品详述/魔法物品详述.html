<p>魔法物品按字母顺序排列。如果一个魔法物品的描述将一个生物的名字大写并以粗体显示，这是一个指向该生物资料卡的视觉提示。除非文本另有说明，否则该资料卡在《<strong>怪物图鉴》</strong>中。如何阅读和使用资料卡在《<strong>怪物图鉴》</strong>中有解释，在玩家手册中也有少量解释。</p></article><footer class="page-footer"><p>📚 📖 城主指南 2024 · 规则集 2024</p></footer></main></div><script src="/assets/search.js"></script><script src="/assets/sidebar.js"></script></body></html>
