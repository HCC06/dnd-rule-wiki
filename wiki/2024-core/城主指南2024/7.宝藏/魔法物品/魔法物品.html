<p>魔法物品收集自陨落怪物所囤积的宝藏之中或是发掘自失落已久的宝库之中。这种物品会给予一名玩家难以用其他方式取得的能力，或是以奇妙的方式对其所有者的能力进行完善。</p></article><footer class="page-footer"><p>📚 📖 城主指南 2024 · 规则集 2024</p></footer></main></div><script src="/assets/search.js"></script><script src="/assets/sidebar.js"></script></body></html>
