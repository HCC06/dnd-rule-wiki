<p>战斗中使用攻击检定来判定一次攻击是否命中。<br />
你也可以使用攻击检定来处理与战斗中的攻击行为相近的非战斗活动，比如一场箭术比试或飞镖游戏。为目标确立护甲等级，决定角色是否具有所使用武器的熟练项，随后让玩家进行一次攻击检定。（又见本章中“成功程度”。）</p></article><footer class="page-footer"><p>📚 📖 城主指南 2024 · 规则集 2024</p></footer></main></div><script src="/assets/search.js"></script><script src="/assets/sidebar.js"></script></body></html>
