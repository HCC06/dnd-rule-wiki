<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>灰鹰 — D&D Rule Wiki</title><link rel="stylesheet" href="/assets/style.css"></head><body><div class="layout"><aside class="sidebar" id="sidebar"><div class="sidebar-head"><a href="/" class="home-link">🐉 D&D Rule Wiki</a><input type="text" id="search-input" class="search-box" placeholder="搜索规则、法术、怪物…" autocomplete="off"><div id="search-results" class="search-results"></div></div><nav class="tree" id="tree"></nav></aside><main class="content"><nav class="breadcrumbs"><a href="/2024-core/城主指南2024/">📖 城主指南 2024</a> <span class="sep">›</span> <a href="/2024-core/城主指南2024/5.创作战役/灰鹰/">灰鹰</a> <span class="sep">›</span> <span class="current">灰鹰</span></nav><article class="rule-content"><h1>灰鹰</h1><p><strong>灰鹰 Greyhawk</strong></p>
<p>灰鹰是一个你可以用作你战役背景的 D&amp;D 世设，你也能将它作为创造自己世设时使用的模版。为了方便你自行使用，这一部分讲述了关于灰鹰的重要内容，你可以随心所欲地修改和扩展它们。</p>
<p>灰鹰是加里·盖克斯， D&amp;D 游戏最初创造者之一的作品。加里在这个自创的世设中创作了许多 D&amp;D 早期冒险。本书中的这一版灰鹰则很大程度上脱胎于在 1980 年出版的《灰鹰世界地理志》。</p></article><footer class="page-footer"><p>📚 📖 城主指南 2024 · 规则集 2024</p></footer></main></div><script src="/assets/search.js"></script><script src="/assets/sidebar.js"></script></body></html>
