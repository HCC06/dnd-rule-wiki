<p>某些生物或者物件会免疫特定的伤害类型或者某类特定的状态。免疫特定伤害类型意味着你不会因该类型的伤害受到伤害，免疫某类状态意味着你不受该类状态的影响。</p></article><footer class="page-footer"><p>📚 📖 玩家手册 2024 · 规则集 2024</p></footer></main></div><script src="/assets/search.js"></script><script src="/assets/sidebar.js"></script></body></html>
