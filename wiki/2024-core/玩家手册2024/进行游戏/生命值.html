<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>生命值 — D&D Rule Wiki</title><link rel="stylesheet" href="/assets/style.css"></head><body><div class="layout"><aside class="sidebar" id="sidebar"><div class="sidebar-head"><a href="/" class="home-link">🐉 D&D Rule Wiki</a><input type="text" id="search-input" class="search-box" placeholder="搜索规则、法术、怪物…" autocomplete="off"><div id="search-results" class="search-results"></div></div><nav class="tree" id="tree"></nav></aside><main class="content"><nav class="breadcrumbs"><a href="/2024-core/玩家手册2024/">📖 玩家手册 2024</a> <span class="sep">›</span> <a href="/2024-core/玩家手册2024/进行游戏/">进行游戏</a> <span class="sep">›</span> <span class="current">生命值</span></nav><article class="rule-content"><h1>生命值</h1><h3 id="hit-points">生命值 Hit Points</h3>
<p>生命值代表耐久力和生存意志。有更多生命值的生物更难被杀死。你的生命值上限代表你未受伤时拥有的生命值。你的当前生命值可能是从0到上限之间的任何数字，0是生命值的最小值。<br />
每当你受到伤害时，你都需要将伤害值从你的生命值中扣除。除非生命值降到0，否则失去生命值不会对你的行动能力有任何影响。<br />
如果你只有一半或者更少的生命值，那么你会处于浴血，其本身没有游戏上的效果，但可能会触发其他游戏上的效应。</p></article><footer class="page-footer"><p>📚 📖 玩家手册 2024 · 规则集 2024</p></footer></main></div><script src="/assets/search.js"></script><script src="/assets/sidebar.js"></script></body></html>
