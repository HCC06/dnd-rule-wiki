<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>工匠 — D&D Rule Wiki</title><link rel="stylesheet" href="/assets/style.css"></head><body><div class="layout"><aside class="sidebar" id="sidebar"><div class="sidebar-head"><a href="/" class="home-link">🐉 D&D Rule Wiki</a><input type="text" id="search-input" class="search-box" placeholder="搜索规则、法术、怪物…" autocomplete="off"><div id="search-results" class="search-results"></div></div><nav class="tree" id="tree"></nav></aside><main class="content"><nav class="breadcrumbs"><a href="/2024-core/玩家手册2024/">📖 玩家手册 2024</a> <span class="sep">›</span> <a href="/2024-core/玩家手册2024/角色起源/背景/">背景</a> <span class="sep">›</span> <span class="current">工匠</span></nav><article class="rule-content"><h1>工匠</h1><h3 id="artisan">工匠 Artisan</h3>
<p><strong>属性值：</strong>力量、敏捷、智力<br />
<strong>专长：</strong>巧匠（见第五章）<br />
<strong>技能熟练：</strong>调查与游说<br />
<strong>工具熟练：</strong>选择一种工匠工具（参见第六章）<br />
<strong>装备：</strong>选择A或B：(A)工匠工具（同上所选）、2小包、旅行服装、32GP；或(B)50GP。</p>
<p>你在力气足以提起水桶时，就开始于工匠工坊里以拖地和擦洗度日，每天挣那么几个铜板。当你长到成为学徒的年龄时，你学会了自己制作基本的手工艺品，还有面对刁钻客户时该说什么好话。你的买卖也让你对消息琐事有敏锐的洞察力。</p></article><footer class="page-footer"><p>📚 📖 玩家手册 2024 · 规则集 2024</p></footer></main></div><script src="/assets/search.js"></script><script src="/assets/sidebar.js"></script></body></html>
