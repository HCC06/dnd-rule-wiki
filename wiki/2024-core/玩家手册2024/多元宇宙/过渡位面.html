<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>过渡位面 — D&D Rule Wiki</title><link rel="stylesheet" href="/assets/style.css"></head><body><div class="layout"><aside class="sidebar" id="sidebar"><div class="sidebar-head"><a href="/" class="home-link">🐉 D&D Rule Wiki</a><input type="text" id="search-input" class="search-box" placeholder="搜索规则、法术、怪物…" autocomplete="off"><div id="search-results" class="search-results"></div></div><nav class="tree" id="tree"></nav></aside><main class="content"><nav class="breadcrumbs"><a href="/2024-core/玩家手册2024/">📖 玩家手册 2024</a> <span class="sep">›</span> <a href="/2024-core/玩家手册2024/多元宇宙/">多元宇宙</a> <span class="sep">›</span> <span class="current">过渡位面</span></nav><article class="rule-content"><h1>过渡位面</h1><p><strong>过渡位面 Transitive Planes</strong></p>
<p>过渡位面充当了位面之间的道路：</p>
<p><strong>星光位面（星界）Astral Plane。</strong>这无尽的银白广袤空间连接着物质位面和外层位面。在这闪耀的浩瀚中，曾有整个文明崛起；而其他的文明则在魔法船载具中航行在这魔法的宇宙中。<br />
<strong>以太位面Ethereal Plane。</strong>这幽灵般的领域连接着物质位面和内层位面。以太位面与其他位面交叠的区域被称作<strong>边界以太Border Ethereal</strong>，在那里生物可以一瞥外在的诸位面。</p></article><footer class="page-footer"><p>📚 📖 玩家手册 2024 · 规则集 2024</p></footer></main></div><script src="/assets/search.js"></script><script src="/assets/sidebar.js"></script></body></html>
