<p>梅林是一片郁郁葱葱的林地，充满了柔软的草地、随微风摇曳的有着白色树皮与紫色花朵的热带树木，以及许多种类的美味且享有盛誉的水果。在整个大陆，再没有任何其他地方有如此丰富的、备受追捧的浆果和水果，费奥林人围绕着这片丰饶的土地确立了他们的身份和生活方式。<br />
当地的法律限制野生动物的狩猎，以确保生态系统的平衡，泽里佐铁卫巡逻在森林小径上，以防止偷猎行为。梅林既美丽又安全，经常可以看到家庭和孩子在公共小道上散步。</p></article><footer class="page-footer"><p>📚 荒洲探险家指南 · 规则集 2014</p></footer></main></div><script src="/assets/search.js"></script><script src="/assets/sidebar.js"></script></body></html>
