<p>位于银脉山脊以东，围绕着荣耀大道与清谷大道交汇处的幽暗地带，清谷林地标志着东部山谷的中心。这里是远离帝国喧嚣生活的避风港，茂密的榆树和高大的灌木丛庇护着几支远离王室视线的费尔伯格氏族。只要你坚定地走在道路上，林地通常是平和安宁的，但在林地的深处，饥饿的巨兽和土潜伏的强盗在伺机而动。</p></article><footer class="page-footer"><p>📚 荒洲探险家指南 · 规则集 2014</p></footer></main></div><script src="/assets/search.js"></script><script src="/assets/sidebar.js"></script></body></html>
