<p><em>太初，有生于无。先生光，后生想，再后色身与火乃生。</em></p>
<p><em>自皈依神，当愿众生，体解神谕，发无上心。</em></p>
<p><em>自皈依理，当愿众生，行于正道，不落邪见。</em></p>
<p><em>自皈依贤，当愿众生，得传经藏，精进无碍。</em></p>
<p>——阿迪亚·舒，钴魂书院档案员<br />
——Archivist Adia Shu of the Cobalt Soul</p>
<p><strong>章节封面：</strong>一名钴魂武僧为一队年轻的冒险者展现荒洲的过去。</p></article><footer class="page-footer"><p>📚 荒洲探险家指南 · 规则集 2014</p></footer></main></div><script src="/assets/search.js"></script><script src="/assets/sidebar.js"></script></body></html>
