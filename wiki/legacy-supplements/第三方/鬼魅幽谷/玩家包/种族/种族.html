<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>种族 — D&D Rule Wiki</title><link rel="stylesheet" href="/assets/style.css"></head><body><div class="layout"><aside class="sidebar" id="sidebar"><div class="sidebar-head"><a href="/" class="home-link">🐉 D&D Rule Wiki</a><input type="text" id="search-input" class="search-box" placeholder="搜索规则、法术、怪物…" autocomplete="off"><div id="search-results" class="search-results"></div></div><nav class="tree" id="tree"></nav></aside><main class="content"><nav class="breadcrumbs"><a href="/legacy-supplements/第三方/">第三方</a> <span class="sep">›</span> <a href="/legacy-supplements/第三方/鬼魅幽谷/玩家包/种族/">种族</a> <span class="sep">›</span> <span class="current">种族</span></nav><article class="rule-content"><h1>种族</h1><h1 id="species">种族 Species</h1>
<p>大部分标准的幻想种族都在艾弗瑞斯世界中有一席之地：人类、精灵、矮人和半身人都在喧嚣动荡中尽力生存。<br />
但还有一些物种是艾弗瑞斯独有的。有些是残忍妖精的恶意玩笑，而另一些则源自奥术之灾。他们与其他凡人种族一起奋斗遭难——但他们的存在也同样彰显艾弗瑞斯的奇迹与危机，这一切使得艾弗瑞斯独一无二。</p></article><footer class="page-footer"><p>📚 第三方 · 规则集 2014</p></footer></main></div><script src="/assets/search.js"></script><script src="/assets/sidebar.js"></script></body></html>
