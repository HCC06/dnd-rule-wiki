<p>黑火药代表着战争艺术形式的转变，从威力强大的攻城武器到隐蔽的手持枪械，它为各种武器提供燃料。在许多战役场景中，枪械取代了传统的武器体系，迫使箭、剑和斧等被逐渐淘汰。枪械甚至可能成为狩猎和防御的日用工具。</p></article><footer class="page-footer"><p>📚 第三方 · 规则集 2014</p></footer></main></div><script src="/assets/search.js"></script><script src="/assets/sidebar.js"></script></body></html>
