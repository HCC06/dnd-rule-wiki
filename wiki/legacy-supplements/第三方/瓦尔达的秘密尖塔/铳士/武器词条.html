<p>以下是枪械表中词条列中各词条的定义，此处仅列出本书新增或有改动的词条。</p>
<p><strong>枪械 Firearm</strong><br />
除非另有说明，否则你无法将你的属性调整值添加到武器的伤害中。枪械的弹药在使用后即摧毁。</p>
<p><strong>后坐 Recoil</strong><br />
在你使用此武器发动攻击后，直至当前回合结束，你都无法发动超出武器常规射程的远程攻击。</p>
<p><strong>换弹 Reload<br />
</strong>此武器在必须换弹前可以进行一定次数的攻击。如果你熟练于此武器，则为其换弹为一个动作或附赠动作；否则，换弹为一个动作。</p></article><footer class="page-footer"><p>📚 第三方 · 规则集 2014</p></footer></main></div><script src="/assets/search.js"></script><script src="/assets/sidebar.js"></script></body></html>
