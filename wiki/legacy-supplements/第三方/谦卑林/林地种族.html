<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>林地种族 — D&D Rule Wiki</title><link rel="stylesheet" href="/assets/style.css"></head><body><div class="layout"><aside class="sidebar" id="sidebar"><div class="sidebar-head"><a href="/" class="home-link">🐉 D&D Rule Wiki</a><input type="text" id="search-input" class="search-box" placeholder="搜索规则、法术、怪物…" autocomplete="off"><div id="search-results" class="search-results"></div></div><nav class="tree" id="tree"></nav></aside><main class="content"><nav class="breadcrumbs"><a href="/legacy-supplements/第三方/">第三方</a> <span class="sep">›</span> <a href="/legacy-supplements/第三方/谦卑林/">谦卑林</a> <span class="sep">›</span> <span class="current">林地种族</span></nav><article class="rule-content"><h1>林地种族</h1><p><strong>林地种族 Races of the Wood</strong></p>
<p>组成谦卑林世界的各族裔分为两类：禽鸟族裔和谦卑族裔。尽管它们很像动物，但这些居住在谦卑林的城市和乡镇的族裔都属于类人生物。<br />
本章概述了10个核心种族，5个禽鸟族裔和5个谦卑族裔，他们构成了在森林中发现的大多数角色。本章还详细介绍了各种角色创建选项、新职业选项、背景、专长和法术，以帮助您制作自己的谦卑林冒险家。</p></article><footer class="page-footer"><p>📚 第三方 · 规则集 2014</p></footer></main></div><script src="/assets/search.js"></script><script src="/assets/sidebar.js"></script></body></html>
