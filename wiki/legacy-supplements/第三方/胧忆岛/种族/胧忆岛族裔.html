<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>胧忆岛族裔 — D&D Rule Wiki</title><link rel="stylesheet" href="/assets/style.css"></head><body><div class="layout"><aside class="sidebar" id="sidebar"><div class="sidebar-head"><a href="/" class="home-link">🐉 D&D Rule Wiki</a><input type="text" id="search-input" class="search-box" placeholder="搜索规则、法术、怪物…" autocomplete="off"><div id="search-results" class="search-results"></div></div><nav class="tree" id="tree"></nav></aside><main class="content"><nav class="breadcrumbs"><a href="/legacy-supplements/第三方/">第三方</a> <span class="sep">›</span> <a href="/legacy-supplements/第三方/胧忆岛/种族/">种族</a> <span class="sep">›</span> <span class="current">胧忆岛族裔</span></nav><article class="rule-content"><h1>胧忆岛族裔</h1><h1 id="ancestries-of-obojima">胧忆岛族裔 Ancestries of Obojima</h1>
<p>胧忆岛上生存的族裔包括人类、达良、精灵和鸣玉族。这个世界的文化和历史就是围绕着这些族裔建立的。如果你想要完全沉浸在胧忆岛的体验中,你可能会想要从这些族裔中选择一个。<br />
这并不是说你不能扮演其他族裔。只是这意味着你需要以自己独特的方式将它们引入到这座岛屿中。关于如何改编现有的5E族裔,请参见其他族裔章节（翻译暂缺）。</p></article><footer class="page-footer"><p>📚 第三方 · 规则集 2014</p></footer></main></div><script src="/assets/search.js"></script><script src="/assets/sidebar.js"></script></body></html>
