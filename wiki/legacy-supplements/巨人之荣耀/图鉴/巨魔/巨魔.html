<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>巨魔 — D&D Rule Wiki</title><link rel="stylesheet" href="/assets/style.css"></head><body><div class="layout"><aside class="sidebar" id="sidebar"><div class="sidebar-head"><a href="/" class="home-link">🐉 D&D Rule Wiki</a><input type="text" id="search-input" class="search-box" placeholder="搜索规则、法术、怪物…" autocomplete="off"><div id="search-results" class="search-results"></div></div><nav class="tree" id="tree"></nav></aside><main class="content"><nav class="breadcrumbs"><a href="/legacy-supplements/巨人之荣耀/">巨人之荣耀</a> <span class="sep">›</span> <a href="/legacy-supplements/巨人之荣耀/图鉴/巨魔/">巨魔</a> <span class="sep">›</span> <span class="current">巨魔</span></nav><article class="rule-content"><h1>巨魔</h1><p><strong>巨魔 Trolls</strong></p>
<p>矮人传记《格纳尔丹钢盾传奇》中记载着，当安南身受重伤血流遍地之时，神毁灭者瓦普拉克就此诞生。传记中还进一步提及，当瓦普拉克的鲜血喷出之时，巨魔也因此而出现。无论真正的起源是什么，巨魔都代表着生命的克服万难成长繁荣的坚毅决心。<br />
巨魔的快速治疗能力使他们极易发生奇异的突变，尤其是当他们在非寻常环境或受到非常规魔法伤害时使用再生能力。巨魔聚合体与巨魔异变体就是巨魔奇异变种的两大例子。</p></article><footer class="page-footer"><p>📚 巨人之荣耀 · 规则集 2014</p></footer></main></div><script src="/assets/search.js"></script><script src="/assets/sidebar.js"></script></body></html>
