<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>门镇 — D&D Rule Wiki</title><link rel="stylesheet" href="/assets/style.css"></head><body><div class="layout"><aside class="sidebar" id="sidebar"><div class="sidebar-head"><a href="/" class="home-link">🐉 D&D Rule Wiki</a><input type="text" id="search-input" class="search-box" placeholder="搜索规则、法术、怪物…" autocomplete="off"><div id="search-results" class="search-results"></div></div><nav class="tree" id="tree"></nav></aside><main class="content"><nav class="breadcrumbs"><a href="/legacy-supplements/印记城与外域/">印记城与外域</a> <span class="sep">›</span> <a href="/legacy-supplements/印记城与外域/第三章/">第三章</a> <span class="sep">›</span> <span class="current">门镇</span></nav><article class="rule-content"><h1>门镇</h1><h2 id="gate-towns">门镇 Gate-Towns</h2>
<p>在外域的边缘，均匀地分布着十六座门镇，它们同无极尖峰的距离是相等的。每一座城镇都围绕着一座通往某个外层位面的传送门而建，这些城镇也受到与之相连的领域的显著影响。每一座城镇和它的住民都与其他城镇的大不相同，它们身上会显示出对应位面的许多极端特质。各位面的细节可在《城主指南》中找到。<br />
下文将按英文首字母顺序介绍每座门镇。</p></article><footer class="page-footer"><p>📚 印记城与外域 · 规则集 2014</p></footer></main></div><script src="/assets/search.js"></script><script src="/assets/sidebar.js"></script></body></html>
