</strong><em>奇物，非普通（+1）/珍稀（+2）/极珍稀（+3）</em><br />
裹着这套布制的绑带期间，你的徒手打击在对抗非魔法攻击与伤害的免疫与抗性时被视为魔法性的。此外，你徒手打击的攻击检定与伤害掷骰获得加值，加值的数值取决于这套绷带的稀有度。<br />
（译者注：Warps通常是拳击用的“护手绷带”。但根据效果，似乎并没有说不能裹在脚上或者角上。）</p></article><footer class="page-footer"><p>📚 万象无常书 · 规则集 2014</p></footer></main></div><script src="/assets/search.js"></script><script src="/assets/sidebar.js"></script></body></html>
