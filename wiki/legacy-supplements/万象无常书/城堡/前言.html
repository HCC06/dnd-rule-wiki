<p>本章为DM们介绍了一座名为“球牢城堡”的地城。你可以用这个地城来描述从万象无常牌中抽到城堡牌的角色们的命运。本章还包括冒险者们可能以其他方式进入球牢城堡的方法，以及如何维持战役或在队伍分队时保持它不脱离控制的建议。</p></article><footer class="page-footer"><p>📚 万象无常书 · 规则集 2014</p></footer></main></div><script src="/assets/search.js"></script><script src="/assets/sidebar.js"></script></body></html>
