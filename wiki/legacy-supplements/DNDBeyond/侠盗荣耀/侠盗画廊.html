<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>侠盗画廊 — D&D Rule Wiki</title><link rel="stylesheet" href="/assets/style.css"></head><body><div class="layout"><aside class="sidebar" id="sidebar"><div class="sidebar-head"><a href="/" class="home-link">🐉 D&D Rule Wiki</a><input type="text" id="search-input" class="search-box" placeholder="搜索规则、法术、怪物…" autocomplete="off"><div id="search-results" class="search-results"></div></div><nav class="tree" id="tree"></nav></aside><main class="content"><nav class="breadcrumbs"><a href="/legacy-supplements/DNDBeyond/">DNDBeyond</a> <span class="sep">›</span> <a href="/legacy-supplements/DNDBeyond/侠盗荣耀/">侠盗荣耀</a> <span class="sep">›</span> <span class="current">侠盗画廊</span></nav><article class="rule-content"><h1>侠盗画廊</h1><p><strong>非寻常攻击和魔法 Unusual Attacks and Magic</strong></p>
<p>某些生物可以用武器造成非寻常的伤害类型和施放以非典型方式发挥作用的法术。例如，富尔格·菲特兹威廉的重弩造成额外毒素伤害。但这种额外的伤害并非是武器的特性。这种例外是来源于资料卡上的一种特殊特性，代表了该生物如何使用自己的武器或施法；该例外不会影响武器或法术在其他生物手里所发挥的效果。</p></article><footer class="page-footer"><p>📚 DNDBeyond · 规则集 2014</p></footer></main></div><script src="/assets/search.js"></script><script src="/assets/sidebar.js"></script></body></html>
