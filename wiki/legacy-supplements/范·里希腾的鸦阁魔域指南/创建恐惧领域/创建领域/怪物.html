<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>怪物 — D&D Rule Wiki</title><link rel="stylesheet" href="/assets/style.css"></head><body><div class="layout"><aside class="sidebar" id="sidebar"><div class="sidebar-head"><a href="/" class="home-link">🐉 D&D Rule Wiki</a><input type="text" id="search-input" class="search-box" placeholder="搜索规则、法术、怪物…" autocomplete="off"><div id="search-results" class="search-results"></div></div><nav class="tree" id="tree"></nav></aside><main class="content"><nav class="breadcrumbs"><a href="/legacy-supplements/范·里希腾的鸦阁魔域指南/">范·里希腾的鸦阁魔域指南</a> <span class="sep">›</span> <a href="/legacy-supplements/范·里希腾的鸦阁魔域指南/创建恐惧领域/创建领域/">创建领域</a> <span class="sep">›</span> <span class="current">怪物</span></nav><article class="rule-content"><h1>怪物</h1><h3 id="monsters"><strong><span style="FONT-SIZE: 13.5pt;  FONT-WEIGHT: bold; ;">怪物</span><span style="FONT-SIZE: 13.5pt;  FONT-WEIGHT: bold; ;">Monsters</span><span style="FONT-SIZE: 13.5pt;  FONT-WEIGHT: bold; ;"></span></strong></h3>
<p><span style="">幽魂、夺心魔、狼人</span><span style="mso-bidi-font-family: 'Times New Roman'">每一个怪物都是一个故事。考虑哪些怪物可以补充或</span><span style="">与</span><span style="mso-bidi-font-family: 'Times New Roman'">黑暗领主的故事</span><span style="">对比</span><span style="mso-bidi-font-family: 'Times New Roman'">。用几句话描述哪些怪物最能代表黑暗领主的邪恶，哪些怪物可能对黑暗领主的计划不利。例如，邪恶的</span><span style="">黑暗领主</span><span style="mso-bidi-font-family: 'Times New Roman'">科学家可能会得到</span><span style="">血肉魔像</span><span style="mso-bidi-font-family: 'Times New Roman'">和</span><span style="">蠕行之爪</span><span style="mso-bidi-font-family: 'Times New Roman'">的帮助，但他们会受到因</span><span style="">黑暗领主</span><span style="mso-bidi-font-family: 'Times New Roman'">的实验而受苦的</span><span style="">树精</span><span style="mso-bidi-font-family: 'Times New Roman'">和幽魂的反对。为了获得灵感，请参考 "黑暗领主的</span><span style="">阴影</span><span style="mso-bidi-font-family: 'Times New Roman'"> "部分和你对该部分问题的回答，以及本章后面 "恐怖</span><span style="">题材</span><span style="mso-bidi-font-family: 'Times New Roman'"> "部分的怪物表。</span><span style="mso-bidi-font-family: 'Times New Roman'"></span></p></article><footer class="page-footer"><p>📚 范·里希腾的鸦阁魔域指南 · 规则集 2014</p></footer></main></div><script src="/assets/search.js"></script><script src="/assets/sidebar.js"></script></body></html>
