<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>坠落至生物上 — D&D Rule Wiki</title><link rel="stylesheet" href="/assets/style.css"></head><body><div class="layout"><aside class="sidebar" id="sidebar"><div class="sidebar-head"><a href="/" class="home-link">🐉 D&D Rule Wiki</a><input type="text" id="search-input" class="search-box" placeholder="搜索规则、法术、怪物…" autocomplete="off"><div id="search-results" class="search-results"></div></div><nav class="tree" id="tree"></nav></aside><main class="content"><nav class="breadcrumbs"><a href="/legacy-supplements/塔莎的万事坩埚/">塔莎的万事坩埚</a> <span class="sep">›</span> <a href="/legacy-supplements/塔莎的万事坩埚/城主工具/环境灾害/">环境灾害</a> <span class="sep">›</span> <span class="current">坠落至生物上</span></nav><article class="rule-content"><h1>坠落至生物上</h1><p><strong>坠落至生物上 Falling onto a Creature</strong></p>
<p>如果一个生物坠落至另一个生物所占据的空间里，而它们都非微型体型，后者必须在一次DC 15的敏捷豁免中成功，否则被坠落的生物撞击，并且由于坠落而造成的任何伤害在它们之间平均分配。</p>
<p>受到撞击的生物也应击倒地，除非它的体型比坠落的生物大两级或者两级以上。</p></article><footer class="page-footer"><p>📚 塔莎的万事坩埚 · 规则集 2014</p></footer></main></div><script src="/assets/search.js"></script><script src="/assets/sidebar.js"></script></body></html>
