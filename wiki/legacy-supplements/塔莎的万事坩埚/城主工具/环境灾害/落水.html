<p>一个生物在落入水中或其他液体中时，可以使用其反应进行一次DC 15的力量（运动）或敏捷（特技）检定，来让头或脚先入水。若检定成功，任何由坠落造成的伤害都会减半。</p></article><footer class="page-footer"><p>📚 塔莎的万事坩埚 · 规则集 2014</p></footer></main></div><script src="/assets/search.js"></script><script src="/assets/sidebar.js"></script></body></html>
