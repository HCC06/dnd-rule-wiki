<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>邪恶交易 — D&D Rule Wiki</title><link rel="stylesheet" href="/assets/style.css"></head><body><div class="layout"><aside class="sidebar" id="sidebar"><div class="sidebar-head"><a href="/" class="home-link">🐉 D&D Rule Wiki</a><input type="text" id="search-input" class="search-box" placeholder="搜索规则、法术、怪物…" autocomplete="off"><div id="search-results" class="search-results"></div></div><nav class="tree" id="tree"></nav></aside><main class="content"><nav class="breadcrumbs"><a href="/legacy-supplements/模组/">模组</a> <span class="sep">›</span> <a href="/legacy-supplements/模组/坠入阿弗纳斯/邪恶交易/">邪恶交易</a> <span class="sep">›</span> <span class="current">邪恶交易</span></nav><article class="rule-content"><h1>邪恶交易</h1><p><span style="FONT-SIZE: 12pt; FONT-FAMILY: 宋体; COLOR: rgb(0,0,0)"> </span></p>
<p><strong><span style="FONT-SIZE: 22pt; FONT-FAMILY: 黑体; FONT-WEIGHT: bold; COLOR: rgb(128,0,0); LINE-HEIGHT: 150%; mso-spacerun: 'yes'; mso-bidi-font-family: 等线; mso-font-kerning: 1.0000pt">附录A：</span><span style="FONT-SIZE: 22pt; FONT-FAMILY: 黑体; FONT-WEIGHT: bold; COLOR: rgb(128,0,0); LINE-HEIGHT: 150%; mso-spacerun: 'yes'; mso-bidi-font-family: 等线; mso-font-kerning: 1.0000pt">邪恶交易 Diabolical Deals</span><span style="FONT-SIZE: 22pt; FONT-FAMILY: 黑体; FONT-WEIGHT: bold; COLOR: rgb(128,0,0); LINE-HEIGHT: 150%; mso-spacerun: 'yes'; mso-bidi-font-family: 等线; mso-font-kerning: 1.0000pt"></span></strong></p>
<p><span style="FONT-SIZE: 12pt; FONT-FAMILY: 宋体; COLOR: rgb(0,0,0)">魔鬼的一大特点就是它们乐于与凡人达成交易。这些交易不仅仅是简单的协议；这种凡人付出代价从魔鬼那里换取力量的交易是受到宇宙法则约束的。一旦达成协议，双方都必须签署一份有约束性的合同。</span></p>
<p><span style="FONT-SIZE: 12pt; FONT-FAMILY: 宋体; COLOR: rgb(0,0,0)">魔鬼的终极目标就是得到凡人的灵魂。如果不能一蹴而就地得到一个凡人的灵魂，魔鬼就会一步步地教唆他作恶，从而把他的灵魂贬到九狱。</span></p></article><footer class="page-footer"><p>📚 模组 · 规则集 2014</p></footer></main></div><script src="/assets/search.js"></script><script src="/assets/sidebar.js"></script></body></html>
