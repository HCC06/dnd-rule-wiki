<p>一只雪地枭熊拥有雪地枭与北极熊的身体特征。一只雪地枭熊若不是在睡觉或冬眠，就是在大摇大摆地穿过苔原，寻找食物。<br />
<strong>游戏数据Game Static。</strong>雪地枭熊使用怪物图鉴中枭熊的数据。它额外拥有30尺游泳速度并且对寒冷气候适应。</p></article><footer class="page-footer"><p>📚 模组 · 规则集 2014</p></footer></main></div><script src="/assets/search.js"></script><script src="/assets/sidebar.js"></script></body></html>
