<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>歌利亚 — D&D Rule Wiki</title><link rel="stylesheet" href="/assets/style.css"></head><body><div class="layout"><aside class="sidebar" id="sidebar"><div class="sidebar-head"><a href="/" class="home-link">🐉 D&D Rule Wiki</a><input type="text" id="search-input" class="search-box" placeholder="搜索规则、法术、怪物…" autocomplete="off"><div id="search-results" class="search-results"></div></div><nav class="tree" id="tree"></nav></aside><main class="content"><nav class="breadcrumbs"><a href="/legacy-supplements/模组/">模组</a> <span class="sep">›</span> <a href="/legacy-supplements/模组/冰风谷/生物/">生物</a> <span class="sep">›</span> <span class="current">歌利亚</span></nav><article class="rule-content"><h1>歌利亚</h1><p><strong>歌利亚 Goliath</strong></p>
<p>在最高峰的山坡上，远远高于树木生长的高度，空气稀薄，寒风呼啸，住着隐居的哥利亚人。很少有人能如实讲述自己遇见歌利亚的经历，能与歌利亚建立友谊者更是少之又少。<br />
歌利亚喜欢竞争和计算分数，记录他们的事迹，统计他们的成就，以便与别人的功绩相比较。歌利亚热衷于胜利，但他们同样把失败看作是提高自己技能的动力。最重要的是，每一个歌利亚都在追求着超越他们过去的表现，由此承担了更高的风险。因此，很少有歌利亚能活到老年。</p></article><footer class="page-footer"><p>📚 模组 · 规则集 2014</p></footer></main></div><script src="/assets/search.js"></script><script src="/assets/sidebar.js"></script></body></html>
