<p><span style="FONT-SIZE: 9pt; FONT-FAMILY: 微软雅黑; mso-font-kerning: 1.0000pt; mso-spacerun: 'yes'">楚尔特</span><span style="FONT-SIZE: 9pt; FONT-FAMILY: 微软雅黑; mso-font-kerning: 1.0000pt; mso-spacerun: 'yes'">是一</span><span style="FONT-SIZE: 9pt; FONT-FAMILY: 微软雅黑; mso-font-kerning: 1.0000pt; mso-spacerun: 'yes'">个布满未知</span><span style="FONT-SIZE: 9pt; FONT-FAMILY: 微软雅黑; mso-font-kerning: 1.0000pt; mso-spacerun: 'yes'">奇迹</span><span style="FONT-SIZE: 9pt; FONT-FAMILY: 微软雅黑; mso-font-kerning: 1.0000pt; mso-spacerun: 'yes'">与</span><span style="FONT-SIZE: 9pt; FONT-FAMILY: 微软雅黑; mso-font-kerning: 1.0000pt; mso-spacerun: 'yes'">失落财富</span><span style="FONT-SIZE: 9pt; FONT-FAMILY: 微软雅黑; mso-font-kerning: 1.0000pt; mso-spacerun: 'yes'">的地方</span><span style="FONT-SIZE: 9pt; FONT-FAMILY: 微软雅黑; mso-font-kerning: 1.0000pt; mso-spacerun: 'yes'">。冒险者们会在</span><span style="FONT-SIZE: 9pt; FONT-FAMILY: 微软雅黑; mso-font-kerning: 1.0000pt; mso-spacerun: 'yes'">探索该半岛那未知的野外时发现这一点。</span></p></article><footer class="page-footer"><p>📚 模组 · 规则集 2014</p></footer></main></div><script src="/assets/search.js"></script><script src="/assets/sidebar.js"></script></body></html>
