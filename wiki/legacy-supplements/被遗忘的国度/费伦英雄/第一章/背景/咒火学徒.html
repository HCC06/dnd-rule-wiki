<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>咒火学徒 — D&D Rule Wiki</title><link rel="stylesheet" href="/assets/style.css"></head><body><div class="layout"><aside class="sidebar" id="sidebar"><div class="sidebar-head"><a href="/" class="home-link">🐉 D&D Rule Wiki</a><input type="text" id="search-input" class="search-box" placeholder="搜索规则、法术、怪物…" autocomplete="off"><div id="search-results" class="search-results"></div></div><nav class="tree" id="tree"></nav></aside><main class="content"><nav class="breadcrumbs"><a href="/legacy-supplements/被遗忘的国度/">被遗忘的国度</a> <span class="sep">›</span> <a href="/legacy-supplements/被遗忘的国度/费伦英雄/第一章/背景/">背景</a> <span class="sep">›</span> <span class="current">咒火学徒</span></nav><article class="rule-content"><h1>咒火学徒</h1><h3 id="spellfire-initiate">咒火学徒 Spellfire Initiate</h3>
<p><strong>属性值：</strong>体质、智力、魅力<br />
<strong>专长：</strong> 咒火火花（见本章后文"专长"）<br />
<strong>技能熟练：</strong>奥秘与察觉<br />
<strong>工具熟练：</strong>自选一套赌具<br />
<strong>装备：</strong>选择A或B：(A)赌具（同上所选）、奥术法器（水晶或魔杖）、2个小包、旅行服装、36GP；或(B)50GP。</p>
<p>你身上具有咒火的天赋：一种稀有的魔法形式，能够引导魔网的原始力量。操纵咒火会对身体造成很重的负担。因此你锻炼了自己的身心，以此来更有效地操纵这股神圣的力量。</p></article><footer class="page-footer"><p>📚 被遗忘的国度 · 规则集 2014</p></footer></main></div><script src="/assets/search.js"></script><script src="/assets/sidebar.js"></script></body></html>
