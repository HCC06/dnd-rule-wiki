<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>参加课外社团 — D&D Rule Wiki</title><link rel="stylesheet" href="/assets/style.css"></head><body><div class="layout"><aside class="sidebar" id="sidebar"><div class="sidebar-head"><a href="/" class="home-link">🐉 D&D Rule Wiki</a><input type="text" id="search-input" class="search-box" placeholder="搜索规则、法术、怪物…" autocomplete="off"><div id="search-results" class="search-results"></div></div><nav class="tree" id="tree"></nav></aside><main class="content"><nav class="breadcrumbs"><a href="/legacy-supplements/斯翠海文：混沌研习/">斯翠海文：混沌研习</a> <span class="sep">›</span> <a href="/legacy-supplements/斯翠海文：混沌研习/开学正当时/">开学正当时</a> <span class="sep">›</span> <span class="current">参加课外社团</span></nav><article class="rule-content"><h1>参加课外社团</h1><p><strong>参加课外社团 Joining an Extracurricular</strong></p>
<p>角色可以从下文中提到的课外社团中选择至多两门参加，并在本书冒险中获益。如果角色同时也在校园中参与工作，那么他只能参加一门课外社团。<br />
角色需要在学年开始——也就是一次冒险章节的开始——时宣称加入课外社团，以享受增益。在假期参加课外社团通常不会有很多活动。玩家应该在他们的记录表上记录这些变化。</p></article><footer class="page-footer"><p>📚 斯翠海文：混沌研习 · 规则集 2014</p></footer></main></div><script src="/assets/search.js"></script><script src="/assets/sidebar.js"></script></body></html>
