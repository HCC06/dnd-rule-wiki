<p><em><span style=" FONT-FAMILY: 等线; FONT-STYLE: italic; mso-bidi-font-family: 'Times New Roman'; mso-spacerun: 'yes'"></span></em></p>
<p><em><span style=" FONT-FAMILY: 等线; FONT-STYLE: italic; mso-bidi-font-family: 'Times New Roman'; mso-spacerun: 'yes'">某些龙好像不贬低一下周围的东西就不知道自己多伟大一样。不过实际上，我发现那些被别人蔑视的人往往有最多的东西可以教我们。</span><span style=" FONT-FAMILY: 等线; FONT-STYLE: italic; mso-bidi-font-family: 'Times New Roman'; mso-spacerun: 'yes'"></span></em></p>
<p><em><span style=" FONT-FAMILY: 等线; FONT-STYLE: italic; mso-bidi-font-family: 'Times New Roman'; mso-spacerun: 'yes'">——费资本</span><span style=" FONT-FAMILY: 等线; FONT-STYLE: italic; mso-bidi-font-family: 'Times New Roman'; mso-spacerun: 'yes'"></span></em></p>
<p><span style=" FONT-FAMILY: 等线; mso-bidi-font-family: 'Times New Roman'; mso-spacerun: 'yes'"></span></p>
<p><span style=" FONT-FAMILY: 等线; mso-bidi-font-family: 'Times New Roman'; mso-spacerun: 'yes'">龙经常会接纳一些追随者来帮助它们收集财宝，守护宝库和巢穴。为龙选择此类仆从是一个设计遭遇和冒险时常见的问题。当你围绕龙设计一个遭遇、一个冒险或整个战役时，你可以决定有多少生物为它们的主龙服务。</span><span style=" FONT-FAMILY: 等线; mso-bidi-font-family: 'Times New Roman'; mso-spacerun: 'yes'"></span></p></article><footer class="page-footer"><p>📚 费资本的巨龙宝库 · 规则集 2014</p></footer></main></div><script src="/assets/search.js"></script><script src="/assets/sidebar.js"></script></body></html>
