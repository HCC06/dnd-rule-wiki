<p><em><span style=" FONT-FAMILY: 等线; FONT-STYLE: italic; mso-bidi-font-family: 'Times New Roman'; mso-spacerun: 'yes'"></span></em></p>
<p><em><span style=" FONT-FAMILY: 等线; FONT-STYLE: italic; mso-bidi-font-family: 'Times New Roman'; mso-spacerun: 'yes'">不是龙在你的世界里。是你在龙的世界里。</span><span style=" FONT-FAMILY: 等线; FONT-STYLE: italic; mso-bidi-font-family: 'Times New Roman'; mso-spacerun: 'yes'"></span></em></p>
<p><em><span style=" FONT-FAMILY: 等线; FONT-STYLE: italic; mso-bidi-font-family: 'Times New Roman'; mso-spacerun: 'yes'">——费资本</span><span style=" FONT-FAMILY: 等线; FONT-STYLE: italic; mso-bidi-font-family: 'Times New Roman'; mso-spacerun: 'yes'"></span></em></p>
<p><span style=" FONT-FAMILY: 等线; mso-bidi-font-family: 'Times New Roman'; mso-spacerun: 'yes'"></span></p>
<p><span style=" FONT-FAMILY: 等线; mso-bidi-font-family: 'Times New Roman'; mso-spacerun: 'yes'">当你想让龙的遭遇成为整个冒险的目标或焦点时，你该如何制作这个冒险来突出龙的重要性、伟大性和他们那可怕的力量？当你使用本书中的冒险引子时，龙将大致分为三类角色：怪物、策划者或强权。当你考虑你想让龙在你的冒险中扮演什么角色时，可以考虑这些类别。</span><span style=" FONT-FAMILY: 等线; mso-bidi-font-family: 'Times New Roman'; mso-spacerun: 'yes'"></span></p></article><footer class="page-footer"><p>📚 费资本的巨龙宝库 · 规则集 2014</p></footer></main></div><script src="/assets/search.js"></script><script src="/assets/sidebar.js"></script></body></html>
